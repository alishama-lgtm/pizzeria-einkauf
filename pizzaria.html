<script>
// ═══════════════════════════════════════════════════════════════
// API KEY — hier deinen Anthropic API Key eintragen
// ═══════════════════════════════════════════════════════════════
const ANTHROPIC_API_KEY = "HIER_API_KEY_EINFÜGEN";

// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════

const PRODUCTS = [
  { id: 'mehl',       name: 'Pizzamehl Tipo 00',       category: 'Grundzutaten', unit: 'kg',      currentStock: 1.5,  minStock: 5,   orderQuantity: 10 },
  { id: 'tomaten',    name: 'San Marzano Tomaten',      category: 'Grundzutaten', unit: 'Dosen',   currentStock: 3,    minStock: 10,  orderQuantity: 24 },
  { id: 'mozzarella', name: 'Mozzarella di Bufala',     category: 'Käse',         unit: 'kg',      currentStock: 0.8,  minStock: 4,   orderQuantity: 5  },
  { id: 'olivenoel',  name: 'Olivenöl Extra Vergine',   category: 'Grundzutaten', unit: 'Liter',   currentStock: 1.2,  minStock: 3,   orderQuantity: 5  },
  { id: 'salami',     name: 'Salami Milano',            category: 'Belag',        unit: 'kg',      currentStock: 0.4,  minStock: 2,   orderQuantity: 3  },
  { id: 'parmesan',   name: 'Parmigiano Reggiano',      category: 'Käse',         unit: 'kg',      currentStock: 0.3,  minStock: 1,   orderQuantity: 2  },
  { id: 'basilikum',  name: 'Frischer Basilikum',       category: 'Gewürze',      unit: 'Bund',    currentStock: 2,    minStock: 5,   orderQuantity: 10 },
  { id: 'hefe',       name: 'Frische Hefe',             category: 'Grundzutaten', unit: 'Päckchen',currentStock: 15,   minStock: 10,  orderQuantity: 20 },
  { id: 'salz',       name: 'Meersalz',                 category: 'Gewürze',      unit: 'kg',      currentStock: 3,    minStock: 2,   orderQuantity: 5  },
  { id: 'peperoni',   name: 'Peperoni',                 category: 'Belag',        unit: 'kg',      currentStock: 0.2,  minStock: 1.5, orderQuantity: 2  },
];

const SHOPS = [
  { id: 'metro', name: 'Metro',  type: 'Großhandel', color: '#003DA5' },
  { id: 'edeka', name: 'Edeka',  type: 'Supermarkt', color: '#E31E24' },
  { id: 'lidl',  name: 'Lidl',   type: 'Discounter', color: '#0050AA' },
  { id: 'rewe',  name: 'Rewe',   type: 'Supermarkt', color: '#CC0000' },
];

// pricePerUnit indexed as PRICE_MAP[shopId][productId]
const PRICE_MAP = {
  metro: { mehl:0.89, tomaten:0.99, mozzarella:4.99, olivenoel:5.49, salami:7.99, parmesan:8.99, basilikum:0.69, hefe:0.39, salz:0.49, peperoni:5.99 },
  edeka: { mehl:1.29, tomaten:1.49, mozzarella:5.99, olivenoel:6.99, salami:9.49, parmesan:11.99,basilikum:0.99, hefe:0.49, salz:0.69, peperoni:7.49 },
  lidl:  { mehl:0.79, tomaten:0.89, mozzarella:3.99, olivenoel:4.49, salami:6.49, parmesan:7.99, basilikum:0.59, hefe:0.29, salz:0.39, peperoni:4.99 },
  rewe:  { mehl:1.19, tomaten:1.39, mozzarella:5.49, olivenoel:6.49, salami:8.99, parmesan:10.49,basilikum:0.89, hefe:0.45, salz:0.59, peperoni:6.99 },
};

// Weekly deals — populated here or via Upload tab
// week: 'current' = diese Woche, 'next' = ab Montag
const DEALS = [
  { shopId: 'lidl',  productId: 'mozzarella', pricePerUnit: 2.99, normalPrice: 3.99, validTo: '29.03.', week: 'current' },
  { shopId: 'metro', productId: 'olivenoel',  pricePerUnit: 4.29, normalPrice: 5.49, validTo: '29.03.', week: 'current' },
  { shopId: 'edeka', productId: 'salami',     pricePerUnit: 6.99, normalPrice: 9.49, validTo: '30.03.', week: 'current' },
  { shopId: 'rewe',  productId: 'parmesan',   pricePerUnit: 7.99, normalPrice: 10.49,validTo: '06.04.', week: 'next'    },
  { shopId: 'lidl',  productId: 'mehl',       pricePerUnit: 0.59, normalPrice: 0.79, validTo: '06.04.', week: 'next'    },
];

// Mutable stock levels
const stockLevels = {};
PRODUCTS.forEach(p => stockLevels[p.id] = p.currentStock);

// ═══════════════════════════════════════════════════════════════
// HISTORY (LocalStorage)
// ═══════════════════════════════════════════════════════════════

let HISTORY = [];
try { HISTORY = JSON.parse(localStorage.getItem('pizzeria_history') || '[]'); } catch(_) { HISTORY = []; }

function saveHistory() {
  try { localStorage.setItem('pizzeria_history', JSON.stringify(HISTORY)); } catch(_) {}
}

function addHistoryEntry(entry) {
  const e = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2,7),
    datum:       entry.datum       || new Date().toISOString().slice(0,10),
    produktName: entry.produktName || '',
    produktId:   entry.produktId   || null,
    menge:       entry.menge       != null ? Number(entry.menge)  : null,
    einheit:     entry.einheit     || 'Stk',
    preis:       entry.preis       != null ? Number(entry.preis)  : null,
    shopName:    entry.shopName    || null,
    shopId:      entry.shopId      || null,
    quelle:      entry.quelle      || 'manuell',
  };
  HISTORY.unshift(e);
  if (HISTORY.length > 2000) HISTORY = HISTORY.slice(0, 2000);
  saveHistory();
}

const VERLAUF_FILTER = { shop: '', produkt: '', monat: '' };

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function eur(val) {
  return val.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
}

function getLowStockProducts() {
  return PRODUCTS.filter(p => stockLevels[p.id] < p.minStock);
}

function getPrice(shopId, productId) {
  return PRICE_MAP[shopId]?.[productId] ?? null;
}

// ═══════════════════════════════════════════════════════════════
// COMBINATIONS ALGORITHM
// ═══════════════════════════════════════════════════════════════

function calcSingleShopCombo(shop, lowProducts) {
  const items = [];
  for (const p of lowProducts) {
    const price = getPrice(shop.id, p.id);
    if (price === null) return null;
    items.push({ product: p, shop, pricePerUnit: price, quantity: p.orderQuantity, totalCost: price * p.orderQuantity });
  }
  const totalCost = items.reduce((s, i) => s + i.totalCost, 0);
  return { id: 'single-' + shop.id, shops: [shop], items, totalCost, numShops: 1, isRecommended: false };
}

function calcTwoShopCombo(shopA, shopB, lowProducts) {
  const items = [];
  for (const p of lowProducts) {
    const pA = getPrice(shopA.id, p.id);
    const pB = getPrice(shopB.id, p.id);
    if (pA === null && pB === null) return null;
    let chosenShop, chosenPrice;
    if (pA === null)      { chosenShop = shopB; chosenPrice = pB; }
    else if (pB === null) { chosenShop = shopA; chosenPrice = pA; }
    else                  { chosenShop = pA <= pB ? shopA : shopB; chosenPrice = Math.min(pA, pB); }
    items.push({ product: p, shop: chosenShop, pricePerUnit: chosenPrice, quantity: p.orderQuantity, totalCost: chosenPrice * p.orderQuantity });
  }
  // Only count shops actually used
  const usedIds = new Set(items.map(i => i.shop.id));
  if (usedIds.size < 2) return null; // degenerate – same as single shop
  const totalCost = items.reduce((s, i) => s + i.totalCost, 0);
  const shops = SHOPS.filter(s => usedIds.has(s.id));
  return { id: 'two-' + shopA.id + '-' + shopB.id, shops, items, totalCost, numShops: 2, isRecommended: false };
}

function calculateCombinations() {
  const low = getLowStockProducts();
  if (low.length === 0) return { single: [], two: [], hasLow: false };

  // Single shop
  const single = SHOPS
    .map(s => calcSingleShopCombo(s, low))
    .filter(Boolean)
    .sort((a, b) => a.totalCost - b.totalCost)
    .slice(0, 3);

  // Two shop
  const two = [];
  for (let i = 0; i < SHOPS.length; i++) {
    for (let j = i + 1; j < SHOPS.length; j++) {
      const c = calcTwoShopCombo(SHOPS[i], SHOPS[j], low);
      if (c) two.push(c);
    }
  }
  two.sort((a, b) => a.totalCost - b.totalCost);
  const top3Two = two.slice(0, 3);

  // Mark globally cheapest as EMPFOHLEN
  const all = [...top3Two, ...single];
  if (all.length > 0) {
    all.sort((a, b) => a.totalCost - b.totalCost);
    all[0].isRecommended = true;
  }

  return { single, two: top3Two, hasLow: true };
}

function daysUntilMonday() {
  const day = new Date().getDay(); // 0=Sun,1=Mon,...
  return day === 0 ? 1 : day === 1 ? 7 : 8 - day;
}

function renderShopsTab() {
  const lowIds = new Set(getLowStockProducts().map(p => p.id));

  // ── 1. PREISVERGLEICH TABELLE ────────────────────────────────
  // Per product: find min and max price across all shops
  const priceStats = {};
  for (const p of PRODUCTS) {
    const vals = SHOPS.map(s => getPrice(s.id, p.id)).filter(v => v !== null);
    if (vals.length) priceStats[p.id] = { min: Math.min(...vals), max: Math.max(...vals) };
  }
  const productsWithPrices = PRODUCTS.filter(p => priceStats[p.id]);

  const thCols = SHOPS.map(s =>
    `<th style="padding:8px 14px;font-size:11px;font-weight:700;color:#5a403c;text-align:right;white-space:nowrap;border-bottom:2px solid #e3beb8;min-width:82px">${s.name}</th>`
  ).join('');

  const tRows = productsWithPrices.map(p => {
    const { min, max } = priceStats[p.id];
    const allSame = min === max;
    const cells = SHOPS.map(s => {
      const v = getPrice(s.id, p.id);
      if (v === null) return `<td style="padding:8px 14px;text-align:right;font-size:13px;color:#c9b8b4">—</td>`;
      const isMin = v === min;
      const isMax = !allSame && v === max;
      const style = isMin
        ? 'padding:8px 14px;text-align:right;font-size:13px;font-weight:700;color:#16a34a;'
        : isMax
          ? 'padding:8px 14px;text-align:right;font-size:13px;color:#a89490;text-decoration:line-through;'
          : 'padding:8px 14px;text-align:right;font-size:13px;color:#261816;';
      return `<td style="${style}">${eur(v)}${isMin ? ' <span style="font-size:10px">✓</span>' : ''}</td>`;
    }).join('');

    const rowBg = lowIds.has(p.id) ? 'background:#fff5f5;' : '';
    return `
      <tr style="border-bottom:1px solid #f5f0ee;${rowBg}">
        <td style="padding:8px 14px;white-space:nowrap">
          <div style="display:flex;align-items:center;gap:5px">
            ${lowIds.has(p.id) ? '<span class="material-symbols-outlined" style="font-size:12px;color:#ba1a1a;flex-shrink:0">warning</span>' : ''}

            <span style="font-size:10px;color:#8e706b">/${p.unit}</span>

  const nextDeals = DEALS.filter(d => d.week === 'next').sort((a,b) => (b.normalPrice-b.pricePerUnit)-(a.normalPrice-a.pricePerUnit));

  const dealsSection = (curDeals.length + nextDeals.length) === 0 ? '' : `
    ${curDeals.length > 0 ? `
    <div style="margin-bottom:20px">
      <p style="font-size:11px;font-weight:700;color:#261816;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
        <span style="background:#ba1a1a;color:#fff;padding:2px 7px;border-radius:3px;font-size:10px;margin-right:6px">DIESE WOCHE</span>Aktuelle Angebote
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">${curDeals.map(d => dealCard(d,'DIESE WOCHE','#ba1a1a')).join('')}</div>
    </div>` : ''}
    ${nextDeals.length > 0 ? `
    <div style="margin-bottom:20px">
      <p style="font-size:11px;font-weight:700;color:#261816;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
        <span style="background:#b06020;color:#fff;padding:2px 7px;border-radius:3px;font-size:10px;margin-right:6px">AB MONTAG</span>Nächste Woche
        <span style="font-size:11px;font-weight:400;color:#5a403c;text-transform:none;letter-spacing:0;margin-left:6px">· noch ${daysUntilMonday()} Tage warten lohnt sich!</span>
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">${nextDeals.map(d => dealCard(d,'AB MONTAG','#b06020')).join('')}</div>
    </div>` : ''}`;

  // ── 4. GESCHÄFTE ÜBERSICHT ────────────────────────────────────
  const typeMap = {
    'Großhandel': '🏭 GROSSHANDEL', 'Supermarkt': '🛒 SUPERMARKT',
    'Discounter': '🏷️ DISCOUNTER',  'Türkmarkt':  '🌙 TÜRKMARKT',
  };

  const shopCards = SHOPS.map(shop => {
    const total = PRODUCTS.reduce((s, p) => {
      const v = getPrice(shop.id, p.id); return v ? s + v * p.orderQuantity : s;

    const cnt = PRODUCTS.filter(p => getPrice(shop.id, p.id) !== null).length;

function renderSingleCombo(combo, rank) {
  const byShop = {};
  for (const item of combo.items) {
    if (!byShop[item.shop.id]) byShop[item.shop.id] = { shop: item.shop, items: [], subtotal: 0 };
    byShop[item.shop.id].items.push(item);
    byShop[item.shop.id].subtotal += item.totalCost;

  const group = Object.values(byShop)[0];
  const detailId = 'sngd-' + combo.id;

  const detailRows = group.items.map(item => `
    <div style="display:flex;justify-content:space-between;align-items:center;height:34px;border-bottom:1px solid #f5f0ee">

  return `

function switchTab(tab) {
  ['produkte','geschaefte','kombis','suche','upload','verlauf','mitarbeiter','business'].forEach(t => {
    document.getElementById('panel-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('[data-nav-tab]').forEach(el => {
    const active = el.dataset.navTab === tab;
    el.style.color = active ? '#610000' : '#5a403c';
    el.style.fontWeight = active ? '700' : '500';
    el.style.borderBottom = active ? '3px solid #610000' : '3px solid transparent';
    const ind = el.querySelector('.tab-indicator');
    if (ind) ind.style.display = active ? 'block' : 'none';
  });
  document.querySelectorAll('[data-bottom-nav]').forEach(el => {
    const active = el.dataset.bottomNav === tab;
    el.style.background = active ? 'linear-gradient(135deg,#610000,#8b0000)' : '';
    el.style.color = active ? 'white' : '#5a403c';
    el.style.borderRadius = active ? '12px' : '';
    el.style.padding = active ? '6px 16px' : '7px 8px';
  });
  if (tab === 'produkte')   renderProductsTab();
  if (tab === 'geschaefte') renderShopsTab();
  if (tab === 'kombis')     renderKombisTab();
  if (tab === 'suche')      renderSucheTab();
  if (tab === 'upload')      renderUploadTab();
  if (tab === 'verlauf')     renderVerlaufTab();
  if (tab === 'mitarbeiter') renderMitarbeiterTab();
  if (tab === 'business') {
    const lockIcon = document.getElementById('biz-lock-icon');
    if (!bizIsAuth()) { renderBizLocked(); if (lockIcon) lockIcon.textContent='lock'; }
    else { renderBusinessTab(); if (lockIcon) lockIcon.textContent='lock_open'; }
  }
}

function editStock(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product) return;
  const current = stockLevels[productId];
  const input = prompt(`Aktuellen Bestand für "${product.name}" eingeben (${product.unit}):`, current);
  if (input === null) return;
  const val = parseFloat(input.replace(',', '.'));
  if (isNaN(val) || val < 0) { alert('Ungültiger Wert'); return; }
  stockLevels[productId] = val;
  updateHeaderBadge();
  renderProductsTab();
}

  'hofer':   '#e63946',
  'billa':   '#ed1c24',
  'spar':    '#007f3e',
  'lidl':    '#0050aa',
  'metro':   '#003da5',

  'merkur':  '#004899',
  'rewe':    '#cc0000',

function shopColor(shopName) {
  const key = shopName.toLowerCase().trim();
  for (const [k, v] of Object.entries(AT_SHOP_COLORS)) {

  }
  return '#555';
}

function renderSearchResults() {
  const { results, query } = SUCHE_STATE;
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <span style="font-size:14px;color:#5a403c">
        <span style="font-weight:700;color:#261816">${results.length} Angebot${results.length !== 1 ? 'e' : ''}</span>
        für „${escHtml(query)}"
      </span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px">`;

  results.forEach((r, idx) => {
    const color = shopColor(r.shop);
    const savings = (r.originalPrice && r.price && r.originalPrice > r.price)
      ? Math.round((1 - r.price / r.originalPrice) * 100)
      : null;

    let validHtml = '';
    if (r.validUntil) {
      const until = new Date(r.validUntil);
      const diffDays = Math.round((until - today) / 86400000);
      let textColor = '#5a403c', label = '';
      if (diffDays < 0) {
        textColor = '#ba1a1a'; label = `Abgelaufen (${fmtDate(r.validUntil)})`;
      } else if (diffDays === 0) {
        textColor = '#e67e22'; label = 'Heute letzter Tag';
      } else if (diffDays <= 3) {
        textColor = '#e67e22'; label = `Noch ${diffDays} Tag${diffDays !== 1 ? 'e' : ''} (bis ${fmtDate(r.validUntil)})`;
      } else {
        label = `Gültig bis ${fmtDate(r.validUntil)}`;
      }
      if (r.validFrom && r.validFrom > new Date().toISOString().slice(0, 10)) {
        label = `Ab ${fmtDate(r.validFrom)} bis ${fmtDate(r.validUntil)}`;
        textColor = '#5a403c';
      }
      validHtml = `<div style="display:flex;align-items:center;gap:4px;font-size:12px;color:${textColor}">
        <span class="material-symbols-outlined" style="font-size:13px">calendar_today</span>
        ${escHtml(label)}
      </div>`;
    }

    const isAdded = SUCHE_STATE.addedIds.has(idx);

    html += `
      <div style="background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid #e3beb866;display:flex;flex-direction:column">
        <div style="padding:16px 16px 12px;flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <span style="background:${color};color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border-radius:20px">${escHtml(r.shop)}</span>
            ${r.source ? `<span style="font-size:11px;color:#8d6562">${escHtml(r.source)}</span>` : ''}
          </div>
          <p style="font-size:14px;font-weight:600;color:#261816;margin-bottom:3px">${escHtml(r.name)}</p>
          ${r.brand ? `<p style="font-size:12px;color:#5a403c;margin-bottom:10px">${escHtml(r.brand)}</p>` : ''}
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
            <span style="font-size:24px;font-weight:800;color:#610000">${r.price != null ? eur(r.price) : '—'}</span>
            ${r.originalPrice && r.originalPrice > r.price ? `<span style="font-size:13px;color:#8d6562;text-decoration:line-through">${eur(r.originalPrice)}</span>` : ''}
            ${savings ? `<span style="font-size:11px;font-weight:700;background:#ffdad6;color:#610000;padding:2px 8px;border-radius:10px">−${savings}%</span>` : ''}
          </div>
          ${r.unit ? `<p style="font-size:12px;color:#5a403c;margin-bottom:6px">pro ${escHtml(r.unit)}</p>` : ''}
          ${validHtml}
        </div>
        <div style="border-top:1px solid #e3beb844;padding:12px 16px">
          <button
            class="add-btn ${isAdded ? 'added' : ''}"
            onclick="addResultToInventory(${idx}, this)"
            ${isAdded ? 'disabled' : ''}
            style="width:100%;padding:9px;border-radius:12px;border:1.5px solid ${isAdded?'#c7c9f9':'#c0eda6'};background:${isAdded?'#dfe0ff':'#c0eda6'};color:${isAdded?'#0d2ccc':'#0c2000'};font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s">
            ${isAdded
              ? '<span class="material-symbols-outlined" style="font-size:15px">check</span> Hinzugefügt'
              : '<span class="material-symbols-outlined" style="font-size:15px">add</span> Zu Bestand hinzufügen'}
          </button>
        </div>
      </div>`;
  });

  html += '</div>';
  return html;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════════════

function addResultToInventory(idx, btn) {
  const r = SUCHE_STATE.results[idx];
  if (!r) return;

  // Generate a stable id from the name
  const id = 'search-' + r.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30) + '-' + idx;

  // Check if already in PRODUCTS
  const existing = PRODUCTS.find(p => p.id === id);
  if (!existing) {
    const newProduct = {
      id,
      name: r.name + (r.brand ? ` (${r.brand})` : ''),
      category: 'Suche',
      unit: r.unit || 'Stk',
      currentStock: 0,
      minStock: 1,
      orderQuantity: 1,
    };
    PRODUCTS.push(newProduct);
    stockLevels[id] = 0;
    updateHeaderBadge();
  }

  addHistoryEntry({
    produktName: r.name + (r.brand ? ` (${r.brand})` : ''),
    produktId:   id,
    menge:       1,
    einheit:     r.unit  || 'Stk',
    preis:       r.price || null,
    shopName:    r.shop  || null,
    shopId:      null,
    quelle:      'suche',
  });

  SUCHE_STATE.addedIds.add(idx);

  // Update button in-place without full re-render
  btn.classList.add('added', 'adding');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:15px">check</span> Hinzugefügt';
  btn.classList.remove('adding');
}

  const hasKey = ANTHROPIC_API_KEY && ANTHROPIC_API_KEY !== 'HIER_API_KEY_EINFÜGEN';
  if (!hasKey) {
    SUCHE_STATE.error = 'Kein API Key konfiguriert. Bitte ANTHROPIC_API_KEY am Anfang der Datei eintragen.';
    renderSucheTab();
    return;
  }

  SUCHE_STATE.loading = true;
  SUCHE_STATE.error = null;
  SUCHE_STATE.results = [];
  SUCHE_STATE.query = query;
  SUCHE_STATE.addedIds = new Set();
  SUCHE_STATE.loadingStep = 'Verbinde mit Claude …';
  renderSucheTab();

  try {
    const results = await searchViaClaudeAPI(query);
    SUCHE_STATE.results = results;
    SUCHE_STATE.error = null;
  } catch (err) {
    SUCHE_STATE.error = err.message || String(err);
    SUCHE_STATE.results = [];
  } finally {
    SUCHE_STATE.loading = false;
    SUCHE_STATE.loadingStep = '';
    renderSucheTab();
  }
}

async function searchViaClaudeAPI(query) {
  const today = new Date().toISOString().slice(0, 10);

  const userPrompt =
    `Heute ist ${today}. Suche auf marktguru.at, aktionsfinder.at und wogibtswas.at ` +
    `nach aktuellen UND kommenden Angeboten für "${query}" bei österreichischen Händlern ` +
    `(Hofer, Billa, Billa Plus, Spar, Interspar, Eurospar, Lidl, Metro, Etsan, Penny, Merkur). ` +
    `Gib ALLE gefundenen Angebote zurück. ` +
    `Antworte NUR mit einem JSON-Array in exakt diesem Format, ohne Erklärungen, ohne Markdown:\n` +
    `[\n` +
    `  {\n` +
    `    "name": "Produktname",\n` +
    `    "brand": "Marke oder null",\n` +
    `    "shop": "Geschäftsname",\n` +
    `    "price": 1.99,\n` +
    `    "originalPrice": 2.49,\n` +
    `    "unit": "kg / L / Stk / etc.",\n` +
    `    "validFrom": "YYYY-MM-DD oder null",\n` +
    `    "validUntil": "YYYY-MM-DD oder null",\n` +
    `    "source": "marktguru.at / aktionsfinder.at / wogibtswas.at"\n` +
    `  }\n` +
    `]\n` +
    `Wenn keine Angebote gefunden werden, gib [] zurück.`;

  let messages = [{ role: 'user', content: userPrompt }];
  let maxContinuations = 6;

  while (maxContinuations-- > 0) {
    updateLoadingStep('Claude durchsucht österreichische Angebots-Websites …');

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 4096,
        thinking: { type: 'adaptive' },
        tools: [
          { type: 'web_search_20260209', name: 'web_search' },
          { type: 'web_fetch_20260209',  name: 'web_fetch'  },
        ],
        messages,
      }),
    });

    if (!resp.ok) {
      let errMsg = `HTTP ${resp.status}`;
      try {
        const errData = await resp.json();
        errMsg = errData?.error?.message || errMsg;
      } catch (_) {}
      if (resp.status === 401) throw new Error('Ungültiger API Key (401). Bitte API Key prüfen.');
      if (resp.status === 429) throw new Error('Rate Limit erreicht (429). Kurz warten und erneut versuchen.');
      throw new Error(errMsg);
    }

    const data = await resp.json();

    if (data.stop_reason === 'end_turn') {
      updateLoadingStep('Angebote werden verarbeitet …');
      const textBlock = data.content.find(b => b.type === 'text');
      const rawText = textBlock ? textBlock.text : '';
      return parseResultsJSON(rawText);
    }

    if (data.stop_reason === 'pause_turn') {
      // Server-side web search hit iteration limit → re-send to continue
      updateLoadingStep('Weitere Seiten werden durchsucht …');
      messages = [
        { role: 'user', content: userPrompt },
        { role: 'assistant', content: data.content },
      ];
      continue;
    }

    // Any other stop reason — try to extract text anyway
    const textBlock = data.content && data.content.find(b => b.type === 'text');
    if (textBlock) return parseResultsJSON(textBlock.text);
    throw new Error(`Unerwarteter Stop-Grund: ${data.stop_reason}`);
  }

  throw new Error('Suche hat zu lange gedauert (max. Iterationen erreicht).');
}

function parseResultsJSON(text) {
  if (!text || !text.trim()) return [];

  // Try direct parse
  try { return JSON.parse(text.trim()); } catch (_) {}

  // Strip markdown code fences
  const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceMatch) {
    try { return JSON.parse(fenceMatch[1].trim()); } catch (_) {}
  }

  // Find first JSON array
  const arrMatch = text.match(/\[[\s\S]*\]/);
  if (arrMatch) {
    try { return JSON.parse(arrMatch[0]); } catch (_) {}
  }

  // Empty result if nothing parseable
  return [];
}

function handleFileDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file) handleFileUpload(file);
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (file) handleFileUpload(file);
}

function handleFileUpload(file) {
  const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'application/pdf'];
  if (!allowed.includes(file.type)) {
    UPLOAD_STATE.error = 'Bitte ein Bild (JPG, PNG, WebP) oder PDF hochladen.';
    UPLOAD_STATE.fileDataUrl = null;
    renderUploadTab();
    return;
  }
  UPLOAD_STATE.error = null;
  UPLOAD_STATE.mediaType = file.type;
  UPLOAD_STATE.fileName = file.name;
  UPLOAD_STATE.results = [];
  UPLOAD_STATE.addedIndices = new Set();
  UPLOAD_STATE.einkaufsDatum = null;
  UPLOAD_STATE.geschaeft = null;

  const reader = new FileReader();
  reader.onload = e => {
    UPLOAD_STATE.fileDataUrl = e.target.result;
    renderUploadTab();
  };
  reader.readAsDataURL(file);
}

function resetUpload() {
  UPLOAD_STATE.fileDataUrl = null;
  UPLOAD_STATE.mediaType = null;
  UPLOAD_STATE.fileName = null;
  UPLOAD_STATE.error = null;

}

async function auslesenStart() {
  if (!UPLOAD_STATE.fileDataUrl) return;
  const hasKey = ANTHROPIC_API_KEY && ANTHROPIC_API_KEY !== 'HIER_API_KEY_EINFÜGEN';
  if (!hasKey) {
    UPLOAD_STATE.error = 'Kein API Key konfiguriert. Bitte ANTHROPIC_API_KEY am Anfang der Datei eintragen.';
    renderUploadTab();
    return;
  }
  UPLOAD_STATE.loading = true;
  UPLOAD_STATE.error = null;
  UPLOAD_STATE.results = [];
  UPLOAD_STATE.addedIndices = new Set();
  renderUploadTab();

  try {
    const parsed = await scanReceiptViaClaudeAPI();
    UPLOAD_STATE.results = parsed.items || [];
    UPLOAD_STATE.einkaufsDatum = parsed.datum || null;
    UPLOAD_STATE.geschaeft = parsed.geschaeft || null;
    UPLOAD_STATE.error = null;
  } catch (err) {
    UPLOAD_STATE.error = err.message || String(err);
    UPLOAD_STATE.results = [];
  } finally {
    UPLOAD_STATE.loading = false;
    renderUploadTab();
  }
}

async function scanReceiptViaClaudeAPI() {
  const base64 = UPLOAD_STATE.fileDataUrl.split(',')[1];
  const mediaType = UPLOAD_STATE.mediaType;
  const isPdf = mediaType === 'application/pdf';

  const prompt =
    `Lies diesen Kassenbon / diese Rechnung aus und gib mir alle Produkte als JSON zurück.\n\n` +
    `Antworte NUR mit diesem JSON-Format, ohne Erklärungen, ohne Markdown-Codeblock:\n` +
    `{\n` +
    `  "geschaeft": "Geschäftsname (z.B. Metro, Hofer, Billa, Spar, Lidl, Rewe) oder null",\n` +
    `  "datum": "YYYY-MM-DD oder null",\n` +
    `  "items": [\n` +
    `    {\n` +
    `      "name": "Produktname",\n` +
    `      "preis": 1.99,\n` +
    `      "menge": 1,\n` +
    `      "einheit": "Stk / kg / L / Pack / etc.",\n` +
    `      "kategorie": "Grundzutaten / Käse / Belag / Gewürze / Getränke / Sonstiges"\n` +
    `    }\n` +
    `  ]\n` +
    `}\n\n` +
    `Nur die eigentlichen Produkte/Waren auflisten — keine Summen, Rabatte, Steuern oder Zahlungsinfos.\n` +
    `Falls kein Kassenbon erkennbar oder das Bild unlesbar ist, antworte mit: {"fehler": "Kurze Beschreibung"}`;

  const contentBlock = isPdf
    ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } }
    : { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } };

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
    },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: 4096,
      messages: [{ role: 'user', content: [contentBlock, { type: 'text', text: prompt }] }],
    }),
  });

  if (!resp.ok) {
    let errMsg = `HTTP ${resp.status}`;
    try { const e = await resp.json(); errMsg = e?.error?.message || errMsg; } catch (_) {}
    if (resp.status === 401) throw new Error('Ungültiger API Key (401). Bitte API Key prüfen.');
    if (resp.status === 429) throw new Error('Rate Limit erreicht (429). Kurz warten und erneut versuchen.');
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const textBlock = data.content.find(b => b.type === 'text');
  if (!textBlock) throw new Error('Keine Antwort von Claude erhalten.');
  return parseReceiptJSON(textBlock.text);
}

function parseReceiptJSON(text) {
  if (!text || !text.trim()) throw new Error('Leere Antwort von Claude.');
  let parsed;
  try { parsed = JSON.parse(text.trim()); } catch (_) {
    const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (fenceMatch) { try { parsed = JSON.parse(fenceMatch[1].trim()); } catch (_2) {} }
    if (!parsed) {
      const objMatch = text.match(/\{[\s\S]*\}/);
      if (objMatch) { try { parsed = JSON.parse(objMatch[0]); } catch (_3) {} }
    }
  }
  if (!parsed) throw new Error('Antwort konnte nicht verarbeitet werden. Bitte ein deutlicheres Foto machen.');
  if (parsed.fehler) throw new Error(parsed.fehler);
  if (!Array.isArray(parsed.items)) throw new Error('Keine Produkte erkannt. Bitte ein deutlicheres Foto machen.');
  return parsed;
}

function addReceiptItemToInventory(idx, btn) {
  const item = UPLOAD_STATE.results[idx];
  if (!item) return;

  // Resolve shop ID from detected shop name
  let foundShopId = null;
  if (UPLOAD_STATE.geschaeft) {
    const key = UPLOAD_STATE.geschaeft.toLowerCase();
    for (const s of SHOPS) {
      if (key.includes(s.id) || s.name.toLowerCase().includes(key) || key.includes(s.name.toLowerCase())) {
        foundShopId = s.id;
        break;
      }
    }
  }

  // Try to match an existing product by name
  const nameLower = item.name.toLowerCase();
  const matched = PRODUCTS.find(p =>
    p.name.toLowerCase() === nameLower ||
    p.name.toLowerCase().includes(nameLower.split(' ')[0]) ||
    nameLower.includes(p.name.toLowerCase().split(' ')[0])
  );

  if (matched) {
    // Update price in PRICE_MAP
    if (foundShopId && item.preis != null) {
      if (!PRICE_MAP[foundShopId]) PRICE_MAP[foundShopId] = {};
      PRICE_MAP[foundShopId][matched.id] = item.preis;
    }
  } else {
    // Add new product to PRODUCTS
    const id = 'receipt-' + item.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30) + '-' + idx;
    PRODUCTS.push({
      id,
      name: item.name,
      category: item.kategorie || 'Sonstiges',
      unit: item.einheit || 'Stk',
      currentStock: typeof item.menge === 'number' ? item.menge : 0,
      minStock: 1,
      orderQuantity: typeof item.menge === 'number' ? Math.max(1, item.menge) : 1,
    });
    stockLevels[id] = typeof item.menge === 'number' ? item.menge : 0;
    if (foundShopId && item.preis != null) {
      if (!PRICE_MAP[foundShopId]) PRICE_MAP[foundShopId] = {};
      PRICE_MAP[foundShopId][id] = item.preis;
    }
    updateHeaderBadge();
  }

  addHistoryEntry({
    produktName: item.name,
    produktId:   matched ? matched.id : ('receipt-' + item.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,30) + '-' + idx),
    menge:       item.menge  ?? null,
    einheit:     item.einheit || 'Stk',
    preis:       item.preis   ?? null,
    shopName:    UPLOAD_STATE.geschaeft || null,
    shopId:      foundShopId  || null,
    quelle:      'kassenbon',
    datum:       UPLOAD_STATE.einkaufsDatum || null,
  });

  UPLOAD_STATE.addedIndices.add(idx);
  btn.classList.add('added');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px">check</span> Hinzugefügt';
  btn.style.background = '#dfe0ff';
  btn.style.color = '#0d2ccc';
  btn.style.borderColor = '#c7c9f9';
  btn.style.cursor = 'default';
}

function addAllReceiptItems() {
  UPLOAD_STATE.results.forEach((_, idx) => {
    if (!UPLOAD_STATE.addedIndices.has(idx)) {
      const btn = document.querySelector(`#panel-upload .add-btn[onclick="addReceiptItemToInventory(${idx}, this)"]`);
      if (btn && !btn.disabled) addReceiptItemToInventory(idx, btn);
    }
  });

  renderUploadTab();
}

function handleHandlistFile(file) {
  const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
  if (!allowed.includes(file.type)) {
    HANDLIST_STATE.error = 'Bitte ein Bild (JPG, PNG, WebP) hochladen.';

    renderUploadTab();
    return;

  HANDLIST_STATE.error = null;

  HANDLIST_STATE.fileName = file.name;
  HANDLIST_STATE.items = [];
  HANDLIST_STATE.appliedIndices = new Set();

  const reader = new FileReader();
  reader.onload = e => { HANDLIST_STATE.fileDataUrl = e.target.result; renderUploadTab(); };
  reader.readAsDataURL(file);
}

  HANDLIST_STATE.fileDataUrl = null;

  HANDLIST_STATE.error = null;

// ═══════════════════════════════════════════════════════════════
// HANDLIST — Classify items against PRODUCTS
// ═══════════════════════════════════════════════════════════════

function classifyHandlistItem(name) {
  const n = name.toLowerCase().trim();
  // 1. Exact match → high confidence
  const exact = PRODUCTS.find(p => p.name.toLowerCase() === n);
  if (exact) return { status: 'matched', matchedProductId: exact.id, suggestion: exact.name };

  // 2. Containment match → high confidence
  const contain = PRODUCTS.find(p => {
    const pn = p.name.toLowerCase();
    return pn.includes(n) || n.includes(pn);
  });
  if (contain) return { status: 'matched', matchedProductId: contain.id, suggestion: contain.name };

  // 3. Word overlap → medium confidence (similar / suggestion)
  const words = n.split(/\s+/).filter(w => w.length > 3);
  if (words.length > 0) {
    for (const p of PRODUCTS) {
      const pWords = p.name.toLowerCase().split(/\s+/).filter(w => w.length > 3);
      const overlap = words.filter(w => pWords.some(pw => pw.includes(w) || w.includes(pw)));
      if (overlap.length >= Math.ceil(Math.min(words.length, pWords.length) * 0.5)) {
        return { status: 'similar', matchedProductId: p.id, suggestion: p.name };
      }
    }
  }

  return { status: 'new', matchedProductId: null, suggestion: null };
}

function enrichHandlistItems(rawItems) {
  return rawItems.map(item => ({ ...item, ...classifyHandlistItem(item.name || '') }));
}

// ═══════════════════════════════════════════════════════════════
// HANDLIST — Apply to Inventory
// ═══════════════════════════════════════════════════════════════

function applyHandlistItem(idx, btn) {
  const item = HANDLIST_STATE.items[idx];
  if (!item) return;

  if (item.matchedProductId) {
    const prod = PRODUCTS.find(p => p.id === item.matchedProductId);
    if (prod && item.menge != null) prod.orderQuantity = Number(item.menge) || prod.orderQuantity;
  } else {
    const id = 'hand-' + item.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30) + '-' + idx;
    if (!PRODUCTS.find(p => p.id === id)) {
      PRODUCTS.push({
        id, name: item.name, category: 'Sonstiges',
        unit: item.einheit || 'Stk', currentStock: 0,
        minStock: Number(item.menge) || 1, orderQuantity: Number(item.menge) || 1,
      });
      stockLevels[id] = 0;
    }
    item.matchedProductId = id;
    item.status = 'matched';
  }

  addHistoryEntry({
    produktName: item.name,
    produktId:   item.matchedProductId,
    menge:       item.menge   ?? null,
    einheit:     item.einheit || 'Stk',
    preis:       null,
    shopName:    null,
    shopId:      null,
    quelle:      'handliste',
  });

  HANDLIST_STATE.appliedIndices.add(idx);
  updateHeaderBadge();

  if (btn) {
    btn.disabled = true;
    btn.style.background = '#dfe0ff';
    btn.style.borderColor = '#c7c9f9';
    btn.style.color = '#0d2ccc';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px">check</span> Übernommen';
    const row = btn.closest('tr');
    if (row) row.style.background = '#f0fdf4';
  }
}

function applyAllHandlistItems() {
  HANDLIST_STATE.items.forEach((_, idx) => {
    if (!HANDLIST_STATE.appliedIndices.has(idx)) applyHandlistItem(idx, null);
  });
  updateHeaderBadge();
  renderUploadTab();
}

function applySelectedHandlistItems() {
  const table = document.getElementById('handlist-results-table');
  if (!table) return;
  let anyApplied = false;
  table.querySelectorAll('input[type="checkbox"][data-idx]').forEach(cb => {
    if (cb.checked) {
      const idx = parseInt(cb.dataset.idx);
      if (!HANDLIST_STATE.appliedIndices.has(idx)) { applyHandlistItem(idx, null); anyApplied = true; }
    }
  });
  if (anyApplied) { updateHeaderBadge(); renderUploadTab(); }
}

async function erkennungStart() {
  if (!HANDLIST_STATE.fileDataUrl) return;
  const hasKey = ANTHROPIC_API_KEY && ANTHROPIC_API_KEY !== 'HIER_API_KEY_EINFÜGEN';
  if (!hasKey) {
    HANDLIST_STATE.error = 'Kein API Key konfiguriert. Bitte ANTHROPIC_API_KEY am Anfang der Datei eintragen.';
    renderUploadTab(); return;
  }
  HANDLIST_STATE.loading = true;
  HANDLIST_STATE.error = null;
  HANDLIST_STATE.items = [];
  HANDLIST_STATE.appliedIndices = new Set();
  renderUploadTab();

  try {
    const rawItems = await scanHandlistViaClaudeAPI();
    if (!rawItems.length) throw new Error('Keine Produkte erkannt. Bitte ein deutlicheres Foto machen.');
    HANDLIST_STATE.items = enrichHandlistItems(rawItems);
    HANDLIST_STATE.error = null;
  } catch (err) {
    HANDLIST_STATE.error = err.message || String(err);
    HANDLIST_STATE.items = [];
  } finally {
    HANDLIST_STATE.loading = false;
    renderUploadTab();
  }
}

async function scanHandlistViaClaudeAPI() {
  const base64 = HANDLIST_STATE.fileDataUrl.split(',')[1];
  const mediaType = HANDLIST_STATE.mediaType;

  const prompt =
    `Das ist eine handgeschriebene Einkaufsliste einer Pizzeria in Wien.\n` +
    `Erkenne alle Produkte und Mengen. Antworte NUR mit einem JSON-Array, ohne Markdown:\n` +
    `[{"name": "Produktname", "menge": 2, "einheit": "kg"}]\n\n` +
    `Typische Produkte: Mehl, Mozzarella, Tomaten, Salami, Öl, Gewürze, Hefe, Oregano,\n` +
    `Basilikum, Oliven, Kapern, Prosciutto, Rucola, Thunfisch, Sardellen, Parmesan, Ricotta.\n\n` +
    `Regeln:\n` +
    `- Mengen als Zahlen (z.B. 2, nicht "zwei")\n` +
    `- Einheit: kg / g / L / ml / Stk / Pkg / Dose / Flasche\n` +
    `- Falls Schrift unleserlich: {"fehler": "Unleserlich — bitte deutlicheres Foto"}\n` +
    `- Falls kein Text erkennbar: {"fehler": "Kein Text im Bild erkannt"}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: 2048,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: prompt },
      ]}],
    }),
  });

  if (!resp.ok) {
    let errMsg = `HTTP ${resp.status}`;
    try { const e = await resp.json(); errMsg = e?.error?.message || errMsg; } catch (_) {}
    if (resp.status === 401) throw new Error('Ungültiger API Key (401). Bitte API Key prüfen.');
    if (resp.status === 429) throw new Error('Rate Limit erreicht (429). Kurz warten und erneut versuchen.');
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const textBlock = data.content.find(b => b.type === 'text');
  if (!textBlock) throw new Error('Keine Antwort von Claude erhalten.');
  return parseHandlistJSON(textBlock.text);
}

function parseHandlistJSON(text) {
  if (!text || !text.trim()) throw new Error('Leere Antwort von Claude.');
  let parsed;
  try { parsed = JSON.parse(text.trim()); } catch (_) {
    const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (fenceMatch) { try { parsed = JSON.parse(fenceMatch[1].trim()); } catch (_2) {} }
    if (!parsed) {
      const arrMatch = text.match(/\[[\s\S]*\]/);
      if (arrMatch) { try { parsed = JSON.parse(arrMatch[0]); } catch (_3) {} }
      if (!parsed) {
        const objMatch = text.match(/\{[\s\S]*\}/);
        if (objMatch) { try { parsed = JSON.parse(objMatch[0]); } catch (_4) {} }
      }
    }
  }
  if (!parsed) throw new Error('Antwort konnte nicht verarbeitet werden. Bitte erneut versuchen.');
  if (!Array.isArray(parsed) && parsed.fehler) throw new Error(parsed.fehler);
  if (!Array.isArray(parsed)) throw new Error('Unerwartetes Format. Bitte erneut versuchen.');
  return parsed.filter(item => item && item.name);
}

// PRICELIST — State
// ═══════════════════════════════════════════════════════════════

const PRICELIST_STATE = {
  rawData: null,       // Array<Array> — first row = headers
  headers: [],
  fileName: null,
  colName: null,       // column index for product name
  colPreis: null,      // column index for price
  colEinheit: null,    // column index for unit (optional)
  selectedShop: '',
  selectedShopName: '',
  importResult: null,  // { imported, newProducts, unmatched, unknownNames }
  importDate: null,
  error: null,
};

// ═══════════════════════════════════════════════════════════════
// PRICELIST — File Handling
// ═══════════════════════════════════════════════════════════════

function handlePricelistDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file) handlePricelistFile(file);
}

function handlePricelistSelect(input) {
  const file = input.files[0];
  if (file) handlePricelistFile(file);
}

function handlePricelistFile(file) {
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!['.xlsx', '.xls', '.csv'].includes(ext)) {
    PRICELIST_STATE.error = 'Bitte eine Excel (.xlsx, .xls) oder CSV (.csv) Datei hochladen.';
    renderUploadTab();
    return;
  }
  PRICELIST_STATE.error = null;
  PRICELIST_STATE.fileName = file.name;
  PRICELIST_STATE.rawData = null;
  PRICELIST_STATE.importResult = null;
  PRICELIST_STATE.colName = null;
  PRICELIST_STATE.colPreis = null;
  PRICELIST_STATE.colEinheit = null;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      if (typeof XLSX === 'undefined') throw new Error('SheetJS nicht geladen. Bitte Seite neu laden.');
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      if (!rows || rows.length < 2) {
        PRICELIST_STATE.error = 'Datei enthält keine Daten oder ist leer.';
        renderUploadTab();
        return;
      }
      const headerRow = rows[0].map(h => String(h ?? '').trim());
      PRICELIST_STATE.headers = headerRow;
      PRICELIST_STATE.rawData = rows;
      const det = autoDetectColumns(headerRow);
      PRICELIST_STATE.colName   = det.colName;
      PRICELIST_STATE.colPreis  = det.colPreis;
      PRICELIST_STATE.colEinheit = det.colEinheit;
    } catch (err) {
      PRICELIST_STATE.error = 'Datei konnte nicht gelesen werden: ' + (err.message || String(err));
    }
    renderUploadTab();
  };
  reader.onerror = () => { PRICELIST_STATE.error = 'Fehler beim Lesen der Datei.'; renderUploadTab(); };
  reader.readAsArrayBuffer(file);
}

function autoDetectColumns(headers) {
  const nameKw  = ['name','bezeichnung','artikel','produkt','description','item','ware','text','title'];
  const priceKw = ['preis','price','ek','netto','brutto','betrag','eur','€','cost','vk','einkauf'];
  const unitKw  = ['einheit','unit','mengeneinheit','me','vpe','gebinde'];
  let colName = null, colPreis = null, colEinheit = null;
  headers.forEach((h, i) => {
    const hl = h.toLowerCase();
    if (colName    === null && nameKw.some(k  => hl.includes(k)))  colName    = i;
    if (colPreis   === null && priceKw.some(k => hl.includes(k)))  colPreis   = i;
    if (colEinheit === null && unitKw.some(k  => hl.includes(k)))  colEinheit = i;
  });
  if (colName  === null) colName  = 0;
  if (colPreis === null) colPreis = Math.min(1, headers.length - 1);
  return { colName, colPreis, colEinheit };
}

function resetPricelist() {
  Object.assign(PRICELIST_STATE, {
    rawData: null, headers: [], fileName: null,
    colName: null, colPreis: null, colEinheit: null,
    selectedShop: '', selectedShopName: '',
    importResult: null, importDate: null, error: null,
  });
  renderUploadTab();
}

// ═══════════════════════════════════════════════════════════════
// PRICELIST — Product Name Matching
// ═══════════════════════════════════════════════════════════════

function matchProductByName(name) {
  const n = name.toLowerCase().trim();
  let p = PRODUCTS.find(p => p.name.toLowerCase() === n);
  if (p) return p;
  p = PRODUCTS.find(p => n.includes(p.name.toLowerCase()) || p.name.toLowerCase().includes(n));
  if (p) return p;
  const words = n.split(/[\s,\-\/]+/).filter(w => w.length > 3);
  for (const word of words) {
    p = PRODUCTS.find(pr => pr.name.toLowerCase().includes(word) || pr.id.includes(word));
    if (p) return p;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// PRICELIST — Import
// ═══════════════════════════════════════════════════════════════

function importPrices() {
  if (!PRICELIST_STATE.rawData) return;

  // Read current DOM values before validation (user may not have triggered onchange)
  const nameEl    = document.getElementById('pl-col-name');
  const preisEl   = document.getElementById('pl-col-preis');
  const einheitEl = document.getElementById('pl-col-einheit');
  const shopEl    = document.getElementById('pl-shop');
  if (nameEl)    PRICELIST_STATE.colName    = nameEl.value    === '0' ? null : parseInt(nameEl.value)    - 1;
  if (preisEl)   PRICELIST_STATE.colPreis   = preisEl.value   === '0' ? null : parseInt(preisEl.value)   - 1;
  if (einheitEl) PRICELIST_STATE.colEinheit = einheitEl.value === '0' ? null : parseInt(einheitEl.value) - 1;
  if (shopEl)    PRICELIST_STATE.selectedShop = shopEl.value;

  if (PRICELIST_STATE.colName  === null) { PRICELIST_STATE.error = 'Bitte die Produktname-Spalte zuordnen.'; renderUploadTab(); return; }
  if (PRICELIST_STATE.colPreis === null) { PRICELIST_STATE.error = 'Bitte die Preis-Spalte zuordnen.';       renderUploadTab(); return; }
  if (!PRICELIST_STATE.selectedShop)    { PRICELIST_STATE.error = 'Bitte einen Händler auswählen.';          renderUploadTab(); return; }

  const shopId = PRICELIST_STATE.selectedShop;

  // Add shop to SHOPS if new (makes it visible in Geschäfte + Kombis tabs)
  if (!SHOPS.find(s => s.id === shopId)) {
    const extra = IMPORT_SHOPS_EXTRA.find(s => s.id === shopId);
    if (extra) SHOPS.push({ ...extra });
  }
  if (!PRICE_MAP[shopId]) PRICE_MAP[shopId] = {};

  const rows = PRICELIST_STATE.rawData.slice(1);
  let imported = 0, newProducts = 0;
  const unknownNames = [];

  for (const row of rows) {
    const rawName  = row[PRICELIST_STATE.colName];
    const rawPreis = row[PRICELIST_STATE.colPreis];
    const rawUnit  = PRICELIST_STATE.colEinheit !== null ? row[PRICELIST_STATE.colEinheit] : null;

    if (rawName == null || String(rawName).trim() === '') continue;
    const name = String(rawName).trim();
    const preis = parseFloat(String(rawPreis ?? '').replace(/[^\d,.-]/g, '').replace(',', '.'));
    if (!name || isNaN(preis) || preis <= 0) continue;

    const matched = matchProductByName(name);
    if (matched) {
      PRICE_MAP[shopId][matched.id] = preis;
      imported++;
    } else {
      // Create new product entry
      const existing = PRODUCTS.find(p => p.name.toLowerCase() === name.toLowerCase());
      if (existing) {
        PRICE_MAP[shopId][existing.id] = preis;
        imported++;
      } else {
        const id = 'import-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 28) + '-' + (Date.now() % 10000);
        PRODUCTS.push({
          id, name,
          category: 'Sonstiges',
          unit: rawUnit ? String(rawUnit).trim() : 'Stk',
          currentStock: 0, minStock: 1, orderQuantity: 1,
        });
        stockLevels[id] = 0;
        PRICE_MAP[shopId][id] = preis;
        imported++;
        newProducts++;
        unknownNames.push(name);
      }
    }
  }

  const shopObj = allImportShops().find(s => s.id === shopId);
  PRICELIST_STATE.selectedShopName = shopObj ? shopObj.name : shopId;
  PRICELIST_STATE.importResult = { imported, newProducts, unmatched: unknownNames.length, unknownNames };
  PRICELIST_STATE.importDate = new Date().toISOString().slice(0, 10);
  PRICELIST_STATE.error = null;
  updateHeaderBadge();
  renderUploadTab();
}

function printCombo(comboId) {
  const { single, two } = calculateCombinations();
  const combo = [...two, ...single].find(c => c.id === comboId);
  if (!combo) return;

  const now = new Date();
  const dateStr = now.toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const byShop = {};
  for (const item of combo.items) {
    if (!byShop[item.shop.id]) byShop[item.shop.id] = { shop: item.shop, items: [], subtotal: 0 };
    byShop[item.shop.id].items.push(item);
    byShop[item.shop.id].subtotal += item.totalCost;
  }

  let shopTables = '';
  for (const group of Object.values(byShop)) {
    const rows = group.items.map((item, ri) => {
      const isLow = stockLevels[item.product.id] < item.product.minStock;
      return `<tr style="background:${isLow ? '#ffdad6' : ri%2===0 ? '#fff' : '#fafafa'}">
        <td style="padding:9px 10px;text-align:center;font-size:18px">☐</td>

        <td style="padding:9px 10px;text-align:center;font-size:13px">${(stockLevels[item.product.id]||0)} ${item.product.unit}</td>
        <td style="padding:9px 10px;text-align:center;font-size:14px;font-weight:700">${item.quantity} ${item.product.unit}</td>
        <td style="padding:9px 10px;text-align:right;font-size:13px">${eur(item.pricePerUnit)}/${item.product.unit}</td>
        <td style="padding:9px 10px;text-align:right;font-size:14px;font-weight:700">${eur(item.totalCost)}</td>
      </tr>`;
    }).join('');

    shopTables += `
      <div style="margin-bottom:28px;page-break-inside:avoid">
        <div style="background:${group.shop.color};color:white;padding:10px 16px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:17px;font-weight:700">${group.shop.name}</span>
          <span style="font-size:12px;opacity:.85">${group.shop.type}</span>
        </div>
        <table style="width:100%;border-collapse:collapse;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;overflow:hidden">
          <thead>
            <tr style="background:#f5f5f5;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666">
              <th style="padding:7px 10px;width:36px">✓</th>
              <th style="padding:7px 12px;text-align:left">Produkt</th>
              <th style="padding:7px 10px">Bestand</th>
              <th style="padding:7px 10px">Kaufen</th>
              <th style="padding:7px 10px;text-align:right">Preis/E</th>
              <th style="padding:7px 10px;text-align:right">Gesamt</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr style="background:#f0f0f0;font-weight:700;border-top:2px solid #ddd">
              <td colspan="5" style="padding:9px 12px;text-align:right;font-size:13px">Summe ${group.shop.name}:</td>
              <td style="padding:9px 10px;text-align:right;font-size:15px">${eur(group.subtotal)}</td>
            </tr>
          </tfoot>
        </table>
      </div>`;
  }

  const html = `<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<title>Einkaufsliste ${dateStr}</title>
<style>
  body { font-family: Arial, Helvetica, sans-serif; max-width: 800px; margin: 0 auto; padding: 24px; color:#1a1a1a; }
  @media print { body{padding:0;max-width:100%} button{display:none!important} @page{margin:12mm} }
  table { page-break-inside: auto; } tr { page-break-inside: avoid; }
</style></head><body>
  <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid #610000">
    <span style="font-size:42px">🍕</span>

      <h1 style="font-size:22px;font-weight:700;color:#610000;margin:0 0 4px">Pizzeria Einkaufsliste</h1>
      <p style="color:#666;margin:0;font-size:13px">${dateStr}</p>
    </div>
    <div style="text-align:right">
      <div style="font-size:26px;font-weight:700;color:#610000">${eur(combo.totalCost)}</div>

  </div>

  const win = window.open('', '_blank', 'width=860,height=700');

  win.document.write(html);

  win.focus();

}

function calcWeeklyConsumption() {
  if (HISTORY.length === 0) return [];
  const now = new Date();
  const fourWeeksAgo = new Date(now - 28 * 86400000);
  const twoWeeksAgo  = new Date(now - 14 * 86400000);
  const recent = HISTORY.filter(e => e.menge != null && new Date(e.datum + 'T00:00:00') >= fourWeeksAgo);

  const byProduct = {};
  recent.forEach(e => {
    if (!byProduct[e.produktName]) byProduct[e.produktName] = { name: e.produktName, einheit: e.einheit, entries: [] };
    byProduct[e.produktName].entries.push(e);
  });

  return Object.values(byProduct).map(p => {
    const total = p.entries.reduce((s, e) => s + (e.menge || 0), 0);
    const perWeek = Math.round((total / 4) * 10) / 10;

    const recent2 = p.entries.filter(e => new Date(e.datum + 'T00:00:00') >= twoWeeksAgo);
    const older2  = p.entries.filter(e => new Date(e.datum + 'T00:00:00') <  twoWeeksAgo);
    const rSum = recent2.reduce((s, e) => s + (e.menge || 0), 0) / 2;
    const oSum = older2.reduce( (s, e) => s + (e.menge || 0), 0) / 2;
    let trend = '→';
    if (oSum > 0) { const r = rSum / oSum; if (r > 1.15) trend = '↑'; else if (r < 0.85) trend = '↓'; }

    let prognose = null;
    const prod = PRODUCTS.find(p2 => p2.name === p.name || p2.id === p.entries[0]?.produktId);
    if (prod && perWeek > 0) {
      const daysLeft = (stockLevels[prod.id] || 0) / (perWeek / 7);
      prognose = Math.round(daysLeft);
    }

    return { name: p.name, einheit: p.einheit, perWeek, trend, prognose };
  }).filter(w => w.perWeek > 0).sort((a, b) => b.perWeek - a.perWeek);
}

function calcPriceTrends() {
  const now = new Date();
  const tM = now.getMonth() + 1, tY = now.getFullYear();
  const pM = tM === 1 ? 12 : tM - 1, pY = tM === 1 ? tY - 1 : tY;
  const tKey = `${tY}-${String(tM).padStart(2,'0')}`;
  const pKey = `${pY}-${String(pM).padStart(2,'0')}`;

  const byProduct = {};
  HISTORY.filter(e => e.preis != null && e.preis > 0).forEach(e => {
    if (!byProduct[e.produktName]) byProduct[e.produktName] = { name: e.produktName, all: [], thisM: [], prevM: [] };
    byProduct[e.produktName].all.push(e.preis);
    if (e.datum.startsWith(tKey)) byProduct[e.produktName].thisM.push(e.preis);
    if (e.datum.startsWith(pKey)) byProduct[e.produktName].prevM.push(e.preis);
  });

  const avg = arr => arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : null;

  return Object.values(byProduct)
    .map(p => ({
      name:       p.name,
      currentAvg: avg(p.thisM),
      lastAvg:    avg(p.prevM),
      minEver:    Math.min(...p.all),
      diff:       (avg(p.thisM) != null && avg(p.prevM) != null) ? avg(p.thisM) - avg(p.prevM) : null,
    }))
    .filter(p => p.currentAvg != null || p.lastAvg != null)
    .sort((a, b) => (b.currentAvg || 0) - (a.currentAvg || 0));
}

function exportMonthAsText() {
  const now = new Date();
  const mKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthName = now.toLocaleString('de-DE', { month: 'long', year: 'numeric' });
  const entries = HISTORY.filter(e => e.datum.startsWith(mKey));
  const total = entries.reduce((s, e) => s + (e.preis != null && e.menge != null ? e.preis * e.menge : 0), 0);

  let text = `🍕 Pizzeria Einkauf — ${monthName}\n`;
  text += `${'═'.repeat(34)}\n`;
  text += `Gesamt: ${total.toLocaleString('de-DE', {style:'currency',currency:'EUR'})}\n\n`;

  const byShop = {};
  entries.forEach(e => {
    const key = e.shopName || 'Kein Geschäft';
    if (!byShop[key]) byShop[key] = [];
    byShop[key].push(e);
  });

  Object.entries(byShop).forEach(([shop, es]) => {
    const shopTotal = es.reduce((s, e) => s + (e.preis != null && e.menge != null ? e.preis * e.menge : 0), 0);
    text += `📦 ${shop}: ${shopTotal.toLocaleString('de-DE',{style:'currency',currency:'EUR'})}\n`;
    es.forEach(e => {
      text += `  • ${e.produktName}: ${e.menge != null ? e.menge : ''}${e.einheit || ''} × ${e.preis != null ? e.preis.toLocaleString('de-DE',{style:'currency',currency:'EUR'}) : '—'}\n`;
    });
    text += '\n';
  });

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('Monatsbericht in Zwischenablage kopiert! ✓')).catch(() => prompt('Text kopieren:', text));
  } else {
    prompt('Text kopieren:', text);
  }
}

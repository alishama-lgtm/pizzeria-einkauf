<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pizzeria Einkauf</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- SheetJS — Excel & CSV parsing in browser -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary-fixed": "#dfe0ff",
            "on-primary-fixed": "#410000",
            "secondary-fixed": "#ffdad4",
            "surface-bright": "#fff8f6",
            "primary-fixed": "#ffdad4",
            "surface-variant": "#f8dcd8",
            "inverse-on-surface": "#ffedea",
            "on-secondary-fixed-variant": "#7b2d23",
            "tertiary": "#00178d",
            "surface-container-highest": "#f8dcd8",
            "on-error": "#ffffff",
            "on-background": "#261816",
            "on-tertiary-fixed-variant": "#0d2ccc",
            "on-primary": "#ffffff",
            "secondary-fixed-dim": "#ffb4a8",
            "primary": "#610000",
            "on-primary-container": "#ff907f",
            "surface-tint": "#b52619",
            "background": "#fff8f6",
            "outline": "#8e706b",
            "primary-container": "#8b0000",
            "inverse-primary": "#ffb4a8",
            "error": "#ba1a1a",
            "surface-dim": "#efd4d0",
            "on-surface-variant": "#5a403c",
            "on-tertiary-container": "#9ea9ff",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#261816",
            "on-secondary-fixed": "#400201",
            "surface": "#fff8f6",
            "tertiary-fixed-dim": "#bcc3ff",
            "primary-fixed-dim": "#ffb4a8",
            "inverse-surface": "#3d2c2a",
            "on-secondary": "#ffffff",
            "error-container": "#ffdad6",
            "on-error-container": "#93000a",
            "surface-container-low": "#fff0ee",
            "secondary-container": "#fe9383",
            "surface-container": "#ffe9e6",
            "tertiary-container": "#0025c8",
            "on-tertiary-fixed": "#000d60",
            "surface-container-high": "#fee2dd",
            "on-secondary-container": "#772a20",
            "on-primary-fixed-variant": "#920703",
            "on-tertiary": "#ffffff",

          },
          fontFamily: {

            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    /* ════ RESET & BASE ════ */
    *, *::before, *::after { box-sizing: border-box; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle; user-select: none;
    }
    .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f4f4f6;
      color: #1e1e2e;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    h1, h2, h3, h4, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ════ ANIMATIONS ════ */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .spinner { width:40px; height:40px; border:3px solid #ddd; border-top-color:#8B0000; border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }
    .spinner-sm { width:18px; height:18px; border:2px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
    .progress-fill { transition: width .3s ease; }
    .tab-indicator { position:absolute; bottom:0; left:0; right:0; height:3px; background:#8B0000; border-radius:3px 3px 0 0; }
    .add-btn.added { background:#dfe0ff !important; color:#0d2ccc !important; border-color:#c7c9f9 !important; cursor:default; }
    .add-btn.adding { opacity:.6; cursor:not-allowed !important; }
    .hide-scrollbar::-webkit-scrollbar { display:none; }
    .hide-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

    /* ════ WEBSITE CARDS ════ */
    .ws-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8ed;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 24px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .ws-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.10); }
    .ws-card-sm { padding: 18px; border-radius: 14px; }

    /* ════ STAT CARDS ════ */
    .stat-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8ed;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 22px 24px;
      display: flex; align-items: center; gap: 18px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
    .stat-icon {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .stat-icon-red { background: #fff0ee; color: #8B0000; }
    .stat-icon-green { background: #e8f5e9; color: #2e7d32; }
    .stat-icon-amber { background: #fff8e1; color: #f57f17; }
    .stat-icon-blue { background: #e3f2fd; color: #1565c0; }
    .stat-num { font-family: 'Plus Jakarta Sans',sans-serif; font-size: 32px; font-weight: 800; line-height: 1; color: #1e1e2e; }
    .stat-label { font-size: 13px; color: #6b7280; font-weight: 500; margin-top: 3px; }
    .stat-sub { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 8px; display: inline-block; margin-top: 4px; }
    .stat-sub-red { background: #ffdad6; color: #93000a; }
    .stat-sub-green { background: #e8f5e9; color: #1b5e20; }
    .stat-sub-amber { background: #fff8e1; color: #e65100; }

    /* ════ WEBSITE TABLES ════ */
    .ws-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .ws-table thead tr { background: #f8f8fa; }
    .ws-table thead th {
      padding: 14px 20px; text-align: left;
      font-size: 12px; font-weight: 700; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 2px solid #e8e8ed;
    }
    .ws-table tbody tr { border-bottom: 1px solid #f0f0f5; transition: background .1s; }
    .ws-table tbody tr:hover { background: #fafafa; }
    .ws-table tbody tr:last-child { border-bottom: none; }
    .ws-table tbody td { padding: 14px 20px; color: #1e1e2e; height: 52px; vertical-align: middle; }
    .ws-table tbody tr:nth-child(even) td { background: #fafafa; }

    /* ════ WEBSITE BUTTONS ════ */
    .ws-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .ws-btn .material-symbols-outlined { font-size: 18px; }
    .ws-btn-primary { background: #8B0000; color: #fff; }
    .ws-btn-primary:hover { background: #6a0000; box-shadow: 0 4px 12px rgba(139,0,0,0.3); }
    .ws-btn-secondary { background: #fff; color: #8B0000; border: 1.5px solid #e3beb8; }
    .ws-btn-secondary:hover { background: #fff0ee; border-color: #8B0000; }
    .ws-btn-ghost { background: transparent; color: #6b7280; border: 1.5px solid #e8e8ed; }
    .ws-btn-ghost:hover { background: #f4f4f6; color: #1e1e2e; }
    .ws-btn-sm { padding: 7px 16px; font-size: 13px; }
    .ws-btn-sm .material-symbols-outlined { font-size: 15px; }

    /* ════ SECTION HEADERS ════ */
    .ws-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .ws-section-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px; font-weight: 800; color: #1e1e2e;
      display: flex; align-items: center; gap: 10px;
    }
    .ws-section-title .material-symbols-outlined { font-size: 22px; color: #8B0000; }
    .ws-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .ws-badge-red { background: #ffdad6; color: #93000a; }
    .ws-badge-green { background: #e8f5e9; color: #1b5e20; }
    .ws-badge-amber { background: #fff8e1; color: #c66900; }

    /* ════ INPUT / FORM ════ */
    .ws-input {
      width: 100%; padding: 11px 14px;
      border-radius: 10px; border: 1.5px solid #e2e2e8;
      font-size: 14px; font-family: inherit; color: #1e1e2e;
      background: #fff; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .ws-input:focus { border-color: #8B0000; box-shadow: 0 0 0 3px rgba(139,0,0,0.08); }
    .ws-label { display: block; font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 5px; }

    /* ════ HEADER ════ */
    #app-header {
      background: #fff;
      border-bottom: 1px solid #e2e2e8;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      transition: background .3s, box-shadow .3s;
    }
    #app-header .header-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 70px; gap: 20px;
    }
    .header-logo { display:flex; align-items:center; gap:14px; flex-shrink:0; }
    .header-logo-icon { font-size:34px; line-height:1; }
    .header-logo-text {
      font-family: 'Plus Jakarta Sans',sans-serif;
      font-weight: 800; font-size: 22px; color: #8B0000;
      letter-spacing: -0.03em; line-height: 1.1;
    }
    .header-logo-sub {
      font-size: 11px; color: #9ca3af; font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .header-bell-btn {
      border: none; background: transparent; cursor: pointer;
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; color: #8B0000;
    }
    .header-bell-btn:hover { background: #fff0ee; }
    #biz-header-btn {
      display: flex; align-items: center; gap: 8px;
      background: #1a1a2e; color: #D4AF37;
      border: 1.5px solid #2d2d4a; border-radius: 10px;
      padding: 9px 18px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: all .2s; white-space: nowrap;
    }
    #biz-header-btn:hover { background: #252540; border-color: #D4AF37; }
    #biz-header-btn.active { background: #D4AF37; color: #1a1a2e; border-color: #D4AF37; }
    #biz-header-btn .material-symbols-outlined { font-size: 16px; }

    /* ════ STAFF TAB BAR ════ */
    #staff-tab-bar {
      background: #fff;
      border-bottom: 2px solid #e8e8ed;
      position: sticky; top: 70px; z-index: 40;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    #staff-tab-bar .tabs-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; padding: 0 40px;
      overflow-x: auto; gap: 4px; align-items: flex-end;
    }
    #staff-tab-bar .tab-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 24px; height: 56px;
      border: none; border-bottom: 3px solid transparent;
      background: none; cursor: pointer;
      font-size: 15px; font-weight: 500; font-family: inherit;
      color: #6b7280; white-space: nowrap;
      transition: color .15s, border-color .15s;
      position: relative; margin-bottom: -2px;
    }
    #staff-tab-bar .tab-btn:hover { color: #8B0000; background: #fff5f5; border-radius: 8px 8px 0 0; }
    #staff-tab-bar .tab-btn.tab-active {
      color: #8B0000; font-weight: 700;
      border-bottom: 3px solid #8B0000;
      background: #fff0ee; border-radius: 8px 8px 0 0;
    }
    #staff-tab-bar .tab-btn .material-symbols-outlined { font-size: 20px; }

    /* ════ STATS BAR ════ */
    #stats-dashboard {
      background: transparent;
      padding: 28px 0 8px;
    }
    #stats-dashboard.hidden { display: none; }

    /* ════ MOBILE BOTTOM NAV ════ */
    #mobile-bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(232,232,237,0.8);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
      padding: 6px 4px 20px;
      display: flex; align-items: center; justify-content: space-around;
    }
    .mob-nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 6px 2px; min-width: 42px; max-width: 68px;
      border: none; background: none; cursor: pointer;
      font-size: 9px; font-weight: 500; color: #9ca3af;
      font-family: inherit; transition: color .15s; border-radius: 10px;
    }
    .mob-nav-btn .material-symbols-outlined { font-size: 22px; transition: color .15s; }
    .mob-nav-btn.mob-active { color: #8B0000; font-weight: 700; background: #fff0ee; }
    .mob-nav-btn.mob-active .material-symbols-outlined { color: #8B0000; }
    #mob-biz-btn {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 6px 10px;
      border: 1.5px solid #2d2d4a; background: #1a1a2e;
      border-radius: 12px; cursor: pointer;
      font-size: 9px; font-weight: 700; color: #D4AF37;
      font-family: inherit; transition: all .15s;
    }
    #mob-biz-btn .material-symbols-outlined { font-size: 18px; color: #D4AF37; }
    #mob-biz-btn.mob-biz-active { background: #D4AF37 !important; border-color: #D4AF37 !important; color: #1a1a2e !important; }
    #mob-biz-btn.mob-biz-active .material-symbols-outlined { color: #1a1a2e !important; }

    /* ════ MEHR DRAWER ════ */
    #mehr-drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 48;
      backdrop-filter: blur(2px);
    }
    #mehr-drawer {
      position: fixed;
      bottom: 78px; left: 0; right: 0;
      background: #fff;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
      z-index: 49;
      padding: 8px 16px 24px;
      transform: translateY(110%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    #mehr-drawer.drawer-open { transform: translateY(0); }
    .drawer-handle { width: 40px; height: 4px; background: #e2e2e8; border-radius: 2px; margin: 8px auto 16px; }
    .drawer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .drawer-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 5px; padding: 14px 4px 12px;
      border: 1.5px solid #e8e8ed; border-radius: 14px;
      background: #fff; cursor: pointer;
      font-size: 11px; font-weight: 600; color: #6b7280;
      font-family: inherit; transition: all .15s;
    }
    .drawer-item.mob-active { background: #fff0ee; border-color: #e3beb8; color: #8B0000; }
    .drawer-item .material-symbols-outlined { font-size: 24px; }

    /* FM mobile badge */
    .mob-nav-btn { position: relative; }

    /* Responsive FM cards */
    @media (min-width: 640px) {
      .fm-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
    }

    /* ════ FOOTER ════ */
    #app-footer {
      background: #fff;
      border-top: 1px solid #e8e8ed;
      padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: #9ca3af; flex-wrap: wrap; gap: 8px;
    }
    #app-footer strong { color: #6b7280; }
    body.biz-mode #app-footer { display: none; }

    /* ════ BUSINESS DARK MODE ════ */
    body.biz-mode { background: #0d0d1a !important; color: #e0e0f0 !important; }
    body.biz-mode #app-header { background: #12122a; border-bottom-color: #2d2d4a; box-shadow: 0 1px 12px rgba(0,0,0,.4); }
    body.biz-mode #app-header .header-logo-text { color: #D4AF37; }
    body.biz-mode #app-header .header-logo-sub { color: #8888aa; }
    body.biz-mode #staff-tab-bar { display: none !important; }
    body.biz-mode #stats-dashboard { display: none !important; }
    body.biz-mode #mobile-bottom-nav { background: rgba(18,18,42,.95); border-top-color: rgba(45,45,74,.6); }
    body.biz-mode #panel-business { background: #0d0d1a; min-height: 60vh; }
    body:not(.biz-mode) #staff-tab-bar { display: block; }

    /* ════ RESPONSIVE ════ */
    @media (max-width: 1024px) {
      #app-header .header-inner { padding: 0 24px; }
      #staff-tab-bar .tabs-inner { padding: 0 24px; }
      #app-main { padding-left: 24px !important; padding-right: 24px !important; }
      #app-footer { padding: 14px 24px; }
    }
    @media (max-width: 640px) {
      #app-header .header-inner { padding: 0 16px; height: 60px; }
      .header-logo-text { font-size: 18px; }
      .header-logo-icon { font-size: 26px; }
      .header-logo-sub { display: none; }
    }
  </style>
</head>
<body style="background-color:#f4f4f6;color:#1e1e2e;min-height:100vh;">

<!-- ═══ HEADER ═══ -->
<header id="app-header">
  <div class="header-inner">
    <!-- Logo -->
    <div class="header-logo">
      <span class="header-logo-icon">🍕</span>
      <div>
        <div class="header-logo-text">Pizzeria Ali Shama KG</div>
        <div class="header-logo-sub">Einkauf &amp; Warenverwaltung</div>
      </div>
    </div>

    <!-- Right Actions -->
    <div class="header-right">
      <!-- Low-stock badge -->
      <div id="header-badge" style="display:none;align-items:center;gap:6px;background:#ffdad6;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:#93000a;">
        <span class="material-symbols-outlined" style="font-size:16px">warning</span>
        <span id="header-badge-text"></span>
      </div>
      <!-- Bell -->
      <button id="notif-bell-btn" class="header-bell-btn" onclick="showLowStockPopup()">
        <span class="material-symbols-outlined" style="font-size:24px;">notifications</span>
      </button>
      <!-- Business Button -->
      <button id="biz-header-btn" onclick="switchTab('business')">
        <span class="material-symbols-outlined" id="biz-lock-icon">lock</span>
        💼 Business
      </button>
    </div>
  </div>
</header>

<!-- ═══ DESKTOP STAFF TAB BAR ═══ -->
<nav id="staff-tab-bar" class="hidden md:block">
  <div class="tabs-inner hide-scrollbar">
    <button data-nav-tab="produkte" onclick="switchTab('produkte')" class="tab-btn">
      <span class="material-symbols-outlined">inventory_2</span>Produkte
    </button>
    <button data-nav-tab="geschaefte" onclick="switchTab('geschaefte')" class="tab-btn">
      <span class="material-symbols-outlined">store</span>Geschäfte
    </button>
    <button data-nav-tab="kombis" onclick="switchTab('kombis')" class="tab-btn tab-active">
      <span class="material-symbols-outlined">lightbulb</span>Kombis
      <span id="kombis-tab-badge" style="display:none;background:#8B0000;color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;align-items:center;justify-content:center;margin-left:2px"></span>
    </button>
    <button data-nav-tab="suche" onclick="switchTab('suche')" class="tab-btn">
      <span class="material-symbols-outlined">search</span>Suche
    </button>
    <button data-nav-tab="upload" onclick="switchTab('upload')" class="tab-btn">
      <span class="material-symbols-outlined">photo_camera</span>Upload
    </button>
    <button data-nav-tab="verlauf" onclick="switchTab('verlauf')" class="tab-btn">
      <span class="material-symbols-outlined">bar_chart</span>Verlauf
    </button>
    <button data-nav-tab="mitarbeiter" onclick="switchTab('mitarbeiter')" class="tab-btn">
      <span class="material-symbols-outlined">badge</span>Mitarbeiter
    </button>
    <button data-nav-tab="fehlmaterial" onclick="switchTab('fehlmaterial')" class="tab-btn">
      <span class="material-symbols-outlined">assignment_late</span>Fehlmaterial
      <span id="fehl-tab-badge" style="display:none;background:#e53935;color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;align-items:center;justify-content:center;margin-left:2px"></span>
    </button>

// ═══════════════════════════════════════════════════════════════

const PRODUCTS = [

const VERLAUF_FILTER = { shop: '', produkt: '', monat: '' };

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function eur(val) {
  return val.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
}

function getLowStockProducts() {
  return PRODUCTS.filter(p => stockLevels[p.id] < p.minStock);
}

function getPrice(shopId, productId) {
  return PRICE_MAP[shopId]?.[productId] ?? null;
}

// ═══════════════════════════════════════════════════════════════
// COMBINATIONS ALGORITHM
// ═══════════════════════════════════════════════════════════════

function calcSingleShopCombo(shop, lowProducts) {
  const items = [];
  for (const p of lowProducts) {
    const price = getPrice(shop.id, p.id);
    if (price === null) return null;
    items.push({ product: p, shop, pricePerUnit: price, quantity: p.orderQuantity, totalCost: price * p.orderQuantity });
  }
  const totalCost = items.reduce((s, i) => s + i.totalCost, 0);
  return { id: 'single-' + shop.id, shops: [shop], items, totalCost, numShops: 1, isRecommended: false };
}

function calcTwoShopCombo(shopA, shopB, lowProducts) {
  const items = [];
  for (const p of lowProducts) {
    const pA = getPrice(shopA.id, p.id);
    const pB = getPrice(shopB.id, p.id);
    if (pA === null && pB === null) return null;
    let chosenShop, chosenPrice;
    if (pA === null)      { chosenShop = shopB; chosenPrice = pB; }
    else if (pB === null) { chosenShop = shopA; chosenPrice = pA; }
    else                  { chosenShop = pA <= pB ? shopA : shopB; chosenPrice = Math.min(pA, pB); }
    items.push({ product: p, shop: chosenShop, pricePerUnit: chosenPrice, quantity: p.orderQuantity, totalCost: chosenPrice * p.orderQuantity });
  }
  // Only count shops actually used
  const usedIds = new Set(items.map(i => i.shop.id));
  if (usedIds.size < 2) return null; // degenerate – same as single shop
  const totalCost = items.reduce((s, i) => s + i.totalCost, 0);
  const shops = SHOPS.filter(s => usedIds.has(s.id));
  return { id: 'two-' + shopA.id + '-' + shopB.id, shops, items, totalCost, numShops: 2, isRecommended: false };
}

function calculateCombinations() {
  const low = getLowStockProducts();
  if (low.length === 0) return { single: [], two: [], hasLow: false };

  // Single shop
  const single = SHOPS
    .map(s => calcSingleShopCombo(s, low))
    .filter(Boolean)
    .sort((a, b) => a.totalCost - b.totalCost)
    .slice(0, 3);

  // Two shop
  const two = [];
  for (let i = 0; i < SHOPS.length; i++) {
    for (let j = i + 1; j < SHOPS.length; j++) {
      const c = calcTwoShopCombo(SHOPS[i], SHOPS[j], low);
      if (c) two.push(c);
    }
  }
  two.sort((a, b) => a.totalCost - b.totalCost);
  const top3Two = two.slice(0, 3);

  // Mark globally cheapest as EMPFOHLEN
  const all = [...top3Two, ...single];
  if (all.length > 0) {
    all.sort((a, b) => a.totalCost - b.totalCost);
    all[0].isRecommended = true;
  }

  return { single, two: top3Two, hasLow: true };
}

function daysUntilMonday() {
  const day = new Date().getDay(); // 0=Sun,1=Mon,...
  return day === 0 ? 1 : day === 1 ? 7 : 8 - day;
}

function renderShopsTab() {
  const lowIds = new Set(getLowStockProducts().map(p => p.id));

  // ── 1. PREISVERGLEICH TABELLE ────────────────────────────────
  // Per product: find min and max price across all shops
  const priceStats = {};
  for (const p of PRODUCTS) {
    const vals = SHOPS.map(s => getPrice(s.id, p.id)).filter(v => v !== null);
    if (vals.length) priceStats[p.id] = { min: Math.min(...vals), max: Math.max(...vals) };
  }
  const productsWithPrices = PRODUCTS.filter(p => priceStats[p.id]);

  const thCols = SHOPS.map(s =>
    `<th style="padding:8px 14px;font-size:11px;font-weight:700;color:#5a403c;text-align:right;white-space:nowrap;border-bottom:2px solid #e3beb8;min-width:82px">${s.name}</th>`
  ).join('');

  const tRows = productsWithPrices.map(p => {
    const { min, max } = priceStats[p.id];
    const allSame = min === max;
    const cells = SHOPS.map(s => {
      const v = getPrice(s.id, p.id);
      if (v === null) return `<td style="padding:8px 14px;text-align:right;font-size:13px;color:#c9b8b4">—</td>`;
      const isMin = v === min;
      const isMax = !allSame && v === max;
      const style = isMin
        ? 'padding:8px 14px;text-align:right;font-size:13px;font-weight:700;color:#16a34a;'
        : isMax
          ? 'padding:8px 14px;text-align:right;font-size:13px;color:#a89490;text-decoration:line-through;'
          : 'padding:8px 14px;text-align:right;font-size:13px;color:#261816;';
      return `<td style="${style}">${eur(v)}${isMin ? ' <span style="font-size:10px">✓</span>' : ''}</td>`;
    }).join('');

    const rowBg = lowIds.has(p.id) ? 'background:#fff5f5;' : '';
    return `
      <tr style="border-bottom:1px solid #f5f0ee;${rowBg}">
        <td style="padding:8px 14px;white-space:nowrap">
          <div style="display:flex;align-items:center;gap:5px">

            <span style="font-size:10px;color:#8e706b">/${p.unit}</span>

        </td>

        </table>
        <div style="padding:6px 14px;background:#fafafa;border-top:1px solid #f0ece8;display:flex;gap:14px;align-items:center;flex-wrap:wrap">
          <span style="font-size:10px;color:#16a34a;font-weight:700">✓ günstigster Preis</span>
          <span style="font-size:10px;color:#a89490;text-decoration:line-through">teuerster Preis</span>
          ${getLowStockProducts().length > 0 ? '<span style="font-size:10px;color:#ba1a1a;margin-left:auto">⚠ Niedriger Bestand</span>' : ''}
        </div>
      </div>
    </div>`;

  // ── 2+3. AKTIONEN ─────────────────────────────────────────────
  function dealCard(deal, badge, badgeColor) {
    const product = PRODUCTS.find(p => p.id === deal.productId);
    const shop    = SHOPS.find(s => s.id === deal.shopId);
    if (!product || !shop) return '';
    const saving  = deal.normalPrice - deal.pricePerUnit;
    const pct     = Math.round((saving / deal.normalPrice) * 100);
    return `
      <div style="background:#fff;border-radius:10px;border:1px solid #e3beb8;padding:11px 13px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:#261816;flex:1">${product.name}</span>
          <span style="font-size:9px;font-weight:700;color:#fff;background:${badgeColor};padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0">${badge}</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:7px;margin-bottom:4px">
          <span style="font-size:16px;font-weight:800;color:#610000">${eur(deal.pricePerUnit)}</span>
          <span style="font-size:11px;color:#a89490;text-decoration:line-through">${eur(deal.normalPrice)}</span>
          <span style="font-size:11px;font-weight:700;color:#16a34a">−${pct}%</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#8e706b">
          <span style="font-weight:600;color:#5a403c">${shop.name}</span>
          <span>bis ${deal.validTo}</span>
        </div>
      </div>`;
  }

  const curDeals  = DEALS.filter(d => d.week === 'current').sort((a,b) => (b.normalPrice-b.pricePerUnit)-(a.normalPrice-a.pricePerUnit));
  const nextDeals = DEALS.filter(d => d.week === 'next').sort((a,b) => (b.normalPrice-b.pricePerUnit)-(a.normalPrice-a.pricePerUnit));

  const dealsSection = (curDeals.length + nextDeals.length) === 0 ? '' : `
    ${curDeals.length > 0 ? `
    <div style="margin-bottom:20px">
      <p style="font-size:11px;font-weight:700;color:#261816;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
        <span style="background:#ba1a1a;color:#fff;padding:2px 7px;border-radius:3px;font-size:10px;margin-right:6px">DIESE WOCHE</span>Aktuelle Angebote
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">${curDeals.map(d => dealCard(d,'DIESE WOCHE','#ba1a1a')).join('')}</div>
    </div>` : ''}
    ${nextDeals.length > 0 ? `
    <div style="margin-bottom:20px">
      <p style="font-size:11px;font-weight:700;color:#261816;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
        <span style="background:#b06020;color:#fff;padding:2px 7px;border-radius:3px;font-size:10px;margin-right:6px">AB MONTAG</span>Nächste Woche
        <span style="font-size:11px;font-weight:400;color:#5a403c;text-transform:none;letter-spacing:0;margin-left:6px">· noch ${daysUntilMonday()} Tage warten lohnt sich!</span>
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">${nextDeals.map(d => dealCard(d,'AB MONTAG','#b06020')).join('')}</div>
    </div>` : ''}`;

  // ── 4. GESCHÄFTE ÜBERSICHT ────────────────────────────────────
  const typeMap = {
    'Großhandel': '🏭 GROSSHANDEL', 'Supermarkt': '🛒 SUPERMARKT',
    'Discounter': '🏷️ DISCOUNTER',  'Türkmarkt':  '🌙 TÜRKMARKT',
  };

  const shopCards = SHOPS.map(shop => {
    const total = PRODUCTS.reduce((s, p) => {
      const v = getPrice(shop.id, p.id); return v ? s + v * p.orderQuantity : s;
    }, 0);
    const cnt = PRODUCTS.filter(p => getPrice(shop.id, p.id) !== null).length;
    const badge = typeMap[shop.type] || ('🏪 ' + shop.type.toUpperCase());
    return `
      <div style="border-radius:10px;border:1px solid #e3beb8;overflow:hidden;background:#fff">
        <div style="background:#8B0000;padding:9px 13px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:14px;font-weight:700;color:#fff">${shop.name}</span>
          <span style="font-size:9px;font-weight:700;color:rgba(255,255,255,.8)">${badge}</span>
        </div>
        <div style="padding:9px 13px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:#8e706b">${cnt} Produkte</span>
          <div style="text-align:right">
            <span style="font-size:9px;color:#8e706b;display:block;text-transform:uppercase;letter-spacing:.06em">Gesamteinkauf</span>
            <span style="font-size:16px;font-weight:800;color:#261816">${eur(total)}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  const shopsSection = `
    <div style="margin-bottom:22px">
      <p style="font-size:11px;font-weight:700;color:#8e706b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Geschäfte Übersicht</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">${shopCards}</div>
    </div>`;

  document.getElementById('panel-geschaefte').innerHTML = tableSection + dealsSection + shopsSection;
}

// ── Empfohlene Kombi: kompakte Karte, 2-spaltige Shop-Ansicht ──
function renderFeaturedCombo(combo) {
  const byShop = {};
  for (const item of combo.items) {
    if (!byShop[item.shop.id]) byShop[item.shop.id] = { shop: item.shop, items: [], subtotal: 0 };
    byShop[item.shop.id].items.push(item);
    byShop[item.shop.id].subtotal += item.totalCost;
  }
  const shopGroups = Object.values(byShop);

  const shopCols = shopGroups.map(group => {
    const rows = group.items.map(item => `
      <div style="display:flex;justify-content:space-between;align-items:center;height:40px;border-bottom:1px solid #f5f0ee">
        <span style="font-size:13px;font-weight:600;color:#261816;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px">${item.product.name}</span>
        <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
          <span style="font-size:11px;color:#8e706b">${item.quantity}×</span>
          <span style="font-size:11px;color:#8e706b">${eur(item.pricePerUnit)}/${item.product.unit}</span>
          <span style="font-size:13px;font-weight:700;color:#261816;min-width:44px;text-align:right">${eur(item.totalCost)}</span>
        </div>
      </div>`).join('');

    return `
      <div style="background:#fff;border-radius:8px;border:1px solid #e3beb8;overflow:hidden">
        <div style="padding:7px 12px;border-bottom:2px solid ${group.shop.color};display:flex;justify-content:space-between;align-items:center;background:#fafafa">
          <span style="font-size:12px;font-weight:700;color:${group.shop.color}">${group.shop.name}</span>
          <span style="font-size:12px;font-weight:700;color:#261816">${eur(group.subtotal)}</span>
        </div>
        <div style="padding:0 12px">${rows}</div>
      </div>`;
  }).join('');

  const shopBadges = combo.shops.map(s =>
    `<span style="background:${s.color};color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px">${s.name}</span>`
  ).join('<span style="color:rgba(255,255,255,.5);font-size:12px;margin:0 2px">+</span>');

  return `
    <div style="border-radius:12px;border:2px solid #610000;overflow:hidden;box-shadow:0 2px 12px rgba(97,0,0,.1)">
      <div style="background:linear-gradient(135deg,#610000,#8b0000);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${shopBadges}</div>
        <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,.9);background:rgba(255,255,255,.15);padding:2px 8px;border-radius:4px;letter-spacing:.06em;white-space:nowrap">★ EMPFOHLEN</span>
      </div>
      <div style="background:#fafafa;padding:10px 12px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:10px">
          ${shopCols}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid #e3beb8">
          <button onclick="printCombo('${combo.id}')"
            style="padding:6px 13px;border-radius:7px;border:1px solid #e3beb8;background:#fff;font-size:12px;font-weight:600;color:#5a403c;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px"
            onmouseover="this.style.background='#fff0ee'" onmouseout="this.style.background='#fff'">
            <span class="material-symbols-outlined" style="font-size:14px">print</span> Drucken
          </button>
          <div style="display:flex;align-items:baseline;gap:5px">
            <span style="font-size:12px;color:#8e706b;font-weight:600">Gesamt</span>
            <span style="font-size:22px;font-weight:800;color:#610000;letter-spacing:-.02em">${eur(combo.totalCost)}</span>
          </div>
        </div>
      </div>
    </div>`;
}

function switchTab(tab) {
  const isBiz = tab === 'business';

  // ── panels ──
  ['produkte','geschaefte','kombis','suche','upload','verlauf','mitarbeiter','fehlmaterial','checkliste','business'].forEach(t => {
    document.getElementById('panel-'+t).style.display = t === tab ? 'block' : 'none';
  });

  // ── desktop staff tabs ──
  document.querySelectorAll('#staff-tab-bar [data-nav-tab]').forEach(el => {
    el.classList.toggle('tab-active', el.dataset.navTab === tab);
  });

  // ── close mehr drawer ──
  if (typeof closeMehrDrawer === 'function') closeMehrDrawer();

  // ── mobile staff buttons ──
  document.querySelectorAll('[data-bottom-nav]').forEach(el => {
    el.classList.toggle('mob-active', el.dataset.bottomNav === tab);
  });

  // ── drawer nav items ──
  const drawerTabs = ['geschaefte','upload','verlauf','mitarbeiter','checkliste','business'];
  document.querySelectorAll('[data-drawer-nav]').forEach(el => {
    el.classList.toggle('mob-active', el.dataset.drawerNav === tab);
  });
  const mehrBtn = document.getElementById('mob-mehr-btn');
  if (mehrBtn) mehrBtn.classList.toggle('mob-active', drawerTabs.includes(tab) && tab !== 'business');

  // ── business button states ──
  const bizBtn    = document.getElementById('biz-header-btn');
  const mobBizBtn = document.getElementById('mob-biz-btn');
  if (bizBtn)    bizBtn.classList.toggle('active', isBiz);
  if (mobBizBtn) mobBizBtn.classList.toggle('mob-biz-active', isBiz);

  // ── dark mode / light mode ──
  document.body.classList.toggle('biz-mode', isBiz);
  document.body.style.backgroundColor = isBiz ? '' : '#f4f4f6';

  // ── stats dashboard — hidden globally (dashboard is inside Kombis panel) ──
  const statsDash = document.getElementById('stats-dashboard');
  if (statsDash) statsDash.style.display = 'none';

  // ── footer time ──
  const ft = document.getElementById('footer-time');
  if (ft) ft.textContent = new Date().toLocaleTimeString('de-AT', {hour:'2-digit',minute:'2-digit'}) + ' Uhr';

  // ── render content ──
  if (tab === 'produkte')    renderProductsTab();
  if (tab === 'geschaefte')  renderShopsTab();
  if (tab === 'kombis')      renderKombisTab();
  if (tab === 'suche')       renderSucheTab();
  if (tab === 'upload')      renderUploadTab();
  if (tab === 'verlauf')     renderVerlaufTab();
  if (tab === 'mitarbeiter')   renderMitarbeiterTab();
  if (tab === 'fehlmaterial') renderFehlmaterialTab();
  if (tab === 'checkliste')  renderChecklisteTab();
  if (isBiz) {
    const lockIcon    = document.getElementById('biz-lock-icon');
    const mobLockIcon = document.getElementById('mob-biz-lock');
    if (!bizIsAuth()) {
      renderBizLocked();
      if (lockIcon)    lockIcon.textContent = 'lock';
      if (mobLockIcon) mobLockIcon.textContent = 'lock';
    } else {
      renderBusinessTab();
      if (lockIcon)    lockIcon.textContent = 'lock_open';
      if (mobLockIcon) mobLockIcon.textContent = 'lock_open';
    }
  }
}

function editStock(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product) return;
  const current = stockLevels[productId];
  const input = prompt(`Aktuellen Bestand für "${product.name}" eingeben (${product.unit}):`, current);
  if (input === null) return;
  const val = parseFloat(input.replace(',', '.'));
  if (isNaN(val) || val < 0) { alert('Ungültiger Wert'); return; }
  stockLevels[productId] = val;

  // Auto-Fehlmaterial wenn unter Minimum
  if (val < product.minStock && typeof FM_DATA !== 'undefined' && typeof fmSave === 'function') {
    const alreadyOpen = FM_DATA.find(e =>
      e.status === 'offen' &&
      (e.produktId === productId || e.produktName === product.name)
    );
    if (!alreadyOpen) {
      FM_DATA.unshift({
        id: Date.now() + '_auto',
        datum: new Date().toISOString().slice(0, 10),
        uhrzeit: new Date().toLocaleTimeString('de-AT', {hour:'2-digit', minute:'2-digit'}),
        produktName: product.name,
        produktId: productId,
        menge: product.orderQuantity || product.minStock,
        einheit: product.unit,
        kategorie: 'Lebensmittel',
        prioritaet: val <= 0 ? 'dringend' : 'wichtig',
        bemerkung: 'Automatisch (Bestand unter Minimum)',
        eingetragenVon: 'System',
        status: 'offen',
        statusDatum: null,
      });
      fmSave();
      fmUpdateBadge();
      if (typeof fmShowToast === 'function')
        fmShowToast('⚠️ ' + product.name + ' automatisch in Fehlmaterial eingetragen');
    }
  }

  updateHeaderBadge();
  renderProductsTab();
}

const AT_SHOP_COLORS = {
  'hofer':   '#e63946',
  'billa':   '#ed1c24',
  'spar':    '#007f3e',
  'lidl':    '#0050aa',
  'metro':   '#003da5',
  'etsan':   '#ff6b00',
  'penny':   '#cc0000',
  'merkur':  '#004899',
  'rewe':    '#cc0000',
  'interspar': '#007f3e',
  'billa plus': '#ed1c24',
};

function shopColor(shopName) {
  const key = shopName.toLowerCase().trim();
  for (const [k, v] of Object.entries(AT_SHOP_COLORS)) {
    if (key.includes(k)) return v;
  }
  return '#555';
}

function renderSearchResults() {
  const { results, query } = SUCHE_STATE;
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">

        <span style="font-weight:700;color:#261816">${results.length} Angebot${results.length !== 1 ? 'e' : ''}</span>

      </span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px">`;

  results.forEach((r, idx) => {
    const color = shopColor(r.shop);
    const savings = (r.originalPrice && r.price && r.originalPrice > r.price)
      ? Math.round((1 - r.price / r.originalPrice) * 100)
      : null;

    let validHtml = '';
    if (r.validUntil) {
      const until = new Date(r.validUntil);
      const diffDays = Math.round((until - today) / 86400000);
      let textColor = '#5a403c', label = '';
      if (diffDays < 0) {
        textColor = '#ba1a1a'; label = `Abgelaufen (${fmtDate(r.validUntil)})`;
      } else if (diffDays === 0) {
        textColor = '#e67e22'; label = 'Heute letzter Tag';
      } else if (diffDays <= 3) {
        textColor = '#e67e22'; label = `Noch ${diffDays} Tag${diffDays !== 1 ? 'e' : ''} (bis ${fmtDate(r.validUntil)})`;
      } else {
        label = `Gültig bis ${fmtDate(r.validUntil)}`;
      }
      if (r.validFrom && r.validFrom > new Date().toISOString().slice(0, 10)) {
        label = `Ab ${fmtDate(r.validFrom)} bis ${fmtDate(r.validUntil)}`;
        textColor = '#5a403c';
      }
      validHtml = `<div style="display:flex;align-items:center;gap:4px;font-size:12px;color:${textColor}">
        <span class="material-symbols-outlined" style="font-size:13px">calendar_today</span>
        ${escHtml(label)}
      </div>`;
    }

    const isAdded = SUCHE_STATE.addedIds.has(idx);

    html += `
      <div style="background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid #e3beb866;display:flex;flex-direction:column">

          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

            ${r.source ? `<span style="font-size:11px;color:#8d6562">${escHtml(r.source)}</span>` : ''}
          </div>
          <p style="font-size:14px;font-weight:600;color:#261816;margin-bottom:3px">${escHtml(r.name)}</p>
          ${r.brand ? `<p style="font-size:12px;color:#5a403c;margin-bottom:10px">${escHtml(r.brand)}</p>` : ''}
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
            <span style="font-size:24px;font-weight:800;color:#610000">${r.price != null ? eur(r.price) : '—'}</span>
            ${r.originalPrice && r.originalPrice > r.price ? `<span style="font-size:13px;color:#8d6562;text-decoration:line-through">${eur(r.originalPrice)}</span>` : ''}
            ${savings ? `<span style="font-size:11px;font-weight:700;background:#ffdad6;color:#610000;padding:2px 8px;border-radius:10px">−${savings}%</span>` : ''}
          </div>
          ${r.unit ? `<p style="font-size:12px;color:#5a403c;margin-bottom:6px">pro ${escHtml(r.unit)}</p>` : ''}
          ${validHtml}
        </div>
        <div style="border-top:1px solid #e3beb844;padding:12px 16px">
          <button
            class="add-btn ${isAdded ? 'added' : ''}"
            onclick="addResultToInventory(${idx}, this)"
            ${isAdded ? 'disabled' : ''}
            style="width:100%;padding:9px;border-radius:12px;border:1.5px solid ${isAdded?'#c7c9f9':'#c0eda6'};background:${isAdded?'#dfe0ff':'#c0eda6'};color:${isAdded?'#0d2ccc':'#0c2000'};font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s">

}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function addResultToInventory(idx, btn) {
  const r = SUCHE_STATE.results[idx];
  if (!r) return;

  // Generate a stable id from the name
  const id = 'search-' + r.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30) + '-' + idx;

  // Check if already in PRODUCTS
  const existing = PRODUCTS.find(p => p.id === id);
  if (!existing) {
    const newProduct = {
      id,
      name: r.name + (r.brand ? ` (${r.brand})` : ''),
      category: 'Suche',
      unit: r.unit || 'Stk',
      currentStock: 0,
      minStock: 1,
      orderQuantity: 1,
    };
    PRODUCTS.push(newProduct);
    stockLevels[id] = 0;
    updateHeaderBadge();
  }

  addHistoryEntry({
    produktName: r.name + (r.brand ? ` (${r.brand})` : ''),
    produktId:   id,
    menge:       1,
    einheit:     r.unit  || 'Stk',
    preis:       r.price || null,
    shopName:    r.shop  || null,
    shopId:      null,
    quelle:      'suche',
  });

  SUCHE_STATE.addedIds.add(idx);

  // Update button in-place without full re-render
  btn.classList.add('added', 'adding');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:15px">check</span> Hinzugefügt';
  btn.classList.remove('adding');
}

function updateLoadingStep(text) {
  SUCHE_STATE.loadingStep = text;
  const el = document.getElementById('loading-step-text');
  if (el) el.textContent = text;
}

async function startSearch() {
  const input = document.getElementById('suche-input');
  const query = (input ? input.value : '').trim();
  if (!query) return;

  const hasKey = ANTHROPIC_API_KEY && ANTHROPIC_API_KEY !== 'HIER_API_KEY_EINFÜGEN';
  if (!hasKey) {
    SUCHE_STATE.error = 'Kein API Key konfiguriert. Bitte ANTHROPIC_API_KEY am Anfang der Datei eintragen.';
    renderSucheTab();
    return;
  }

  SUCHE_STATE.loading = true;
  SUCHE_STATE.error = null;
  SUCHE_STATE.results = [];
  SUCHE_STATE.query = query;
  SUCHE_STATE.addedIds = new Set();
  SUCHE_STATE.loadingStep = 'Verbinde mit Claude …';
  renderSucheTab();

  try {
    const results = await searchViaClaudeAPI(query);
    SUCHE_STATE.results = results;
    SUCHE_STATE.error = null;
  } catch (err) {
    SUCHE_STATE.error = err.message || String(err);
    SUCHE_STATE.results = [];
  } finally {
    SUCHE_STATE.loading = false;
    SUCHE_STATE.loadingStep = '';
    renderSucheTab();
  }
}

async function searchViaClaudeAPI(query) {
  const today = new Date().toISOString().slice(0, 10);

  const userPrompt =
    `Heute ist ${today}. Suche auf marktguru.at, aktionsfinder.at und wogibtswas.at ` +
    `nach aktuellen UND kommenden Angeboten für "${query}" bei österreichischen Händlern ` +
    `(Hofer, Billa, Billa Plus, Spar, Interspar, Eurospar, Lidl, Metro, Etsan, Penny, Merkur). ` +
    `Gib ALLE gefundenen Angebote zurück. ` +
    `Antworte NUR mit einem JSON-Array in exakt diesem Format, ohne Erklärungen, ohne Markdown:\n` +
    `[\n` +
    `  {\n` +
    `    "name": "Produktname",\n` +
    `    "brand": "Marke oder null",\n` +
    `    "shop": "Geschäftsname",\n` +
    `    "price": 1.99,\n` +
    `    "originalPrice": 2.49,\n` +
    `    "unit": "kg / L / Stk / etc.",\n` +
    `    "validFrom": "YYYY-MM-DD oder null",\n` +
    `    "validUntil": "YYYY-MM-DD oder null",\n` +
    `    "source": "marktguru.at / aktionsfinder.at / wogibtswas.at"\n` +
    `  }\n` +
    `]\n` +
    `Wenn keine Angebote gefunden werden, gib [] zurück.`;

  let messages = [{ role: 'user', content: userPrompt }];
  let maxContinuations = 6;

  while (maxContinuations-- > 0) {
    updateLoadingStep('Claude durchsucht österreichische Angebots-Websites …');

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 4096,
        thinking: { type: 'adaptive' },
        tools: [
          { type: 'web_search_20260209', name: 'web_search' },
          { type: 'web_fetch_20260209',  name: 'web_fetch'  },
        ],
        messages,
      }),
    });

    if (!resp.ok) {
      let errMsg = `HTTP ${resp.status}`;
      try {
        const errData = await resp.json();
        errMsg = errData?.error?.message || errMsg;
      } catch (_) {}
      if (resp.status === 401) throw new Error('Ungültiger API Key (401). Bitte API Key prüfen.');
      if (resp.status === 429) throw new Error('Rate Limit erreicht (429). Kurz warten und erneut versuchen.');
      throw new Error(errMsg);
    }

    const data = await resp.json();

    if (data.stop_reason === 'end_turn') {
      updateLoadingStep('Angebote werden verarbeitet …');
      const textBlock = data.content.find(b => b.type === 'text');
      const rawText = textBlock ? textBlock.text : '';
      return parseResultsJSON(rawText);
    }

    if (data.stop_reason === 'pause_turn') {
      // Server-side web search hit iteration limit → re-send to continue
      updateLoadingStep('Weitere Seiten werden durchsucht …');
      messages = [
        { role: 'user', content: userPrompt },
        { role: 'assistant', content: data.content },
      ];
      continue;
    }

    // Any other stop reason — try to extract text anyway
    const textBlock = data.content && data.content.find(b => b.type === 'text');
    if (textBlock) return parseResultsJSON(textBlock.text);
    throw new Error(`Unerwarteter Stop-Grund: ${data.stop_reason}`);
  }

  throw new Error('Suche hat zu lange gedauert (max. Iterationen erreicht).');
}

function parseResultsJSON(text) {
  if (!text || !text.trim()) return [];

  // Try direct parse
  try { return JSON.parse(text.trim()); } catch (_) {}

  // Strip markdown code fences
  const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceMatch) {
    try { return JSON.parse(fenceMatch[1].trim()); } catch (_) {}
  }

  // Find first JSON array
  const arrMatch = text.match(/\[[\s\S]*\]/);
  if (arrMatch) {
    try { return JSON.parse(arrMatch[0]); } catch (_) {}
  }

  // Empty result if nothing parseable
  return [];
}

// ═══════════════════════════════════════════════════════════════
// UPLOAD TAB — File Handling
// ═══════════════════════════════════════════════════════════════

function handleFileDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file) handleFileUpload(file);
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (file) handleFileUpload(file);
}

function handleFileUpload(file) {
  const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'application/pdf'];
  if (!allowed.includes(file.type)) {
    UPLOAD_STATE.error = 'Bitte ein Bild (JPG, PNG, WebP) oder PDF hochladen.';
    UPLOAD_STATE.fileDataUrl = null;
    renderUploadTab();
    return;
  }
  UPLOAD_STATE.error = null;
  UPLOAD_STATE.mediaType = file.type;
  UPLOAD_STATE.fileName = file.name;
  UPLOAD_STATE.results = [];
  UPLOAD_STATE.addedIndices = new Set();
  UPLOAD_STATE.einkaufsDatum = null;
  UPLOAD_STATE.geschaeft = null;

  const reader = new FileReader();
  reader.onload = e => {
    UPLOAD_STATE.fileDataUrl = e.target.result;
    renderUploadTab();
  };
  reader.readAsDataURL(file);
}

function resetUpload() {
  UPLOAD_STATE.fileDataUrl = null;
  UPLOAD_STATE.mediaType = null;
  UPLOAD_STATE.fileName = null;
  UPLOAD_STATE.error = null;
  UPLOAD_STATE.results = [];
  UPLOAD_STATE.einkaufsDatum = null;
  UPLOAD_STATE.geschaeft = null;
  UPLOAD_STATE.addedIndices = new Set();
  renderUploadTab();
}

async function auslesenStart() {
  if (!UPLOAD_STATE.fileDataUrl) return;
  const hasKey = ANTHROPIC_API_KEY && ANTHROPIC_API_KEY !== 'HIER_API_KEY_EINFÜGEN';
  if (!hasKey) {
    UPLOAD_STATE.error = 'Kein API Key konfiguriert. Bitte ANTHROPIC_API_KEY am Anfang der Datei eintragen.';
    renderUploadTab();
    return;
  }
  UPLOAD_STATE.loading = true;
  UPLOAD_STATE.error = null;
  UPLOAD_STATE.results = [];
  UPLOAD_STATE.addedIndices = new Set();
  renderUploadTab();

  try {
    const parsed = await scanReceiptViaClaudeAPI();
    UPLOAD_STATE.results = parsed.items || [];
    UPLOAD_STATE.einkaufsDatum = parsed.datum || null;
    UPLOAD_STATE.geschaeft = parsed.geschaeft || null;
    UPLOAD_STATE.error = null;
  } catch (err) {
    UPLOAD_STATE.error = err.message || String(err);
    UPLOAD_STATE.results = [];
  } finally {
    UPLOAD_STATE.loading = false;
    renderUploadTab();
  }
}

async function scanReceiptViaClaudeAPI() {
  const base64 = UPLOAD_STATE.fileDataUrl.split(',')[1];
  const mediaType = UPLOAD_STATE.mediaType;
  const isPdf = mediaType === 'application/pdf';

  const prompt =
    `Lies diesen Kassenbon / diese Rechnung aus und gib mir alle Produkte als JSON zurück.\n\n` +
    `Antworte NUR mit diesem JSON-Format, ohne Erklärungen, ohne Markdown-Codeblock:\n` +
    `{\n` +
    `  "geschaeft": "Geschäftsname (z.B. Metro, Hofer, Billa, Spar, Lidl, Rewe) oder null",\n` +
    `  "datum": "YYYY-MM-DD oder null",\n` +
    `  "items": [\n` +
    `    {\n` +
    `      "name": "Produktname",\n` +
    `      "preis": 1.99,\n` +
    `      "menge": 1,\n` +
    `      "einheit": "Stk / kg / L / Pack / etc.",\n` +
    `      "kategorie": "Grundzutaten / Käse / Belag / Gewürze / Getränke / Sonstiges"\n` +
    `    }\n` +
    `  ]\n` +
    `}\n\n` +
    `Nur die eigentlichen Produkte/Waren auflisten — keine Summen, Rabatte, Steuern oder Zahlungsinfos.\n` +
    `Falls kein Kassenbon erkennbar oder das Bild unlesbar ist, antworte mit: {"fehler": "Kurze Beschreibung"}`;

  const contentBlock = isPdf
    ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } }
    : { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } };

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
    },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: 4096,
      messages: [{ role: 'user', content: [contentBlock, { type: 'text', text: prompt }] }],
    }),
  });

  if (!resp.ok) {
    let errMsg = `HTTP ${resp.status}`;
    try { const e = await resp.json(); errMsg = e?.error?.message || errMsg; } catch (_) {}
    if (resp.status === 401) throw new Error('Ungültiger API Key (401). Bitte API Key prüfen.');
    if (resp.status === 429) throw new Error('Rate Limit erreicht (429). Kurz warten und erneut versuchen.');
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const textBlock = data.content.find(b => b.type === 'text');
  if (!textBlock) throw new Error('Keine Antwort von Claude erhalten.');
  return parseReceiptJSON(textBlock.text);
}

function parseReceiptJSON(text) {
  if (!text || !text.trim()) throw new Error('Leere Antwort von Claude.');
  let parsed;
  try { parsed = JSON.parse(text.trim()); } catch (_) {
    const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (fenceMatch) { try { parsed = JSON.parse(fenceMatch[1].trim()); } catch (_2) {} }
    if (!parsed) {
      const objMatch = text.match(/\{[\s\S]*\}/);
      if (objMatch) { try { parsed = JSON.parse(objMatch[0]); } catch (_3) {} }
    }
  }
  if (!parsed) throw new Error('Antwort konnte nicht verarbeitet werden. Bitte ein deutlicheres Foto machen.');
  if (parsed.fehler) throw new Error(parsed.fehler);
  if (!Array.isArray(parsed.items)) throw new Error('Keine Produkte erkannt. Bitte ein deutlicheres Foto machen.');
  return parsed;
}

function addReceiptItemToInventory(idx, btn) {
  const item = UPLOAD_STATE.results[idx];
  if (!item) return;

  // Resolve shop ID from detected shop name
  let foundShopId = null;
  if (UPLOAD_STATE.geschaeft) {
    const key = UPLOAD_STATE.geschaeft.toLowerCase();
    for (const s of SHOPS) {
      if (key.includes(s.id) || s.name.toLowerCase().includes(key) || key.includes(s.name.toLowerCase())) {
        foundShopId = s.id;
        break;
      }
    }
  }

  // Try to match an existing product by name
  const nameLower = item.name.toLowerCase();
  const matched = PRODUCTS.find(p =>
    p.name.toLowerCase() === nameLower ||
    p.name.toLowerCase().includes(nameLower.split(' ')[0]) ||
    nameLower.includes(p.name.toLowerCase().split(' ')[0])
  );

  if (matched) {
    // Update price in PRICE_MAP
    if (foundShopId && item.preis != null) {
      if (!PRICE_MAP[foundShopId]) PRICE_MAP[foundShopId] = {};
      PRICE_MAP[foundShopId][matched.id] = item.preis;
    }
  } else {
    // Add new product to PRODUCTS
    const id = 'receipt-' + item.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30) + '-' + idx;
    PRODUCTS.push({
      id,
      name: item.name,
      category: item.kategorie || 'Sonstiges',
      unit: item.einheit || 'Stk',
      currentStock: typeof item.menge === 'number' ? item.menge : 0,
      minStock: 1,
      orderQuantity: typeof item.menge === 'number' ? Math.max(1, item.menge) : 1,
    });
    stockLevels[id] = typeof item.menge === 'number' ? item.menge : 0;
    if (foundShopId && item.preis != null) {
      if (!PRICE_MAP[foundShopId]) PRICE_MAP[foundShopId] = {};
      PRICE_MAP[foundShopId][id] = item.preis;
    }
    updateHeaderBadge();
  }

  addHistoryEntry({
    produktName: item.name,
    produktId:   matched ? matched.id : ('receipt-' + item.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,30) + '-' + idx),
    menge:       item.menge  ?? null,
    einheit:     item.einheit || 'Stk',
    preis:       item.preis   ?? null,
    shopName:    UPLOAD_STATE.geschaeft || null,
    shopId:      foundShopId  || null,
    quelle:      'kassenbon',
    datum:       UPLOAD_STATE.einkaufsDatum || null,
  });

  UPLOAD_STATE.addedIndices.add(idx);
  btn.classList.add('added');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px">check</span> Hinzugefügt';
  btn.style.background = '#dfe0ff';
  btn.style.color = '#0d2ccc';
  btn.style.borderColor = '#c7c9f9';
  btn.style.cursor = 'default';
}

function addAllReceiptItems() {
  UPLOAD_STATE.results.forEach((_, idx) => {
    if (!UPLOAD_STATE.addedIndices.has(idx)) {
      const btn = document.querySelector(`#panel-upload .add-btn[onclick="addReceiptItemToInventory(${idx}, this)"]`);
      if (btn && !btn.disabled) addReceiptItemToInventory(idx, btn);

  renderUploadTab();
}

// ═══════════════════════════════════════════════════════════════
// HANDLIST — Classify items against PRODUCTS
// ═══════════════════════════════════════════════════════════════

function classifyHandlistItem(name) {
  const n = name.toLowerCase().trim();
  // 1. Exact match → high confidence
  const exact = PRODUCTS.find(p => p.name.toLowerCase() === n);
  if (exact) return { status: 'matched', matchedProductId: exact.id, suggestion: exact.name };

  // 2. Containment match → high confidence
  const contain = PRODUCTS.find(p => {
    const pn = p.name.toLowerCase();
    return pn.includes(n) || n.includes(pn);
  });
  if (contain) return { status: 'matched', matchedProductId: contain.id, suggestion: contain.name };

  // 3. Word overlap → medium confidence (similar / suggestion)
  const words = n.split(/\s+/).filter(w => w.length > 3);
  if (words.length > 0) {
    for (const p of PRODUCTS) {
      const pWords = p.name.toLowerCase().split(/\s+/).filter(w => w.length > 3);
      const overlap = words.filter(w => pWords.some(pw => pw.includes(w) || w.includes(pw)));
      if (overlap.length >= Math.ceil(Math.min(words.length, pWords.length) * 0.5)) {
        return { status: 'similar', matchedProductId: p.id, suggestion: p.name };
      }
    }
  }

  return { status: 'new', matchedProductId: null, suggestion: null };
}

function enrichHandlistItems(rawItems) {
  return rawItems.map(item => ({ ...item, ...classifyHandlistItem(item.name || '') }));
}

// ═══════════════════════════════════════════════════════════════

function applyHandlistItem(idx, btn) {
  const item = HANDLIST_STATE.items[idx];
  if (!item) return;

  if (item.matchedProductId) {
    const prod = PRODUCTS.find(p => p.id === item.matchedProductId);
    if (prod && item.menge != null) prod.orderQuantity = Number(item.menge) || prod.orderQuantity;
  } else {
    const id = 'hand-' + item.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30) + '-' + idx;
    if (!PRODUCTS.find(p => p.id === id)) {
      PRODUCTS.push({
        id, name: item.name, category: 'Sonstiges',
        unit: item.einheit || 'Stk', currentStock: 0,
        minStock: Number(item.menge) || 1, orderQuantity: Number(item.menge) || 1,
      });
      stockLevels[id] = 0;
    }
    item.matchedProductId = id;
    item.status = 'matched';
  }

  addHistoryEntry({
    produktName: item.name,
    produktId:   item.matchedProductId,
    menge:       item.menge   ?? null,
    einheit:     item.einheit || 'Stk',
    preis:       null,
    shopName:    null,
    shopId:      null,
    quelle:      'handliste',
  });

  HANDLIST_STATE.appliedIndices.add(idx);
  updateHeaderBadge();

  if (btn) {
    btn.disabled = true;
    btn.style.background = '#dfe0ff';
    btn.style.borderColor = '#c7c9f9';
    btn.style.color = '#0d2ccc';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px">check</span> Übernommen';
    const row = btn.closest('tr');
    if (row) row.style.background = '#f0fdf4';
  }
}

function applyAllHandlistItems() {
  HANDLIST_STATE.items.forEach((_, idx) => {
    if (!HANDLIST_STATE.appliedIndices.has(idx)) applyHandlistItem(idx, null);
  });
  updateHeaderBadge();
  renderUploadTab();
}

function applySelectedHandlistItems() {
  const table = document.getElementById('handlist-results-table');

  let anyApplied = false;
  table.querySelectorAll('input[type="checkbox"][data-idx]').forEach(cb => {

}

async function erkennungStart() {
  if (!HANDLIST_STATE.fileDataUrl) return;
  const hasKey = ANTHROPIC_API_KEY && ANTHROPIC_API_KEY !== 'HIER_API_KEY_EINFÜGEN';
  if (!hasKey) {
    HANDLIST_STATE.error = 'Kein API Key konfiguriert. Bitte ANTHROPIC_API_KEY am Anfang der Datei eintragen.';
    renderUploadTab(); return;
  }
  HANDLIST_STATE.loading = true;
  HANDLIST_STATE.error = null;
  HANDLIST_STATE.items = [];
  HANDLIST_STATE.appliedIndices = new Set();
  renderUploadTab();

  try {
    const rawItems = await scanHandlistViaClaudeAPI();
    if (!rawItems.length) throw new Error('Keine Produkte erkannt. Bitte ein deutlicheres Foto machen.');
    HANDLIST_STATE.items = enrichHandlistItems(rawItems);
    HANDLIST_STATE.error = null;
  } catch (err) {
    HANDLIST_STATE.error = err.message || String(err);
    HANDLIST_STATE.items = [];
  } finally {
    HANDLIST_STATE.loading = false;
    renderUploadTab();
  }
}

async function scanHandlistViaClaudeAPI() {
  const base64 = HANDLIST_STATE.fileDataUrl.split(',')[1];
  const mediaType = HANDLIST_STATE.mediaType;

  const prompt =
    `Das ist eine handgeschriebene Einkaufsliste einer Pizzeria in Wien.\n` +
    `Erkenne alle Produkte und Mengen. Antworte NUR mit einem JSON-Array, ohne Markdown:\n` +
    `[{"name": "Produktname", "menge": 2, "einheit": "kg"}]\n\n` +
    `Typische Produkte: Mehl, Mozzarella, Tomaten, Salami, Öl, Gewürze, Hefe, Oregano,\n` +
    `Basilikum, Oliven, Kapern, Prosciutto, Rucola, Thunfisch, Sardellen, Parmesan, Ricotta.\n\n` +
    `Regeln:\n` +
    `- Mengen als Zahlen (z.B. 2, nicht "zwei")\n` +
    `- Einheit: kg / g / L / ml / Stk / Pkg / Dose / Flasche\n` +
    `- Falls Schrift unleserlich: {"fehler": "Unleserlich — bitte deutlicheres Foto"}\n` +
    `- Falls kein Text erkennbar: {"fehler": "Kein Text im Bild erkannt"}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: 2048,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: prompt },
      ]}],
    }),
  });

  if (!resp.ok) {
    let errMsg = `HTTP ${resp.status}`;
    try { const e = await resp.json(); errMsg = e?.error?.message || errMsg; } catch (_) {}
    if (resp.status === 401) throw new Error('Ungültiger API Key (401). Bitte API Key prüfen.');
    if (resp.status === 429) throw new Error('Rate Limit erreicht (429). Kurz warten und erneut versuchen.');
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const textBlock = data.content.find(b => b.type === 'text');
  if (!textBlock) throw new Error('Keine Antwort von Claude erhalten.');
  return parseHandlistJSON(textBlock.text);
}

function parseHandlistJSON(text) {
  if (!text || !text.trim()) throw new Error('Leere Antwort von Claude.');
  let parsed;
  try { parsed = JSON.parse(text.trim()); } catch (_) {
    const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (fenceMatch) { try { parsed = JSON.parse(fenceMatch[1].trim()); } catch (_2) {} }
    if (!parsed) {
      const arrMatch = text.match(/\[[\s\S]*\]/);
      if (arrMatch) { try { parsed = JSON.parse(arrMatch[0]); } catch (_3) {} }
      if (!parsed) {
        const objMatch = text.match(/\{[\s\S]*\}/);
        if (objMatch) { try { parsed = JSON.parse(objMatch[0]); } catch (_4) {} }
      }
    }
  }
  if (!parsed) throw new Error('Antwort konnte nicht verarbeitet werden. Bitte erneut versuchen.');
  if (!Array.isArray(parsed) && parsed.fehler) throw new Error(parsed.fehler);
  if (!Array.isArray(parsed)) throw new Error('Unerwartetes Format. Bitte erneut versuchen.');
  return parsed.filter(item => item && item.name);
}

// ═══════════════════════════════════════════════════════════════
// PRICELIST — State
// ═══════════════════════════════════════════════════════════════

const PRICELIST_STATE = {
  rawData: null,       // Array<Array> — first row = headers
  headers: [],
  fileName: null,
  colName: null,       // column index for product name
  colPreis: null,      // column index for price
  colEinheit: null,    // column index for unit (optional)
  selectedShop: '',
  selectedShopName: '',
  importResult: null,  // { imported, newProducts, unmatched, unknownNames }
  importDate: null,
  error: null,
};

// ═══════════════════════════════════════════════════════════════
// PRICELIST — File Handling
// ═══════════════════════════════════════════════════════════════

function handlePricelistDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file) handlePricelistFile(file);
}

function handlePricelistSelect(input) {
  const file = input.files[0];
  if (file) handlePricelistFile(file);
}

function handlePricelistFile(file) {
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!['.xlsx', '.xls', '.csv'].includes(ext)) {
    PRICELIST_STATE.error = 'Bitte eine Excel (.xlsx, .xls) oder CSV (.csv) Datei hochladen.';
    renderUploadTab();
    return;
  }
  PRICELIST_STATE.error = null;
  PRICELIST_STATE.fileName = file.name;
  PRICELIST_STATE.rawData = null;
  PRICELIST_STATE.importResult = null;
  PRICELIST_STATE.colName = null;
  PRICELIST_STATE.colPreis = null;
  PRICELIST_STATE.colEinheit = null;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      if (typeof XLSX === 'undefined') throw new Error('SheetJS nicht geladen. Bitte Seite neu laden.');
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      if (!rows || rows.length < 2) {
        PRICELIST_STATE.error = 'Datei enthält keine Daten oder ist leer.';
        renderUploadTab();
        return;
      }
      const headerRow = rows[0].map(h => String(h ?? '').trim());
      PRICELIST_STATE.headers = headerRow;
      PRICELIST_STATE.rawData = rows;
      const det = autoDetectColumns(headerRow);
      PRICELIST_STATE.colName   = det.colName;
      PRICELIST_STATE.colPreis  = det.colPreis;
      PRICELIST_STATE.colEinheit = det.colEinheit;
    } catch (err) {
      PRICELIST_STATE.error = 'Datei konnte nicht gelesen werden: ' + (err.message || String(err));
    }
    renderUploadTab();
  };
  reader.onerror = () => { PRICELIST_STATE.error = 'Fehler beim Lesen der Datei.'; renderUploadTab(); };
  reader.readAsArrayBuffer(file);
}

function autoDetectColumns(headers) {
  const nameKw  = ['name','bezeichnung','artikel','produkt','description','item','ware','text','title'];
  const priceKw = ['preis','price','ek','netto','brutto','betrag','eur','€','cost','vk','einkauf'];
  const unitKw  = ['einheit','unit','mengeneinheit','me','vpe','gebinde'];
  let colName = null, colPreis = null, colEinheit = null;
  headers.forEach((h, i) => {
    const hl = h.toLowerCase();
    if (colName    === null && nameKw.some(k  => hl.includes(k)))  colName    = i;
    if (colPreis   === null && priceKw.some(k => hl.includes(k)))  colPreis   = i;
    if (colEinheit === null && unitKw.some(k  => hl.includes(k)))  colEinheit = i;
  });
  if (colName  === null) colName  = 0;
  if (colPreis === null) colPreis = Math.min(1, headers.length - 1);
  return { colName, colPreis, colEinheit };
}

function resetPricelist() {
  Object.assign(PRICELIST_STATE, {
    rawData: null, headers: [], fileName: null,
    colName: null, colPreis: null, colEinheit: null,
    selectedShop: '', selectedShopName: '',
    importResult: null, importDate: null, error: null,
  });
  renderUploadTab();
}

// ═══════════════════════════════════════════════════════════════
// PRICELIST — Product Name Matching
// ═══════════════════════════════════════════════════════════════

function matchProductByName(name) {
  const n = name.toLowerCase().trim();
  let p = PRODUCTS.find(p => p.name.toLowerCase() === n);
  if (p) return p;
  p = PRODUCTS.find(p => n.includes(p.name.toLowerCase()) || p.name.toLowerCase().includes(n));
  if (p) return p;
  const words = n.split(/[\s,\-\/]+/).filter(w => w.length > 3);
  for (const word of words) {
    p = PRODUCTS.find(pr => pr.name.toLowerCase().includes(word) || pr.id.includes(word));
    if (p) return p;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// PRICELIST — Import
// ═══════════════════════════════════════════════════════════════

function importPrices() {
  if (!PRICELIST_STATE.rawData) return;

  // Read current DOM values before validation (user may not have triggered onchange)
  const nameEl    = document.getElementById('pl-col-name');
  const preisEl   = document.getElementById('pl-col-preis');
  const einheitEl = document.getElementById('pl-col-einheit');
  const shopEl    = document.getElementById('pl-shop');
  if (nameEl)    PRICELIST_STATE.colName    = nameEl.value    === '0' ? null : parseInt(nameEl.value)    - 1;
  if (preisEl)   PRICELIST_STATE.colPreis   = preisEl.value   === '0' ? null : parseInt(preisEl.value)   - 1;
  if (einheitEl) PRICELIST_STATE.colEinheit = einheitEl.value === '0' ? null : parseInt(einheitEl.value) - 1;
  if (shopEl)    PRICELIST_STATE.selectedShop = shopEl.value;

  if (PRICELIST_STATE.colName  === null) { PRICELIST_STATE.error = 'Bitte die Produktname-Spalte zuordnen.'; renderUploadTab(); return; }
  if (PRICELIST_STATE.colPreis === null) { PRICELIST_STATE.error = 'Bitte die Preis-Spalte zuordnen.';       renderUploadTab(); return; }
  if (!PRICELIST_STATE.selectedShop)    { PRICELIST_STATE.error = 'Bitte einen Händler auswählen.';          renderUploadTab(); return; }

  const shopId = PRICELIST_STATE.selectedShop;

  // Add shop to SHOPS if new (makes it visible in Geschäfte + Kombis tabs)
  if (!SHOPS.find(s => s.id === shopId)) {
    const extra = IMPORT_SHOPS_EXTRA.find(s => s.id === shopId);
    if (extra) SHOPS.push({ ...extra });
  }
  if (!PRICE_MAP[shopId]) PRICE_MAP[shopId] = {};

  const rows = PRICELIST_STATE.rawData.slice(1);
  let imported = 0, newProducts = 0;
  const unknownNames = [];

  for (const row of rows) {
    const rawName  = row[PRICELIST_STATE.colName];
    const rawPreis = row[PRICELIST_STATE.colPreis];
    const rawUnit  = PRICELIST_STATE.colEinheit !== null ? row[PRICELIST_STATE.colEinheit] : null;

    if (rawName == null || String(rawName).trim() === '') continue;
    const name = String(rawName).trim();
    const preis = parseFloat(String(rawPreis ?? '').replace(/[^\d,.-]/g, '').replace(',', '.'));
    if (!name || isNaN(preis) || preis <= 0) continue;

    const matched = matchProductByName(name);
    if (matched) {
      PRICE_MAP[shopId][matched.id] = preis;
      imported++;
    } else {
      // Create new product entry
      const existing = PRODUCTS.find(p => p.name.toLowerCase() === name.toLowerCase());
      if (existing) {
        PRICE_MAP[shopId][existing.id] = preis;
        imported++;
      } else {
        const id = 'import-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 28) + '-' + (Date.now() % 10000);
        PRODUCTS.push({
          id, name,
          category: 'Sonstiges',
          unit: rawUnit ? String(rawUnit).trim() : 'Stk',
          currentStock: 0, minStock: 1, orderQuantity: 1,
        });
        stockLevels[id] = 0;
        PRICE_MAP[shopId][id] = preis;
        imported++;
        newProducts++;
        unknownNames.push(name);
      }
    }
  }

  const shopObj = allImportShops().find(s => s.id === shopId);
  PRICELIST_STATE.selectedShopName = shopObj ? shopObj.name : shopId;
  PRICELIST_STATE.importResult = { imported, newProducts, unmatched: unknownNames.length, unknownNames };
  PRICELIST_STATE.importDate = new Date().toISOString().slice(0, 10);
  PRICELIST_STATE.error = null;
  updateHeaderBadge();
  renderUploadTab();
}

function printCombo(comboId) {
  const { single, two } = calculateCombinations();
  const combo = [...two, ...single].find(c => c.id === comboId);
  if (!combo) return;

  const now = new Date();
  const dateStr = now.toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const byShop = {};
  for (const item of combo.items) {
    if (!byShop[item.shop.id]) byShop[item.shop.id] = { shop: item.shop, items: [], subtotal: 0 };
    byShop[item.shop.id].items.push(item);
    byShop[item.shop.id].subtotal += item.totalCost;
  }

  let shopTables = '';
  for (const group of Object.values(byShop)) {
    const rows = group.items.map((item, ri) => {
      const isLow = stockLevels[item.product.id] < item.product.minStock;
      return `<tr style="background:${isLow ? '#ffdad6' : ri%2===0 ? '#fff' : '#fafafa'}">
        <td style="padding:9px 10px;text-align:center;font-size:18px">☐</td>
        <td style="padding:9px 12px;font-weight:${isLow?'700':'500'};color:${isLow?'#cc0000':'#1a1a1a'}">${item.product.name}${isLow?' ⚠️':''}</td>
        <td style="padding:9px 10px;text-align:center;font-size:13px">${(stockLevels[item.product.id]||0)} ${item.product.unit}</td>
        <td style="padding:9px 10px;text-align:center;font-size:14px;font-weight:700">${item.quantity} ${item.product.unit}</td>
        <td style="padding:9px 10px;text-align:right;font-size:13px">${eur(item.pricePerUnit)}/${item.product.unit}</td>
        <td style="padding:9px 10px;text-align:right;font-size:14px;font-weight:700">${eur(item.totalCost)}</td>
      </tr>`;
    }).join('');

    shopTables += `
      <div style="margin-bottom:28px;page-break-inside:avoid">
        <div style="background:${group.shop.color};color:white;padding:10px 16px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:17px;font-weight:700">${group.shop.name}</span>
          <span style="font-size:12px;opacity:.85">${group.shop.type}</span>
        </div>
        <table style="width:100%;border-collapse:collapse;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;overflow:hidden">
          <thead>
            <tr style="background:#f5f5f5;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666">
              <th style="padding:7px 10px;width:36px">✓</th>
              <th style="padding:7px 12px;text-align:left">Produkt</th>
              <th style="padding:7px 10px">Bestand</th>
              <th style="padding:7px 10px">Kaufen</th>
              <th style="padding:7px 10px;text-align:right">Preis/E</th>
              <th style="padding:7px 10px;text-align:right">Gesamt</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr style="background:#f0f0f0;font-weight:700;border-top:2px solid #ddd">
              <td colspan="5" style="padding:9px 12px;text-align:right;font-size:13px">Summe ${group.shop.name}:</td>
              <td style="padding:9px 10px;text-align:right;font-size:15px">${eur(group.subtotal)}</td>
            </tr>
          </tfoot>
        </table>
      </div>`;
  }

  const html = `<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<title>Einkaufsliste ${dateStr}</title>
<style>
  body { font-family: Arial, Helvetica, sans-serif; max-width: 800px; margin: 0 auto; padding: 24px; color:#1a1a1a; }
  @media print { body{padding:0;max-width:100%} button{display:none!important} @page{margin:12mm} }
  table { page-break-inside: auto; } tr { page-break-inside: avoid; }
</style></head><body>
  <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid #610000">
    <span style="font-size:42px">🍕</span>
    <div style="flex:1">
      <h1 style="font-size:22px;font-weight:700;color:#610000;margin:0 0 4px">Pizzeria Einkaufsliste</h1>
      <p style="color:#666;margin:0;font-size:13px">${dateStr}</p>
    </div>
    <div style="text-align:right">
      <div style="font-size:26px;font-weight:700;color:#610000">${eur(combo.totalCost)}</div>
      <div style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.08em">Gesamt</div>
    </div>
  </div>
  ${shopTables}
  <div style="border-top:2px solid #610000;padding-top:16px;margin-top:16px;display:flex;justify-content:space-between;align-items:flex-end">

  </div>
  <div style="margin-top:24px;text-align:center">
    <button onclick="window.print()" style="padding:12px 36px;background:#610000;color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">🖨️ Drucken</button>
  </div>
</body></html>`;

  const win = window.open('', '_blank', 'width=860,height=700');
  if (!win) { alert('Popup blockiert! Bitte Popup-Blocker deaktivieren.'); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 600);
}

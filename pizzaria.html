function calcWeeklyConsumption() {
  if (HISTORY.length === 0) return [];
  const now = new Date();
  const fourWeeksAgo = new Date(now - 28 * 86400000);
  const twoWeeksAgo  = new Date(now - 14 * 86400000);
  const recent = HISTORY.filter(e => e.menge != null && new Date(e.datum + 'T00:00:00') >= fourWeeksAgo);

  const byProduct = {};
  recent.forEach(e => {
    if (!byProduct[e.produktName]) byProduct[e.produktName] = { name: e.produktName, einheit: e.einheit, entries: [] };
    byProduct[e.produktName].entries.push(e);
  });

  return Object.values(byProduct).map(p => {
    const total = p.entries.reduce((s, e) => s + (e.menge || 0), 0);
    const perWeek = Math.round((total / 4) * 10) / 10;

    const recent2 = p.entries.filter(e => new Date(e.datum + 'T00:00:00') >= twoWeeksAgo);
    const older2  = p.entries.filter(e => new Date(e.datum + 'T00:00:00') <  twoWeeksAgo);
    const rSum = recent2.reduce((s, e) => s + (e.menge || 0), 0) / 2;
    const oSum = older2.reduce( (s, e) => s + (e.menge || 0), 0) / 2;
    let trend = '→';
    if (oSum > 0) { const r = rSum / oSum; if (r > 1.15) trend = '↑'; else if (r < 0.85) trend = '↓'; }

    let prognose = null;
    const prod = PRODUCTS.find(p2 => p2.name === p.name || p2.id === p.entries[0]?.produktId);
    if (prod && perWeek > 0) {
      const daysLeft = (stockLevels[prod.id] || 0) / (perWeek / 7);
      prognose = Math.round(daysLeft);
    }

    return { name: p.name, einheit: p.einheit, perWeek, trend, prognose };
  }).filter(w => w.perWeek > 0).sort((a, b) => b.perWeek - a.perWeek);
}

function calcPriceTrends() {
  const now = new Date();
  const tM = now.getMonth() + 1, tY = now.getFullYear();
  const pM = tM === 1 ? 12 : tM - 1, pY = tM === 1 ? tY - 1 : tY;
  const tKey = `${tY}-${String(tM).padStart(2,'0')}`;
  const pKey = `${pY}-${String(pM).padStart(2,'0')}`;

  const byProduct = {};
  HISTORY.filter(e => e.preis != null && e.preis > 0).forEach(e => {
    if (!byProduct[e.produktName]) byProduct[e.produktName] = { name: e.produktName, all: [], thisM: [], prevM: [] };
    byProduct[e.produktName].all.push(e.preis);
    if (e.datum.startsWith(tKey)) byProduct[e.produktName].thisM.push(e.preis);
    if (e.datum.startsWith(pKey)) byProduct[e.produktName].prevM.push(e.preis);
  });

  const avg = arr => arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : null;

  return Object.values(byProduct)
    .map(p => ({
      name:       p.name,
      currentAvg: avg(p.thisM),
      lastAvg:    avg(p.prevM),
      minEver:    Math.min(...p.all),
      diff:       (avg(p.thisM) != null && avg(p.prevM) != null) ? avg(p.thisM) - avg(p.prevM) : null,
    }))
    .filter(p => p.currentAvg != null || p.lastAvg != null)
    .sort((a, b) => (b.currentAvg || 0) - (a.currentAvg || 0));
}

function exportMonthAsText() {
  const now = new Date();
  const mKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthName = now.toLocaleString('de-DE', { month: 'long', year: 'numeric' });
  const entries = HISTORY.filter(e => e.datum.startsWith(mKey));
  const total = entries.reduce((s, e) => s + (e.preis != null && e.menge != null ? e.preis * e.menge : 0), 0);

  let text = `🍕 Pizzeria Einkauf — ${monthName}\n`;
  text += `${'═'.repeat(34)}\n`;
  text += `Gesamt: ${total.toLocaleString('de-DE', {style:'currency',currency:'EUR'})}\n\n`;

  const byShop = {};
  entries.forEach(e => {
    const key = e.shopName || 'Kein Geschäft';
    if (!byShop[key]) byShop[key] = [];
    byShop[key].push(e);
  });

  Object.entries(byShop).forEach(([shop, es]) => {
    const shopTotal = es.reduce((s, e) => s + (e.preis != null && e.menge != null ? e.preis * e.menge : 0), 0);
    text += `📦 ${shop}: ${shopTotal.toLocaleString('de-DE',{style:'currency',currency:'EUR'})}\n`;
    es.forEach(e => {
      text += `  • ${e.produktName}: ${e.menge != null ? e.menge : ''}${e.einheit || ''} × ${e.preis != null ? e.preis.toLocaleString('de-DE',{style:'currency',currency:'EUR'}) : '—'}\n`;
    });
    text += '\n';
  });

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('Monatsbericht in Zwischenablage kopiert! ✓')).catch(() => prompt('Text kopieren:', text));
  } else {
    prompt('Text kopieren:', text);
  }
}

// VERLAUF TAB — Render

function renderVerlaufTab() {
  const panel = document.getElementById('panel-verlauf');
  const now = new Date();
  const todayYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  if (!VERLAUF_FILTER.monat) VERLAUF_FILTER.monat = todayYM;

  if (HISTORY.length === 0) {
    panel.innerHTML = `
      <div style="text-align:center;padding:80px 20px">
        <span class="material-symbols-outlined" style="font-size:64px;color:#e3beb8;display:block;margin-bottom:16px">bar_chart</span>
        <h3 style="font-size:20px;font-weight:700;color:#261816;margin-bottom:8px">Noch keine Einkaufshistorie</h3>
        <p style="font-size:14px;color:#5a403c;max-width:340px;margin:0 auto;line-height:1.7">
          Sobald du Produkte über Kassenbon, Handliste oder Suche hinzufügst, erscheint hier deine Einkaufshistorie mit Auswertungen.
        </p>
        <div style="margin-top:24px;padding:16px 20px;background:#fff8f6;border-radius:14px;border:1px solid #e3beb8;display:inline-block;text-align:left;font-size:13px;color:#5a403c;line-height:2">
          📸 Kassenbon scannen → Upload Tab<br>
          ✍️ Handliste erkennen → Upload Tab<br>
          🔍 Angebote suchen → Suche Tab
        </div>
      </div>`;
    return;
  }

  // ── Filtered entries ──
  const filtered = HISTORY.filter(e => {
    if (VERLAUF_FILTER.shop    && e.shopName !== VERLAUF_FILTER.shop)                                          return false;
    if (VERLAUF_FILTER.produkt && !e.produktName.toLowerCase().includes(VERLAUF_FILTER.produkt.toLowerCase())) return false;
    if (VERLAUF_FILTER.monat   && !e.datum.startsWith(VERLAUF_FILTER.monat))                                  return false;
    return true;
  });

  // ── Monthly totals ──
  const [mY, mM] = (VERLAUF_FILTER.monat || todayYM).split('-').map(Number);
  const pM = mM === 1 ? 12 : mM - 1, pY = mM === 1 ? mY - 1 : mY;
  const mKey  = `${mY}-${String(mM).padStart(2,'0')}`;
  const pKey  = `${pY}-${String(pM).padStart(2,'0')}`;

  const thisMonthAll = HISTORY.filter(e => e.datum.startsWith(mKey));
  const prevMonthAll = HISTORY.filter(e => e.datum.startsWith(pKey));
  const calcTotal = es => es.reduce((s, e) => s + (e.preis != null && e.menge != null ? e.preis * e.menge : 0), 0);
  const thisTotal = calcTotal(thisMonthAll);
  const prevTotal = calcTotal(prevMonthAll);

  // By-shop bar chart data
  const byShopMap = {};
  thisMonthAll.forEach(e => {
    if (!e.shopName) return;
    if (!byShopMap[e.shopName]) byShopMap[e.shopName] = { name: e.shopName, shopId: e.shopId, total: 0 };
    byShopMap[e.shopName].total += (e.preis != null && e.menge != null ? e.preis * e.menge : 0);
  });
  const shopBars = Object.values(byShopMap).sort((a, b) => b.total - a.total);
  const maxBar = shopBars.length ? shopBars[0].total : 1;

  // Top 3 expensive
  const top3Exp = [...thisMonthAll]
    .filter(e => e.preis != null && e.menge != null)
    .sort((a, b) => (b.preis * b.menge) - (a.preis * a.menge))
    .slice(0, 3);

  // Top 3 deals (below personal average price for that product)
  const avgByProduct = {};
  HISTORY.filter(e => e.preis != null).forEach(e => {
    if (!avgByProduct[e.produktName]) avgByProduct[e.produktName] = [];
    avgByProduct[e.produktName].push(e.preis);
  });
  const top3Deals = [...thisMonthAll]
    .filter(e => e.preis != null && (avgByProduct[e.produktName] || []).length > 1)
    .map(e => {
      const arr = avgByProduct[e.produktName];
      const avg = arr.reduce((s, v) => s + v, 0) / arr.length;
      return { ...e, saving: avg - e.preis };
    })
    .filter(e => e.saving > 0.005)
    .sort((a, b) => b.saving - a.saving)
    .slice(0, 3);

  // For filter dropdowns
  const allShops  = [...new Set(HISTORY.map(e => e.shopName).filter(Boolean))];
  const allMonths = [...new Set(HISTORY.map(e => e.datum.slice(0,7)))].sort().reverse();

  let html = '';

  // ─── FILTER ROW ───
  html += `
    <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center">
      <select onchange="VERLAUF_FILTER.monat=this.value;renderVerlaufTab()"
        style="padding:9px 14px;border:1.5px solid #e3beb8;border-radius:12px;font-size:13px;font-family:inherit;background:#fff;color:#261816;cursor:pointer;flex:1;min-width:150px">
        ${allMonths.map(m => {
          const [y,mo] = m.split('-');
          const label = new Date(parseInt(y), parseInt(mo)-1).toLocaleDateString('de-DE', {month:'long', year:'numeric'});
          return `<option value="${m}" ${VERLAUF_FILTER.monat===m?'selected':''}>${label}</option>`;
        }).join('')}
        <option value="" ${!VERLAUF_FILTER.monat?'selected':''}>Alle Monate</option>
      </select>
      <select onchange="VERLAUF_FILTER.shop=this.value;renderVerlaufTab()"
        style="padding:9px 14px;border:1.5px solid #e3beb8;border-radius:12px;font-size:13px;font-family:inherit;background:#fff;color:#261816;cursor:pointer;flex:1;min-width:130px">
        <option value="">Alle Geschäfte</option>
        ${allShops.map(s => `<option value="${s}" ${VERLAUF_FILTER.shop===s?'selected':''}>${escHtml(s)}</option>`).join('')}
      </select>
      <input type="text" placeholder="Produkt suchen…" value="${escHtml(VERLAUF_FILTER.produkt)}"
        oninput="VERLAUF_FILTER.produkt=this.value;renderVerlaufTab()"
        style="padding:9px 14px;border:1.5px solid #e3beb8;border-radius:12px;font-size:13px;font-family:inherit;flex:1;min-width:130px;color:#261816">
      <span style="font-size:12px;color:#8d6562;white-space:nowrap">${filtered.length} Einträge</span>
    </div>`;

  // ─── MONATSAUSWERTUNG ───
  html += `
    <div style="background:#fff;border:1px solid #e3beb866;border-radius:18px;overflow:hidden;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
      <div style="padding:14px 20px;border-bottom:1px solid #e3beb844;background:#f8dcd8;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="material-symbols-outlined" style="font-size:22px;color:#610000">calendar_month</span>
          <span style="font-size:16px;font-weight:700;color:#261816">Monatsauswertung</span>
        </div>
        <button onclick="exportMonthAsText()"
          style="padding:8px 16px;border-radius:10px;border:1px solid #e3beb8;background:#fff;font-size:13px;color:#610000;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;font-weight:600">
          <span class="material-symbols-outlined" style="font-size:16px">content_copy</span> Als Text kopieren
        </button>
      </div>
      <div style="padding:18px 20px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:${shopBars.length?'20px':'0'}">
          <div style="background:#fff8f6;border:1px solid #e3beb8;border-radius:14px;padding:14px 16px">
            <div style="font-size:26px;font-weight:800;color:#610000">${eur(thisTotal)}</div>
            <div style="font-size:12px;color:#5a403c;margin-top:3px">Dieser Monat</div>
          </div>
          ${prevTotal > 0 ? `
          <div style="background:#fff0ee;border:1px solid #e3beb8;border-radius:14px;padding:14px 16px">
            <div style="font-size:26px;font-weight:800;color:#5a403c">${eur(prevTotal)}</div>
            <div style="font-size:12px;color:#8d6562;margin-top:3px">Vormonat</div>
          </div>
          <div style="background:${thisTotal > prevTotal ? '#ffdad6' : '#c0eda6'};border:1px solid ${thisTotal > prevTotal ? '#ba1a1a33' : '#386a2033'};border-radius:14px;padding:14px 16px">
            <div style="font-size:22px;font-weight:800;color:${thisTotal > prevTotal ? '#93000a' : '#0c2000'}">${thisTotal > prevTotal ? '+' : ''}${eur(thisTotal - prevTotal)}</div>
            <div style="font-size:12px;color:${thisTotal > prevTotal ? '#ba1a1a' : '#386a20'};margin-top:3px">${thisTotal > prevTotal ? '↑ mehr als Vormonat' : '↓ weniger als Vormonat'}</div>
          </div>` : ''}
        </div>`;

  if (shopBars.length > 0) {
    html += `
        <p style="font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px">Ausgaben nach Geschäft</p>
        <div style="display:flex;flex-direction:column;gap:10px">`;
    shopBars.forEach(bar => {
      const shopObj = allImportShops().find(s => s.name === bar.name || s.id === bar.shopId);
      const color = shopObj ? shopObj.color : '#610000';
      const pct = maxBar > 0 ? (bar.total / maxBar * 100) : 0;
      html += `
          <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:13px;font-weight:600;color:#261816">${escHtml(bar.name)}</span>
              <span style="font-size:13px;font-weight:700;color:#610000">${eur(bar.total)}</span>
            </div>
            <div style="height:11px;background:#e3beb855;border-radius:6px;overflow:hidden">
              <div style="height:100%;width:${pct.toFixed(1)}%;background:${color};border-radius:6px"></div>
            </div>
          </div>`;
    });
    html += `</div>`;
  }

  if (top3Exp.length > 0 || top3Deals.length > 0) {
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px">`;
    if (top3Exp.length > 0) {
      html += `<div>
        <p style="font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">💸 Teuerste Produkte</p>
        ${top3Exp.map((e, i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e3beb833">
            <div style="display:flex;align-items:center;gap:8px;overflow:hidden">
              <span style="width:20px;height:20px;border-radius:50%;background:#f8dcd8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#610000;flex-shrink:0">${i+1}</span>
              <span style="font-size:13px;color:#261816;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(e.produktName)}</span>
            </div>
            <span style="font-size:13px;font-weight:700;color:#610000;white-space:nowrap;margin-left:8px">${eur(e.preis * e.menge)}</span>
          </div>`).join('')}
      </div>`;
    }
    if (top3Deals.length > 0) {
      html += `<div>
        <p style="font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">🎯 Beste Deals</p>
        ${top3Deals.map(e => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e3beb833">
            <span style="font-size:13px;color:#261816;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(e.produktName)}</span>
            <span style="font-size:12px;color:#386a20;font-weight:700;white-space:nowrap;margin-left:8px">−${eur(e.saving)}</span>
          </div>`).join('')}
      </div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;

  // ─── WOCHENVERBRAUCH ───
  const weeklyStats = calcWeeklyConsumption();
  if (weeklyStats.length > 0) {
    html += `
      <div style="background:#fff;border:1px solid #e3beb866;border-radius:18px;overflow:hidden;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
        <div style="padding:14px 20px;border-bottom:1px solid #e3beb844;background:#f0fdf4;display:flex;align-items:center;gap:10px">
          <span class="material-symbols-outlined" style="font-size:20px;color:#386a20">trending_up</span>
          <span style="font-size:15px;font-weight:700;color:#261816">Verbrauch pro Woche</span>
          <span style="font-size:11px;color:#5a403c">(letzte 4 Wochen)</span>
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;min-width:380px">
            <thead>
              <tr style="background:#f0fdf4">
                <th style="padding:9px 16px;text-align:left;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em">Produkt</th>
                <th style="padding:9px 14px;text-align:center;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap">Ø / Woche</th>
                <th style="padding:9px 12px;text-align:center;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em">Trend</th>
                <th style="padding:9px 16px;text-align:left;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em">Prognose</th>
              </tr>
            </thead>
            <tbody>
              ${weeklyStats.map((w, i) => `
                <tr style="border-bottom:1px solid #e3beb833;background:${i%2===0?'#fff':'#f8fffe'}">
                  <td style="padding:11px 16px;font-size:14px;font-weight:600;color:#261816">${escHtml(w.name)}</td>
                  <td style="padding:11px 14px;text-align:center;font-size:14px;font-weight:700;color:#386a20">${w.perWeek} ${escHtml(w.einheit||'Stk')}</td>
                  <td style="padding:11px 12px;text-align:center;font-size:20px;color:${w.trend==='↑'?'#ba1a1a':w.trend==='↓'?'#386a20':'#5a403c'}" title="${w.trend==='↑'?'steigend':w.trend==='↓'?'sinkend':'stabil'}">${w.trend}</td>
                  <td style="padding:11px 16px;font-size:13px;color:${w.prognose!=null&&w.prognose<=3?'#ba1a1a':w.prognose!=null&&w.prognose<=7?'#ca8a04':'#5a403c'}">
                    ${w.prognose != null ? `Noch ${w.prognose} Tag${w.prognose!==1?'e':''}` : '—'}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  // ─── PREISVERLAUF ───
  const priceTrends = calcPriceTrends();
  if (priceTrends.length > 0) {
    html += `
      <div style="background:#fff;border:1px solid #e3beb866;border-radius:18px;overflow:hidden;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
        <div style="padding:14px 20px;border-bottom:1px solid #e3beb844;background:#fff8f6">
          <span style="font-size:15px;font-weight:700;color:#261816">Preisvergleich</span>
        </div>
        <div style="padding:12px 18px;display:flex;flex-direction:column;gap:10px">
          ${priceTrends.map(pt => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-radius:12px;background:#fff8f6;border:1px solid #e3beb855;gap:12px">
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:600;color:#261816">${escHtml(pt.name)}</div>
                ${pt.diff != null ? `
                  <div style="font-size:12px;margin-top:3px;color:${pt.diff>0.005?'#ba1a1a':pt.diff<-0.005?'#386a20':'#5a403c'}">
                    ${pt.diff > 0.005 ? `↑ ${eur(pt.diff)} teurer als Vormonat` : pt.diff < -0.005 ? `↓ ${eur(Math.abs(pt.diff))} günstiger als Vormonat` : '→ gleich wie Vormonat'}
                  </div>` : ''}
                <div style="font-size:11px;color:#8d6562;margin-top:2px">Günstigster jemals: ${eur(pt.minEver)}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                ${pt.currentAvg != null ? `<div style="font-size:16px;font-weight:700;color:#261816">${eur(pt.currentAvg)}</div>` : ''}
                ${pt.currentAvg != null && Math.abs(pt.currentAvg - pt.minEver) < 0.01 ? `<div style="font-size:11px;color:#386a20;font-weight:700">⭐ Bester Preis!</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // ─── HISTORY LIST ───
  html += `
    <div style="background:#fff;border:1px solid #e3beb866;border-radius:18px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)">
      <div style="padding:14px 20px;border-bottom:1px solid #e3beb844;background:#f8dcd8;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:15px;font-weight:700;color:#261816">Alle Einkäufe</span>
        <button onclick="if(confirm('Gesamte Einkaufshistorie löschen?')){HISTORY=[];saveHistory();renderVerlaufTab()}"
          style="padding:5px 12px;border-radius:8px;border:1px solid #e3beb8;background:#fff;font-size:11px;color:#8d6562;cursor:pointer;font-family:inherit">
          Löschen
        </button>
      </div>`;

  if (filtered.length === 0) {
    html += `<div style="padding:32px;text-align:center;color:#8d6562;font-size:13px">Keine Einträge für diesen Filter</div>`;
  } else {
    const shown = filtered.slice(0, 100);
    html += `
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:380px">
          <thead>
            <tr style="background:#fff8f6">
              <th style="padding:9px 16px;text-align:left;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap">Datum</th>
              <th style="padding:9px 16px;text-align:left;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em">Produkt</th>
              <th style="padding:9px 12px;text-align:center;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap">Menge</th>
              <th style="padding:9px 16px;text-align:left;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em">Geschäft</th>
              <th style="padding:9px 16px;text-align:right;font-size:11px;font-weight:700;color:#5a403c;text-transform:uppercase;letter-spacing:.07em">Preis</th>
            </tr>
          </thead>
          <tbody>
            ${shown.map((e, i) => `
              <tr style="border-bottom:1px solid #e3beb833;background:${i%2===0?'#fff':'#fff8f6'}">
                <td style="padding:10px 16px;font-size:12px;color:#8d6562;white-space:nowrap">${fmtDate(e.datum)}</td>
                <td style="padding:10px 16px;font-size:13px;font-weight:600;color:#261816">${escHtml(e.produktName)}</td>
                <td style="padding:10px 12px;text-align:center;font-size:13px;color:#5a403c;white-space:nowrap">${e.menge != null ? e.menge : '—'} ${escHtml(e.einheit||'')}</td>
                <td style="padding:10px 16px;font-size:13px;color:#5a403c">${e.shopName ? escHtml(e.shopName) : '—'}</td>
                <td style="padding:10px 16px;text-align:right;font-size:13px;font-weight:600;color:#610000;white-space:nowrap">${e.preis != null ? eur(e.preis) : '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      ${filtered.length > 100 ? `<div style="padding:12px 20px;text-align:center;font-size:12px;color:#8d6562;border-top:1px solid #e3beb833">Zeige 100 von ${filtered.length} Einträgen</div>` : ''}`;
  }

  html += `</div>`;
  panel.innerHTML = html;
}

function renderMitarbeiterTab() {
  const low = getLowStockProducts();

    content += `

  const notifSupported = 'Notification' in window;
  const notifGranted   = notifSupported && Notification.permission === 'granted';
  content += `
    <div style="padding:12px 16px;border-top:1px solid #e3beb8">
      ${notifGranted
        ? `<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#386a20;background:#c0eda6;padding:10px 12px;border-radius:10px">

             <span class="material-symbols-outlined" style="font-size:16px">notifications_active</span>
             ${notifSupported ? 'Täglich um 8:00 Uhr benachrichtigen' : 'Benachrichtigungen nicht verfügbar'}
           </button>`}
    </div>`;

  popup.innerHTML = content;
  document.body.appendChild(popup);

  setTimeout(() => {
    function outsideClick(e) {
      const p = document.getElementById('low-stock-popup');
      if (!p) { document.removeEventListener('click', outsideClick); return; }
      if (!p.contains(e.target) && !e.target.closest('#notif-bell-btn')) {
        p.remove();

async function requestNotificationPermission() {
  if (!('Notification' in window)) { alert('Dein Browser unterstützt keine Benachrichtigungen.'); return; }
  const btn = document.getElementById('notif-req-btn');
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    if (btn) { btn.style.background = '#c0eda6'; btn.style.color = '#0c2000'; btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">check_circle</span> Aktiviert — täglich 8 Uhr'; }
    scheduleNotificationCheck();
    checkAndNotify();
  } else {
    if (btn) { btn.style.background = '#ffdad6'; btn.style.color = '#93000a'; btn.innerHTML = '✗ Erlaubnis verweigert'; }
  }
}

function scheduleNotificationCheck() {
  // Check every hour; fire notification at ~8:00
  function hourlyCheck() {
    if (new Date().getHours() === 8) checkAndNotify();
  }
  hourlyCheck();
  setInterval(hourlyCheck, 3600000);
}

function checkAndNotify() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const low = getLowStockProducts();
  if (low.length === 0) return;
  low.slice(0, 3).forEach(p => {
    try {
      new Notification(`⚠️ Pizzeria: ${p.name} fast leer!`, {
        body: `Nur noch ${stockLevels[p.id]} ${p.unit} — Minimum: ${p.minStock} ${p.unit}`,
        tag:  'pizzeria-low-' + p.id,
      });
    } catch(_) {}
  });
}

// Auto-restore notifications on load if previously granted
if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
  scheduleNotificationCheck();
}

const BIZ_PW_KEY   = 'biz_pw_hash';
const BIZ_AUTH_KEY = 'biz_auth_session';

function bizHash(s) {
  // simple djb2 hash — not cryptographic but enough for local use
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (h * 33) ^ s.charCodeAt(i);
  return (h >>> 0).toString(16);
}

function bizGetPwHash() {
  return localStorage.getItem(BIZ_PW_KEY) || bizHash('ali2024');
}

function bizIsAuth() {
  return sessionStorage.getItem(BIZ_AUTH_KEY) === '1';
}

function bizSetAuth() {
  sessionStorage.setItem(BIZ_AUTH_KEY, '1');
}

// ── LocalStorage helpers ──
function bizLoad(key, def) {
  try { const v = localStorage.getItem('biz_' + key); return v ? JSON.parse(v) : def; } catch(_) { return def; }
}
function bizSave(key, val) {
  try { localStorage.setItem('biz_' + key, JSON.stringify(val)); } catch(_) {}
}

// ── Utility ──
function bizEur(n) { return '€\u00A0' + (+n||0).toLocaleString('de-AT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function bizToday() { return new Date().toISOString().slice(0,10); }
function bizDayName(dateStr) {
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  return days[new Date(dateStr).getDay()];
}
function bizMonthName(m) {
  return ['Jänner','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'][m-1];
}
function bizCurrentMonth() { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth()+1 }; }

// ── Einkauf-Kosten aus HISTORY ──
function bizGetEinkaufThisWeek() {
  const now = new Date();
  const mon = new Date(now); mon.setDate(now.getDate() - ((now.getDay()+6)%7)); mon.setHours(0,0,0,0);
  return HISTORY.reduce((s,e) => {
    if (!e.datum || !e.preis) return s;
    const d = new Date(e.datum);
    return d >= mon && d <= now ? s + (e.preis||0) : s;
  }, 0);
}
function bizGetEinkaufThisMonth() {
  const { y, m } = bizCurrentMonth();
  const from = new Date(y, m-1, 1), to = new Date(y, m, 0, 23, 59, 59);
  return HISTORY.reduce((s,e) => {
    if (!e.datum || !e.preis) return s;
    const d = new Date(e.datum);
    return d >= from && d <= to ? s + (e.preis||0) : s;
  }, 0);
}

  const input = document.getElementById('biz-pw-input');
  const err = document.getElementById('biz-pw-error');
  if (!input) return;
  if (bizHash(input.value) === bizGetPwHash()) {

    if (lockIcon) lockIcon.textContent = 'lock_open';

  }
}

function renderBizKassabuch() {
  const kassa = bizGetKassa();
  const today = bizToday();
  const settings = bizGetSettings();
  const todayEntry = kassa.find(e => e.date === today) || { date:today, bar:0, karte:0, gesamt:0, speiseAnteil: settings.speiseAnteil };

  // Last 7 days
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const entry = kassa.find(e => e.date === ds);
    last7.push({ date: ds, day: bizDayName(ds).slice(0,2), gesamt: entry?.gesamt||0 });
  }
  const maxVal = Math.max(...last7.map(d=>d.gesamt), 1);

  // This week vs last week
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-((now.getDay()+6)%7)); weekStart.setHours(0,0,0,0);
  const lastWeekStart = new Date(weekStart); lastWeekStart.setDate(lastWeekStart.getDate()-7);
  const thisWeek = kassa.filter(e=>{ const d=new Date(e.date); return d>=weekStart && d<=now; }).reduce((s,e)=>s+(e.gesamt||0),0);
  const lastWeek = kassa.filter(e=>{ const d=new Date(e.date); return d>=lastWeekStart && d<weekStart; }).reduce((s,e)=>s+(e.gesamt||0),0);

  const nettoGetraenk = getraenkUmsatz - mwst20;

function bizUpdateKassaTotal() {
  const bar = parseFloat(document.getElementById('kassa-bar')?.value)||0;
  const karte = parseFloat(document.getElementById('kassa-karte')?.value)||0;
  const sa = parseFloat(document.getElementById('kassa-speise')?.value)||80;
  const gesamt = bar + karte;
  const speise = gesamt*(sa/100), getraenk = gesamt*((100-sa)/100);
  const mwst10 = speise*(10/110), mwst20 = getraenk*(20/120);
  const setEl = (id,v) => { const el=document.getElementById(id); if(el) el.innerHTML=v; };
  setEl('kassa-gesamt-display', bizEur(gesamt));
  setEl('kassa-netto-speise', bizEur(speise-mwst10));
  setEl('kassa-mwst10', 'MwSt 10%: '+bizEur(mwst10));
  setEl('kassa-netto-getraenk', bizEur(getraenk-mwst20));
  setEl('kassa-mwst20', 'MwSt 20%: '+bizEur(mwst20));
}

function bizSaveKassaEntry() {
  const bar = parseFloat(document.getElementById('kassa-bar')?.value)||0;
  const karte = parseFloat(document.getElementById('kassa-karte')?.value)||0;
  const sa = parseFloat(document.getElementById('kassa-speise')?.value)||80;
  const today = bizToday();
  let kassa = bizGetKassa();
  kassa = kassa.filter(e => e.date !== today);
  kassa.push({ date:today, bar, karte, gesamt:bar+karte, speiseAnteil:sa });
  bizSaveKassa(kassa);
  renderBusinessTab();
  showBizSection('biz-kassabuch');
}

function bizDeleteKassaEntry(date) {
  if (!confirm('Eintrag für '+date.split('-').reverse().join('.')+' löschen?')) return;
  let kassa = bizGetKassa();
  kassa = kassa.filter(e => e.date !== date);
  bizSaveKassa(kassa);
  renderBusinessTab();
  showBizSection('biz-kassabuch');
}

function renderBizReport() {
  const { y, m } = bizCurrentMonth();
  const settings = bizGetSettings();

  const fix = bizGetFixkosten();
  const personal = bizGetPersonal();

  const monthStr = y+'-'+String(m).padStart(2,'0');
  const monthKassa = kassa.filter(e=>e.date.startsWith(monthStr)).sort((a,b)=>a.date.localeCompare(b.date));
  const fixSum = Object.values(fix).reduce((s,v)=>s+(+v||0),0);
  const personalMonat = personal.reduce((s,p)=>s+(+p.stunden||0)*(+p.lohn||0)*4.33,0);
  const einkaufMonth = bizGetEinkaufThisMonth();

  let totalBrutto=0, totalMwst10=0, totalMwst20=0, totalNetto=0;
  const rows = monthKassa.map(e => {
    const sa = e.speiseAnteil??settings.speiseAnteil;
    const speise = (e.gesamt||0)*(sa/100);
    const getraenk = (e.gesamt||0)*((100-sa)/100);
    const m10 = speise*(10/110), m20 = getraenk*(20/120);
    const netto = (e.gesamt||0)-m10-m20;
    totalBrutto+=e.gesamt||0; totalMwst10+=m10; totalMwst20+=m20; totalNetto+=netto;
    return { ...e, m10, m20, netto };
  });

  const gewinn = totalNetto - einkaufMonth - personalMonat - fixSum;

  // Wochenweise summieren
  const weekSums = {};
  rows.forEach(r => {
    const d=new Date(r.date); const w=Math.ceil(d.getDate()/7);
    if (!weekSums[w]) weekSums[w]={brutto:0,m10:0,m20:0,netto:0};
    weekSums[w].brutto+=r.netto+r.m10+r.m20;
    weekSums[w].m10+=r.m10; weekSums[w].m20+=r.m20; weekSums[w].netto+=r.netto;
  });

  return `

function bizCopyReport() {
  const { y, m } = bizCurrentMonth();
  const kassa = bizGetKassa();
  const fix = bizGetFixkosten();
  const personal = bizGetPersonal();
  const fixSum = Object.values(fix).reduce((s,v)=>s+(+v||0),0);
  const personalMonat = personal.reduce((s,p)=>s+(+p.stunden||0)*(+p.lohn||0)*4.33,0);
  const einkaufMonth = bizGetEinkaufThisMonth();
  const monthStr = y+'-'+String(m).padStart(2,'0');
  const monthKassa = kassa.filter(e=>e.date.startsWith(monthStr));
  const umsatz = monthKassa.reduce((s,e)=>s+(e.gesamt||0),0);
  const settings = bizGetSettings();
  const gewinn = umsatz - fixSum - personalMonat - einkaufMonth;

  const text = `Ali Shama KG Pizzeria Wien
Monatsbericht ${bizMonthName(m)} ${y}
UID: ${settings.uid}

EINNAHMEN:
Gesamtumsatz Brutto: ${bizEur(umsatz)}

AUSGABEN:
Wareneinkauf: ${bizEur(einkaufMonth)}
Personal: ${bizEur(personalMonat)}
Fixkosten: ${bizEur(fixSum)}
Gesamt Ausgaben: ${bizEur(einkaufMonth+personalMonat+fixSum)}

GEWINN VOR STEUER: ${bizEur(gewinn)}`;

  navigator.clipboard?.writeText(text).then(() => bizShowToast('✅ Bericht in Zwischenablage kopiert!'))
    .catch(() => { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); bizShowToast('✅ Kopiert!'); });
}

function bizExportData() {
  const data = {
    kassabuch: bizGetKassa(),
    fixkosten: bizGetFixkosten(),
    personal: bizGetPersonal(),
    pizzaCalc: bizGetPizzaCalc(),
    settings: bizGetSettings(),
    exportDatum: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`pizzeria-export-${bizToday()}.json`; a.click();
  URL.revokeObjectURL(url);
  bizShowToast('💾 Export gestartet');
}

const FM_KEY = 'pizzeria_fehlmaterial';
let FM_DATA = [];
try { FM_DATA = JSON.parse(localStorage.getItem(FM_KEY) || '[]'); } catch(_) { FM_DATA = []; }

function fmSave() {
  try { localStorage.setItem(FM_KEY, JSON.stringify(FM_DATA)); } catch(_) {}
}

function fmGenId() {
  return Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

function fmAdd(form) {
  const now = new Date();
  FM_DATA.unshift({
    id:             fmGenId(),
    datum:          now.toISOString().slice(0, 10),
    uhrzeit:        now.toLocaleTimeString('de-AT', {hour:'2-digit', minute:'2-digit'}),
    produktName:    form.produktName,
    produktId:      form.produktId || null,
    menge:          form.menge,
    einheit:        form.einheit,
    kategorie:      form.kategorie,
    prioritaet:     form.prioritaet,
    bemerkung:      form.bemerkung,
    eingetragenVon: form.eingetragenVon,
    status:         'offen',
    statusDatum:    null,
    erledigungsDatum: null,
  });
  fmSave();
  fmUpdateBadge();
}

function fmSetStatus(id, newStatus) {
  const e = FM_DATA.find(x => x.id === id);
  if (!e) return;
  e.status = newStatus;
  e.statusDatum = new Date().toISOString().slice(0, 10);
  if (newStatus === 'erledigt') e.erledigungsDatum = new Date().toISOString();
  fmSave();
  fmUpdateBadge();
  renderFehlmaterialTab();
}

function fmDelete(id) {
  FM_DATA = FM_DATA.filter(x => x.id !== id);
  fmSave();
  fmUpdateBadge();
  renderFehlmaterialTab();
}

function toggleMehrDrawer() {
  const drawer  = document.getElementById('mehr-drawer');
  const overlay = document.getElementById('mehr-drawer-overlay');
  if (!drawer) return;
  const isOpen = drawer.classList.contains('drawer-open');
  if (isOpen) {
    drawer.classList.remove('drawer-open');
    if (overlay) overlay.style.display = 'none';
  } else {
    drawer.classList.add('drawer-open');
    if (overlay) overlay.style.display = 'block';
  }
}

function closeMehrDrawer() {
  document.getElementById('mehr-drawer')?.classList.remove('drawer-open');
  const overlay = document.getElementById('mehr-drawer-overlay');
  if (overlay) overlay.style.display = 'none';
}

function fmUpdateBadge() {
  const openAll      = FM_DATA.filter(x => x.status === 'offen').length;
  const openDringend = FM_DATA.filter(x => x.status === 'offen' && x.prioritaet === 'dringend').length;
  const badge = document.getElementById('fehl-tab-badge');
  if (badge) {
    if (openAll > 0) {
      badge.style.display    = 'flex';
      badge.textContent      = openAll;
      badge.style.background = openDringend > 0 ? '#e53935' : '#f57f17';
    } else {
      badge.style.display = 'none';
    }
  }
  // Mobile bottom nav badge
  const mobBadge = document.getElementById('fehl-mob-badge');
  if (mobBadge) {
    if (openAll > 0) {
      mobBadge.style.display = 'inline-block';
      mobBadge.textContent   = openAll;
    } else {
      mobBadge.style.display = 'none';
    }
  }
}

function fmFormatDatum(iso) {
  const today     = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (iso === today)     return 'Heute';
  if (iso === yesterday) return 'Gestern';
  return new Date(iso + 'T12:00:00').toLocaleDateString('de-AT', {day:'2-digit', month:'2-digit', year:'numeric'});
}

          '<span style="display:inline-flex;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;'+

          '</div>' +

function fmSubmitForm() {
  const produktName    = (document.getElementById('fm-produktname')?.value||'').trim();
  const mengeRaw       = document.getElementById('fm-menge')?.value;
  const einheit        = document.getElementById('fm-einheit')?.value    || 'Stück';
  const kategorie      = document.getElementById('fm-kategorie')?.value  || 'Lebensmittel';
  const prioritaet     = fmSelectedPrio || 'wichtig';
  const eingetragenVon = (document.getElementById('fm-person')?.value    || '').trim();
  const bemerkung      = (document.getElementById('fm-bemerkung')?.value || '').trim();

  if (!produktName) { fmShowToast('❌ Bitte Produktname eingeben!'); document.getElementById('fm-produktname')?.focus(); return; }
  const menge = parseFloat(mengeRaw);
  if (!mengeRaw || isNaN(menge) || menge <= 0) { fmShowToast('❌ Bitte gültige Menge eingeben!'); document.getElementById('fm-menge')?.focus(); return; }
  if (!eingetragenVon) { fmShowToast('❌ Bitte Namen eingeben!'); document.getElementById('fm-person')?.focus(); return; }

  const matchProd = PRODUCTS.find(p => p.name.toLowerCase() === produktName.toLowerCase());
  fmAdd({ produktName, produktId: matchProd?.id||null, menge, einheit, kategorie, prioritaet, bemerkung, eingetragenVon });
  localStorage.setItem('fm_last_person', eingetragenVon);
  fmShowToast('✅ Fehlmaterial gemeldet!');
  document.getElementById('fm-produktname').value = '';
  document.getElementById('fm-menge').value        = '';
  document.getElementById('fm-bemerkung').value    = '';
  fmSelectedPrio = 'wichtig';
  renderFehlmaterialTab();
}

// ════ BEREICH B: TAGESHISTORIE ════
function renderFmHistorie() {
  const search  = fmHistFilter.search.toLowerCase();
  const person  = fmHistFilter.person.toLowerCase();
  const kat     = fmHistFilter.kategorie;

  const filtered = FM_DATA.filter(e => {
    if (search && !e.produktName.toLowerCase().includes(search)) return false;
    if (person && !(e.eingetragenVon||'').toLowerCase().includes(person)) return false;
    if (kat    && e.kategorie !== kat) return false;
    return true;
  });

  const persons = [...new Set(FM_DATA.map(e=>e.eingetragenVon).filter(Boolean))].sort();

  const grouped = {};
  filtered.forEach(e => {
    if (!grouped[e.datum]) grouped[e.datum] = [];
    grouped[e.datum].push(e);
  });
  const sortedDates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  const groupsHtml = sortedDates.length === 0
    ? '<div class="ws-card" style="text-align:center;padding:60px 20px;color:#9ca3af;font-size:14px">Keine Einträge gefunden</div>'
    : sortedDates.map(date => {
        const entries = grouped[date];
        const dateLabel = fmFormatDatum(date);
        const wochentag = new Date(date+'T12:00:00').toLocaleDateString('de-AT',{weekday:'long'});
        const itemsHtml = entries.map(e => {
          const prio = FM_PRIO[e.prioritaet] || FM_PRIO.normal;
          const stat = FM_STATUS[e.status]   || FM_STATUS.offen;
          return '<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;' +
            'border-bottom:1px solid #f0f0f5;flex-wrap:wrap;min-height:52px">' +
            '<span style="display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;' +
            'font-weight:700;background:'+prio.bg+';color:'+prio.color+';border:1px solid '+prio.border+';flex-shrink:0;white-space:nowrap">'+prio.label+'</span>' +
            '<div style="flex:1;min-width:100px">' +
            '<span style="font-weight:700;font-size:14px">'+e.produktName+'</span>' +
            '<span style="font-size:13px;color:#6b7280;margin-left:6px">'+e.menge+' '+e.einheit+'</span>' +
            (e.bemerkung?'<span style="font-size:12px;color:#9ca3af;margin-left:6px">'+e.bemerkung+'</span>':'') +
            '</div>' +
            '<span style="font-size:11px;color:#9ca3af;flex-shrink:0">'+e.kategorie+'</span>' +
            '<span style="font-size:12px;color:#9ca3af;flex-shrink:0">'+(e.eingetragenVon||'—')+' · '+e.uhrzeit+'</span>' +
            '<span style="display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;' +
            'font-weight:700;background:'+stat.bg+';color:'+stat.color+';border:1px solid '+stat.border+';flex-shrink:0;white-space:nowrap">'+stat.label+'</span>' +
            '</div>';
        }).join('');
        return '<div class="ws-card ws-card-sm" style="margin-bottom:16px">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">' +
          '<div style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:16px;font-weight:800;color:#1e1e2e">'+dateLabel+
          '<span style="font-size:13px;font-weight:500;color:#9ca3af;margin-left:8px">'+wochentag+'</span></div>' +
          '<span class="ws-badge" style="background:#f0f0f5;color:#6b7280">'+entries.length+' Meldung'+(entries.length!==1?'en':'')+'</span>' +
          '</div>' +
          '<div style="border:1px solid #e8e8ed;border-radius:10px;overflow:hidden">'+itemsHtml+'</div>' +
          '</div>';
      }).join('');

  return `
    <div class="ws-card" style="margin-bottom:20px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:160px">
          <label class="ws-label">Suche nach Produkt</label>
          <input class="ws-input" type="text" placeholder="Produktname…"
            value="${fmHistFilter.search}"
            oninput="fmHistFilter.search=this.value;renderFehlmaterialTab()">
        </div>
        <div style="min-width:140px">
          <label class="ws-label">Mitarbeiter</label>
          <select class="ws-input" onchange="fmHistFilter.person=this.value;renderFehlmaterialTab()">
            <option value="">Alle</option>
            ${persons.map(p=>'<option value="'+p+'" '+(fmHistFilter.person===p?'selected':'')+'>'+p+'</option>').join('')}
          </select>
        </div>
        <div style="min-width:140px">
          <label class="ws-label">Kategorie</label>
          <select class="ws-input" onchange="fmHistFilter.kategorie=this.value;renderFehlmaterialTab()">
            <option value="">Alle</option>
            ${FM_KATEGORIEN.map(k=>'<option value="'+k+'" '+(kat===k?'selected':'')+'>'+k+'</option>').join('')}
          </select>
        </div>
        <div>

// ════ BEREICH C: AUSWERTUNG ════
function renderFmAuswertung() {
  if (FM_DATA.length === 0) {
    return '<div class="ws-card" style="text-align:center;padding:60px 20px">' +
      '<div style="font-size:48px;margin-bottom:12px">📊</div>' +
      '<div style="font-size:16px;font-weight:700;color:#6b7280">Noch keine Daten vorhanden</div>' +
      '</div>';
  }

  // Häufigkeiten
  const freq = {};
  FM_DATA.forEach(e => {
    const key = e.produktName.toLowerCase().trim();
    if (!freq[key]) freq[key] = { name: e.produktName, count: 0, dringend: 0 };
    freq[key].count++;
    if (e.prioritaet === 'dringend') freq[key].dringend++;
  });
  const sorted   = Object.values(freq).sort((a,b) => b.count - a.count);
  const top5     = sorted.slice(0, 5);
  const maxCount = top5[0]?.count || 1;

  const top5Html = top5.map((item, i) => {
    const isCritical = item.count >= 3;
    const barW = Math.round((item.count / maxCount) * 100);
    return '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f5">' +
      '<div style="width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;' +
      'font-size:12px;font-weight:800;background:'+(isCritical?'#fde8e8':'#f0f0f5')+';color:'+(isCritical?'#c62828':'#6b7280')+'">'+(i+1)+'</div>' +
      '<div style="flex:1;min-width:0">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
      '<span style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+item.name+'</span>' +
      (isCritical?'<span style="background:#fde8e8;color:#c62828;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:700;flex-shrink:0">🔴 Kritisch</span>':'') +
      '</div>' +
      '<div style="background:#f0f0f5;border-radius:4px;height:6px;overflow:hidden">' +
      '<div style="width:'+barW+'%;height:100%;border-radius:4px;background:'+(isCritical?'#c62828':'#8B0000')+';transition:width .3s"></div>' +
      '</div></div>' +
      '<div style="font-size:14px;font-weight:800;flex-shrink:0;color:'+(isCritical?'#c62828':'#1e1e2e')+'">'+item.count+'×</div>' +
      '</div>';
  }).join('');

  // Wochentage
  const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const dayFull  = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const dayCounts = [0,0,0,0,0,0,0];
  FM_DATA.forEach(e => { if (e.datum) dayCounts[new Date(e.datum+'T12:00:00').getDay()]++; });
  const maxDay     = Math.max(...dayCounts) || 1;
  const busiestDay = dayCounts.indexOf(Math.max(...dayCounts));
  const dayHtml = dayCounts.map((count, i) => {
    const h = Math.round((count / maxDay) * 64);
    const isMax = count === maxDay && count > 0;
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">' +
      '<div style="font-size:12px;font-weight:700;color:'+(isMax?'#8B0000':'#6b7280')+'">'+(count||'')+'</div>' +
      '<div style="width:100%;max-width:36px;height:64px;display:flex;align-items:flex-end">' +
      '<div style="width:100%;height:'+h+'px;border-radius:4px 4px 0 0;background:'+(isMax?'#8B0000':'#e2e2e8')+';min-height:'+(count>0?4:0)+'px;transition:height .3s"></div>' +
      '</div><div style="font-size:11px;color:#9ca3af">'+dayNames[i]+'</div></div>';
  }).join('');

  // Kritische Artikel (3×+)
  const critical = sorted.filter(x => x.count >= 3);

  // Durchschnittliche Erledigungszeit
  const erledigte = FM_DATA.filter(x => x.status === 'erledigt' && x.datum && x.statusDatum);
  let avgDaysHtml = '';
  if (erledigte.length > 0) {
    const avg = erledigte.reduce((s,e) => {
      const d1 = new Date(e.datum); const d2 = new Date(e.statusDatum);
      return s + Math.max(0, (d2.getTime()-d1.getTime()) / 86400000);
    }, 0) / erledigte.length;
    avgDaysHtml = '<div style="padding:14px;border-radius:12px;background:#e3f2fd;text-align:center;margin-top:12px">' +
      '<div style="font-size:24px;font-weight:800;color:#1565c0">' + avg.toFixed(1) + ' Tage</div>' +
      '<div style="font-size:12px;color:#6b7280;margin-top:2px">Ø Zeit bis Erledigung</div>' +
      '<div style="font-size:11px;color:#9ca3af;margin-top:2px">aus ' + erledigte.length + ' erledigten Fällen</div>' +
      '</div>';
  }

  return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px">' +

    '<div class="ws-card">' +
    '<div class="ws-section-title" style="font-size:16px;margin-bottom:16px"><span class="material-symbols-outlined">trending_up</span>Top 5 Fehlmaterialien</div>' +
    (top5Html || '<div style="color:#9ca3af;text-align:center;padding:20px">Keine Daten</div>') +
    '</div>' +

    '<div class="ws-card">' +
    '<div class="ws-section-title" style="font-size:16px;margin-bottom:16px"><span class="material-symbols-outlined">calendar_today</span>Meldungen nach Wochentag</div>' +
    '<div style="display:flex;gap:4px;height:80px;margin-bottom:8px">' + dayHtml + '</div>' +
    (dayCounts[busiestDay]>0 ? '<div style="text-align:center;font-size:13px;color:#6b7280;margin-top:8px">Meiste Meldungen am <strong style="color:#8B0000">'+dayFull[busiestDay]+'</strong> ('+dayCounts[busiestDay]+'×)</div>' : '') +
    '</div>' +

    '<div class="ws-card" style="grid-column:1/-1">' +
    '<div class="ws-section-title" style="font-size:16px;margin-bottom:16px"><span class="material-symbols-outlined" style="color:#c62828">warning</span>Kritische Artikel <span style="font-size:13px;font-weight:500;color:#9ca3af">(3× oder öfter)</span></div>' +
    (critical.length===0
      ? '<div style="text-align:center;padding:24px;color:#9ca3af;font-size:14px"><span style="font-size:32px">✅</span><br>Keine kritischen Artikel — sehr gut!</div>'
      : '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">' +
        critical.map(item =>
          '<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;background:#fde8e8;border:1.5px solid #f5c6c6">' +
          '<span style="font-size:28px;line-height:1">🔴</span>' +
          '<div><div style="font-weight:800;font-size:14px;color:#c62828">'+item.name+'</div>' +
          '<div style="font-size:12px;color:#e53935;font-weight:600">'+item.count+'× gefehlt</div></div>' +
          '</div>'
        ).join('') + '</div>') +
    '</div>' +

    '<div class="ws-card">' +
    '<div class="ws-section-title" style="font-size:16px;margin-bottom:16px"><span class="material-symbols-outlined">analytics</span>Übersicht</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +

function abfallSpeichern(productId) {
  const p     = PRODUCTS.find(x => x.id === productId);
  const menge = parseFloat(document.getElementById('ab-menge')?.value);
  const grund  = document.getElementById('ab-grund')?.value    || 'Sonstiges';
  const person = (document.getElementById('ab-person')?.value  || '').trim();
  const bemerkung = (document.getElementById('ab-bemerkung')?.value || '').trim();
  if (!menge || isNaN(menge) || menge <= 0) { fmShowToast('❌ Bitte gültige Menge eingeben'); return; }
  const now = new Date();
  ABFALL_DATA.unshift({
    id:          Date.now()+'_'+Math.random().toString(36).slice(2,7),
    datum:       now.toISOString().slice(0,10),
    uhrzeit:     now.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'}),
    produktId:   productId,
    produktName: p ? p.name : productId,
    menge, einheit: p ? p.unit : 'Stk',
    grund, person, bemerkung,
  });
  if (ABFALL_DATA.length > 1000) ABFALL_DATA = ABFALL_DATA.slice(0,1000);
  abfallSave();
  if (person) localStorage.setItem('fm_last_person', person);
  document.getElementById('abfall-modal-overlay')?.remove();
  fmShowToast('✅ Abfall gespeichert — ' + (p?p.name:productId) + ' ' + menge + ' ' + (p?p.unit:''));
}

function abfallGetMonthly(monthStr) {
  return ABFALL_DATA.filter(e => e.datum && e.datum.startsWith(monthStr));
}

function fifoCheckWarning(productId) {
  const entry = FIFO_DATA[productId];
  if (!entry || !entry.eingang) return null;
  const daysSince = Math.floor((Date.now() - new Date(entry.eingang).getTime()) / 86400000);
  if (daysSince >= 7 && stockLevels[productId] > 0) {
    return 'Eingang vor ' + daysSince + ' Tagen — bitte zuerst verwenden!';
  }
  return null;
}

const PORTION_KEY = 'pizzeria_portionen';
const PORTION_DEFAULTS = {
  mozzarella: { gramm: 150, einheit: 'g',  label: 'pro Pizza' },
  mehl:       { gramm: 250, einheit: 'g',  label: 'pro Pizza' },
  tomaten:    { gramm: 80,  einheit: 'g',  label: 'pro Pizza' },
  olivenoel:  { gramm: 10,  einheit: 'ml', label: 'pro Pizza' },
  salami:     { gramm: 40,  einheit: 'g',  label: 'pro Pizza' },
  parmesan:   { gramm: 20,  einheit: 'g',  label: 'pro Pizza' },
  basilikum:  { gramm: 3,   einheit: 'g',  label: 'pro Pizza' },
};
let PORTION_DATA = {};
try {
  const _ps = JSON.parse(localStorage.getItem(PORTION_KEY)||'null');
  PORTION_DATA = _ps || JSON.parse(JSON.stringify(PORTION_DEFAULTS));
} catch(_) { PORTION_DATA = JSON.parse(JSON.stringify(PORTION_DEFAULTS)); }

function portSave() {
  try { localStorage.setItem(PORTION_KEY, JSON.stringify(PORTION_DATA)); } catch(_) {}
}

function portUpdate(productId, val) {
  const gramm = parseFloat(val) || 0;
  if (!PORTION_DATA[productId]) PORTION_DATA[productId] = { gramm: 0, einheit: 'g', label: 'pro Pizza' };
  PORTION_DATA[productId].gramm = gramm;
  portSave();
  portCalc();
}

function portCalc() {
  const count = parseInt(document.getElementById('portion-count')?.value) || 0;
  const result = document.getElementById('portion-result');
  if (!result) return;
  if (!count) { result.innerHTML = ''; return; }
  const items = PRODUCTS.filter(p => PORTION_DATA[p.id] && PORTION_DATA[p.id].gramm > 0).map(p => {
    const por = PORTION_DATA[p.id];
    const divisor = (por.einheit==='g'&&p.unit==='kg') || (por.einheit==='ml'&&p.unit==='Liter') ? 1000 : 1;
    const needed  = (por.gramm * count) / divisor;
    const stock   = stockLevels[p.id];
    const ok      = stock >= needed;
    const display = needed < 1 ? needed.toFixed(3) : needed < 10 ? needed.toFixed(2) : needed.toFixed(1);
    return '<span style="background:'+(ok?'#e8f5e9':'#fde8e8')+';color:'+(ok?'#2e7d32':'#c62828')+';' +
      'border-radius:8px;padding:5px 12px;font-size:13px;font-weight:700;white-space:nowrap">' +
      p.name+': '+display+' '+p.unit+(ok?' ✓':' ⚠️')+'</span>';
  });
  result.innerHTML = items.length === 0 ? '' :
    '<div style="margin-top:8px">' +
    '<div style="font-size:12px;color:#6b7280;margin-bottom:8px;font-weight:600">Bedarf für ' + count + ' Pizzen:</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px">' + items.join('') + '</div></div>';
}

function renderPortionskontrolleSection() {
  const produkteMitPortion = PRODUCTS.filter(p => PORTION_DATA[p.id]);
  if (produkteMitPortion.length === 0) return '';
  const rows = produkteMitPortion.map(p => {
    const por = PORTION_DATA[p.id];
    const divisor = (por.einheit==='g'&&p.unit==='kg') || (por.einheit==='ml'&&p.unit==='Liter') ? 1000 : 1;
    const portInUnit = por.gramm / divisor;
    const stock = stockLevels[p.id];
    const reichtFuer = portInUnit > 0 ? Math.floor(stock / portInUnit) : null;
    const isLow = reichtFuer !== null && reichtFuer < 30;
    return '<tr>' +
      '<td style="font-weight:600;font-size:14px">'+p.name+'</td>' +
      '<td><input type="number" value="'+por.gramm+'" min="1" step="1" ' +
        'onchange="portUpdate(\''+p.id+'\',this.value)" ' +
        'style="width:70px;padding:5px 8px;border-radius:7px;border:1.5px solid #e2e2e8;font-size:13px;font-family:inherit;outline:none;text-align:right">' +
      '</td>' +
      '<td style="font-size:13px;color:#6b7280">'+por.einheit+'</td>' +
      '<td style="font-size:13px">'+stock+' '+p.unit+'</td>' +
      '<td style="font-weight:700;color:'+(isLow?'#c62828':'#2e7d32')+'">' +
        (reichtFuer!==null ? reichtFuer+' Pizzen'+(isLow?' ⚠️':'') : '—') +
      '</td>' +
      '</tr>';
  }).join('');
  return `
    <div class="ws-card" style="margin-top:28px">
      <div class="ws-section-header" style="margin-bottom:16px">
        <div class="ws-section-title" style="font-size:17px">
          <span class="material-symbols-outlined">calculate</span>Portionskontrolle
        </div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:20px;flex-wrap:wrap">
        <div>
          <label class="ws-label">Anzahl Pizzen heute</label>
          <input id="portion-count" class="ws-input" type="number" min="1" placeholder="z.B. 50"
            oninput="portCalc()" style="width:150px;font-size:16px;padding:11px 14px;">
        </div>
        <div id="portion-result" style="flex:1"></div>
      </div>
      <div style="overflow-x:auto" class="hide-scrollbar">
        <table class="ws-table" style="min-width:500px">
          <thead><tr>
            <th>Produkt</th><th>Portion</th><th>Einheit</th>
            <th>Bestand</th><th>Reicht für</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="font-size:12px;color:#9ca3af;margin-top:12px">
        💡 Portionsmengen anpassen: direkt in der Tabelle klicken und neue Zahl eingeben
      </div>
    </div>`;
}

    'background:#8B0000;color:#fff;font-size:15px;font-weight:800;cursor:pointer;' +
    'font-family:inherit;display:flex;align-items:center;gap:8px">' +
    '<span class="material-symbols-outlined" style="font-size:20px">task_alt</span>Abschließen</button>' +
    '</div></div>';
}

function clToggle(itemId) {
  clCheckedItems[itemId] = !clCheckedItems[itemId];
  const box  = document.getElementById('cl-box-'+itemId);
  const icon = document.getElementById('cl-icon-'+itemId);
  const txt  = document.getElementById('cl-txt-'+itemId);
  const wrap = document.getElementById('cl-wrap-'+itemId);
  if (!box) return;
  if (clCheckedItems[itemId]) {
    box.style.cssText  = 'width:28px;height:28px;border-radius:8px;flex-shrink:0;border:2px solid #2e7d32;background:#2e7d32;display:flex;align-items:center;justify-content:center;transition:all .12s';
    if (icon) icon.style.display = 'block';
    if (txt)  txt.style.textDecoration = 'line-through';
    if (wrap) wrap.style.background = '#f0fdf4';
  } else {
    box.style.cssText  = 'width:28px;height:28px;border-radius:8px;flex-shrink:0;border:2px solid #d1d5db;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .12s';
    if (icon) icon.style.display = 'none';
    if (txt)  txt.style.textDecoration = '';
    if (wrap) wrap.style.background = '#fff';
  }
}

function clAbschliessen(typ) {
  const person = (document.getElementById('cl-person-'+typ)?.value||'').trim();
  if (!person) { fmShowToast('❌ Bitte Namen eingeben'); return; }
  const items = CL_CONFIG[typ].filter(i=>i.active).map(item => ({
    id: item.id, text: item.text, checked: !!clCheckedItems[item.id],
  }));
  const today = new Date().toISOString().slice(0,10);
  const now   = new Date().toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'});
  CL_HISTORY = CL_HISTORY.filter(h => !(h.datum===today && h.typ===typ));
  CL_HISTORY.unshift({
    id:             Date.now()+'_'+Math.random().toString(36).slice(2,6),
    datum:          today, typ, person,
    items,          abgeschlossenUm: now,
    vollstaendig:   items.every(i=>i.checked),
  });
  if (CL_HISTORY.length > 500) CL_HISTORY = CL_HISTORY.slice(0,500);
  clSaveHistory();
  clCheckedItems = {};
  if (person) localStorage.setItem('fm_last_person', person);
  fmShowToast('✅ '+(typ==='morgen'?'Morgen':'Abend')+'-Checkliste abgeschlossen!');
  renderChecklisteTab();
}

function clReset(typ) {
  const today = new Date().toISOString().slice(0,10);
  CL_HISTORY  = CL_HISTORY.filter(h => !(h.datum===today && h.typ===typ));
  clSaveHistory();
  clCheckedItems = {};
  renderChecklisteTab();
}

function clUpdateBadge() {
  const today      = new Date().toISOString().slice(0,10);
  const doneMorgen = CL_HISTORY.some(h => h.datum===today && h.typ==='morgen');
  const doneAbend  = CL_HISTORY.some(h => h.datum===today && h.typ==='abend');
  const badge = document.getElementById('cl-tab-badge');
  const hour = new Date().getHours();
  let showBadge = false;
  if (badge) {
    // Show badge: green when morning done (after 6am), evening reminder (after 5pm if not done)
    if (hour >= 6 && !doneMorgen) {
      badge.style.display = 'flex'; badge.textContent = '!';
      badge.style.background = '#e65100';
      showBadge = true;
    } else if (hour >= 17 && !doneAbend) {
      badge.style.display = 'flex'; badge.textContent = '!';
      badge.style.background = '#e65100';
      showBadge = true;
    } else if (doneMorgen && doneAbend) {
      badge.style.display = 'flex'; badge.textContent = '✓';
      badge.style.background = '#2e7d32';
      showBadge = true;
    } else {
      badge.style.display = 'none';
    }
  } else {
    if ((hour >= 6 && !doneMorgen) || (hour >= 17 && !doneAbend) || (doneMorgen && doneAbend)) {
      showBadge = true;
    }
  }
  // Also update drawer badge
  const drawerBadge = document.getElementById('cl-drawer-badge');
  if (drawerBadge) drawerBadge.style.display = showBadge ? 'block' : 'none';
}

function renderClHistorie() {
  if (CL_HISTORY.length === 0) {
    return '<div class="ws-card" style="text-align:center;padding:60px 20px">' +
      '<div style="font-size:48px">📋</div>' +
      '<div style="font-size:16px;font-weight:700;color:#6b7280;margin-top:12px">' +
      'Noch keine abgeschlossenen Checklisten</div></div>';
  }
  const grouped = {};
  CL_HISTORY.forEach(h => {
    if (!grouped[h.datum]) grouped[h.datum] = [];
    grouped[h.datum].push(h);
  });
  return Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).slice(0,60).map(date => {
    const entries  = grouped[date];
    const label    = fmFormatDatum(date);
    const wochentag = new Date(date+'T12:00:00').toLocaleDateString('de-AT',{weekday:'long'});
    return '<div class="ws-card ws-card-sm" style="margin-bottom:14px">' +
      '<div style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:15px;font-weight:800;margin-bottom:12px">' +
      label + '<span style="font-size:13px;font-weight:500;color:#9ca3af;margin-left:8px">'+wochentag+'</span></div>' +
      '<div style="display:grid;gap:8px">' +
      entries.map(h => {
        const done  = (h.items||[]).filter(i=>i.checked).length;
        const total = (h.items||[]).length;
        const allOk = done === total;
        return '<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;' +
          'background:'+(allOk?'#e8f5e9':'#fff8e1')+';border:1px solid '+(allOk?'#a5d6a7':'#ffe082')+'">' +
          '<span style="font-size:22px">'+(h.typ==='morgen'?'☀️':'🌙')+'</span>' +
          '<div style="flex:1">' +
          '<div style="font-weight:700;font-size:14px">'+(h.typ==='morgen'?'Morgen':'Abend')+'-Checkliste ' +
          '<span style="font-weight:500;color:#6b7280">'+h.person+'</span></div>' +
          '<div style="font-size:12px;color:#6b7280;margin-top:2px">'+h.abgeschlossenUm+' Uhr · ' +
          done+'/'+total+' erledigt'+(allOk?'':' · <span style="color:#e65100;font-weight:600">Unvollständig</span>')+'</div></div>' +
          '<span style="font-size:22px">'+(allOk?'✅':'⚠️')+'</span>' +
          '</div>';
      }).join('') + '</div></div>';
  }).join('');
}

// Set correct lock icons on load + render default tab
document.addEventListener('DOMContentLoaded', () => {
  const unlocked = bizIsAuth();
  const li1 = document.getElementById('biz-lock-icon');
  const li2 = document.getElementById('mob-biz-lock');
  if (li1) li1.textContent = unlocked ? 'lock_open' : 'lock';
  if (li2) li2.textContent = unlocked ? 'lock_open' : 'lock';
  fmUpdateBadge();
  clUpdateBadge();
  renderKombisTab(); // Render the default tab on page load
});
</script>

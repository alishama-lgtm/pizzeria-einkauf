<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#8B0000"/>
  <title>Offline — Pizzeria San Carino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      background: #fff8f6;
      color: #261816;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 72px; margin-bottom: 24px; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 { font-size: 22px; font-weight: 700; color: #8B0000; margin-bottom: 12px; }
    p { font-size: 15px; color: #5a403c; max-width: 320px; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #8B0000; color: white; border: none;
      padding: 14px 32px; border-radius: 100px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #a00000; }
    .info {
      margin-top: 40px; font-size: 13px; color: #9a7b78;
      border-top: 1px solid #ecdad6; padding-top: 20px; max-width: 300px;
    }
  </style>
</head>
<body>
  <div class="icon">🍕</div>
  <h1>Kein Server erreichbar</h1>
  <p>Der Pizzeria-Server ist gerade nicht verbunden. Bitte sicherstellen, dass der Server-PC eingeschaltet und im gleichen WLAN ist.</p>
  <button onclick="location.reload()">🔄 Erneut versuchen</button>
  <div class="info">
    Pizzeria San Carino Management<br/>
    Server: Port 8080 / 8443
  </div>
</body>
</html>

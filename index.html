<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>

  <title>Pizzeria San Carino</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

        extend: {
          colors: {
            "tertiary-fixed": "#dfe0ff",
            "on-primary-fixed": "#410000",
            "secondary-fixed": "#ffdad4",
            "surface-bright": "#fff8f6",
            "primary-fixed": "#ffdad4",
            "surface-variant": "#f8dcd8",
            "inverse-on-surface": "#ffedea",
            "on-secondary-fixed-variant": "#7b2d23",
            "tertiary": "#00178d",
            "surface-container-highest": "#f8dcd8",
            "on-error": "#ffffff",
            "on-background": "#261816",
            "on-tertiary-fixed-variant": "#0d2ccc",
            "on-primary": "#ffffff",
            "secondary-fixed-dim": "#ffb4a8",
            "primary": "#610000",
            "on-primary-container": "#ff907f",
            "surface-tint": "#b52619",
            "background": "#fff8f6",
            "outline": "#8e706b",
            "primary-container": "#8b0000",
            "inverse-primary": "#ffb4a8",
            "error": "#ba1a1a",
            "surface-dim": "#efd4d0",
            "on-surface-variant": "#5a403c",
            "on-tertiary-container": "#9ea9ff",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#261816",
            "on-secondary-fixed": "#400201",
            "surface": "#fff8f6",
            "tertiary-fixed-dim": "#bcc3ff",
            "primary-fixed-dim": "#ffb4a8",
            "inverse-surface": "#3d2c2a",
            "on-secondary": "#ffffff",
            "error-container": "#ffdad6",
            "on-error-container": "#93000a",
            "surface-container-low": "#fff0ee",
            "secondary-container": "#fe9383",
            "surface-container": "#ffe9e6",
            "tertiary-container": "#0025c8",
            "on-tertiary-fixed": "#000d60",
            "surface-container-high": "#fee2dd",
            "on-secondary-container": "#772a20",

  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── Dropdown "Mehr" ── */
    #mehr-dd-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: #fff;
      border: 1.5px solid #e3beb8;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.13);
      z-index: 200;
      min-width: 200px;
      padding: 6px;
    }
    #mehr-dd-menu.open { display: block; }
    #mehr-dd-menu .dd-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      background: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #5a403c;
      font-family: inherit;
      text-align: left;
      transition: background .12s, color .12s;
    }
    #mehr-dd-menu .dd-item:hover { background: #fff5f5; color: #8B0000; }
    #mehr-dd-menu .dd-item.tab-active { background: #fff0ee; color: #8B0000; font-weight: 700; }
    #mehr-dd-menu .dd-item .material-symbols-outlined { font-size: 18px; }
    #mehr-dd-btn.tab-active,
    #mehr-dd-btn.dd-child-active {
      color: #8B0000 !important;
      font-weight: 700 !important;
      border-bottom: 3px solid #8B0000 !important;
      background: #fff0ee !important;
      border-radius: 8px 8px 0 0 !important;
    }
    /* badge flex helper (reuse for new badges) */
    .tab-badge {
      display: none;
      background: #8B0000;
      color: #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      font-weight: 700;
      align-items: center;
      justify-content: center;
      margin-left: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body style="background-color:#fff8f6;color:#1e1e2e;min-height:100vh;">

<!-- ═══ HEADER ═══ -->
<header id="app-header">
  <div class="header-inner">
    <!-- Logo -->
    <div class="header-logo">
      <span class="header-logo-icon">🍕</span>
      <div>
        <div class="header-logo-text">Pizzeria San Carino</div>
        <div class="header-logo-sub">Einkauf &amp; Warenverwaltung</div>
      </div>
    </div>

    <!-- Right Actions -->
    <div class="header-right">
      <!-- Low-stock badge -->
      <div id="header-badge" style="display:none;align-items:center;gap:6px;background:#b52619;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;cursor:pointer" onclick="showLowStockPopup()">
        <span class="material-symbols-outlined" style="font-size:16px">warning</span>
        <span id="header-badge-text"></span>&nbsp;Produkte brauchen Nachbestellung
      </div>
      <!-- Bell -->
      <button id="notif-bell-btn" class="header-bell-btn" onclick="showLowStockPopup()">
        <span class="material-symbols-outlined" style="font-size:24px;">notifications</span>
      </button>
      <!-- Business Button -->
      <button id="biz-header-btn" onclick="switchTab('business')">
        <span class="material-symbols-outlined" id="biz-lock-icon">lock</span>
        💼 Business
      </button>
    </div>
  </div>
</header>

<!-- ═══ DESKTOP NAV ═══ -->
<nav id="staff-tab-bar" class="hidden md:block">
  <div class="tabs-inner hide-scrollbar">

    <!-- Haupttabs -->
    <button data-nav-tab="kombis" onclick="switchTab('kombis')" class="tab-btn tab-active">
      <span style="font-size:16px">🧮</span>Kombis
      <span id="kombis-tab-badge" style="display:none;background:#8B0000;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;align-items:center;justify-content:center;margin-left:2px"></span>
    </button>

    <button data-nav-tab="angebote" onclick="switchTab('angebote')" class="tab-btn">
      <span style="font-size:16px">🏪</span>Angebote
    </button>

    <button data-nav-tab="einkaufsliste" onclick="switchTab('einkaufsliste')" class="tab-btn">
      <span style="font-size:16px">🛒</span>Einkaufsliste
      <span id="el-tab-badge" style="display:none;background:#610000;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;align-items:center;justify-content:center;margin-left:2px"></span>
    </button>

    <button data-nav-tab="suche" onclick="switchTab('suche')" class="tab-btn">
      <span style="font-size:16px">🔍</span>Suche
    </button>

    <!-- Mehr-Dropdown -->
    <div style="position:relative;align-self:stretch;display:flex;align-items:flex-end" id="mehr-dd-wrapper">
      <button id="mehr-dd-btn" onclick="toggleMehrDD(event)" class="tab-btn" style="gap:6px">
        Mehr
        <span class="material-symbols-outlined" id="mehr-dd-chevron" style="font-size:18px;transition:transform .2s">expand_more</span>
      </button>
      <div id="mehr-dd-menu">
        <button data-nav-tab="upload" onclick="switchTab('upload');closeMehrDD()" class="dd-item">
          <span class="material-symbols-outlined">photo_camera</span>📸 Upload
        </button>
        <button data-nav-tab="verlauf" onclick="switchTab('verlauf');closeMehrDD()" class="dd-item">
          <span class="material-symbols-outlined">bar_chart</span>📈 Verlauf
        </button>
        <button data-nav-tab="mitarbeiter" onclick="switchTab('mitarbeiter');closeMehrDD()" class="dd-item">
          <span class="material-symbols-outlined">badge</span>👥 Mitarbeiter
        </button>
        <div style="height:1px;background:#f0e4e1;margin:4px 6px"></div>
        <button data-nav-tab="fehlmaterial" onclick="switchTab('fehlmaterial');closeMehrDD()" class="dd-item">
          <span class="material-symbols-outlined">assignment_late</span>📋 Fehlmaterial
          <span id="fehl-tab-badge" style="display:none;background:#e53935;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;align-items:center;justify-content:center;margin-left:auto"></span>
        </button>
        <button data-nav-tab="checkliste" onclick="switchTab('checkliste');closeMehrDD()" class="dd-item">
          <span class="material-symbols-outlined">checklist</span>✅ Checkliste
          <span id="cl-tab-badge" style="display:none;background:#2e7d32;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;align-items:center;justify-content:center;margin-left:auto">✓</span>
        </button>
        <div style="height:1px;background:#f0e4e1;margin:4px 6px"></div>
        <button data-nav-tab="produkte" onclick="switchTab('produkte');closeMehrDD()" class="dd-item">
          <span class="material-symbols-outlined">inventory_2</span>Produkte
        </button>
        <button data-nav-tab="geschaefte" onclick="switchTab('geschaefte');closeMehrDD()" class="dd-item">
          <span class="material-symbols-outlined">store</span>Geschäfte
        </button>
      </div>
    </div>

  </div>
</nav>

<!-- ═══ STATS DASHBOARD ═══ -->
<div id="stats-dashboard">

    <div id="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;"></div>

</div>

<!-- ═══ PANELS ═══ -->

  <div id="panel-produkte"     style="display:none"></div>
  <div id="panel-geschaefte"   style="display:none"></div>

  <div id="panel-suche"        style="display:none"></div>

<!-- ═══ FOOTER ═══ -->
<footer id="app-footer">

</footer>

<!-- ═══ MOBILE BOTTOM NAV ═══ -->
<nav id="mobile-bottom-nav" class="md:hidden">
  <button data-bottom-nav="kombis" onclick="switchTab('kombis')" class="mob-nav-btn mob-active">
    <span style="font-size:20px;line-height:1">🧮</span>
    <span>Kombis</span>

  <button data-bottom-nav="einkaufsliste" onclick="switchTab('einkaufsliste')" class="mob-nav-btn" style="position:relative">

    <span id="fehl-mob-badge" style="display:none;position:absolute;top:4px;right:8px;background:#e53935;color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:800;line-height:1.4"></span>

<!-- ═══ FLOATING CHECKOUT BAR ═══ -->

</div>

<!-- ═══ MEHR DRAWER (Mobile) ═══ -->
<div id="mehr-drawer-overlay" onclick="closeMehrDrawer()"></div>
<div id="mehr-drawer" class="md:hidden">
  <div class="drawer-handle"></div>
  <div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;padding:0 2px">Weitere Bereiche</div>
  <div class="drawer-grid">
    <button data-drawer-nav="angebote" onclick="switchTab('angebote');closeMehrDrawer()" class="drawer-item">
      <span style="font-size:20px">🏪</span>Angebote
    </button>
    <button data-drawer-nav="suche" onclick="switchTab('suche');closeMehrDrawer()" class="drawer-item">
      <span style="font-size:20px">🔍</span>Suche
    </button>
    <button data-drawer-nav="upload" onclick="switchTab('upload');closeMehrDrawer()" class="drawer-item">
      <span class="material-symbols-outlined">photo_camera</span>Upload
    </button>
    <button data-drawer-nav="verlauf" onclick="switchTab('verlauf');closeMehrDrawer()" class="drawer-item">
      <span class="material-symbols-outlined">bar_chart</span>Verlauf
    </button>
    <button data-drawer-nav="mitarbeiter" onclick="switchTab('mitarbeiter');closeMehrDrawer()" class="drawer-item">
      <span class="material-symbols-outlined">badge</span>Mitarbeiter
    </button>
    <button data-drawer-nav="checkliste" onclick="switchTab('checkliste');closeMehrDrawer()" class="drawer-item" style="position:relative">
      <span class="material-symbols-outlined">checklist</span>Checkliste
      <span id="cl-drawer-badge" style="display:none;position:absolute;top:8px;right:8px;width:10px;height:10px;background:#2e7d32;border-radius:50%"></span>
    </button>
    <button id="mob-biz-btn" onclick="switchTab('business');closeMehrDrawer()" class="drawer-item" style="background:#1a1a2e;border-color:#2d2d4a;color:#D4AF37">
      <span class="material-symbols-outlined" id="mob-biz-lock" style="color:#D4AF37">lock</span>
      Business
    </button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/fehlmaterial.js"></script>
<script src="js/upload.js"></script>
<script src="js/business.js"></script>
<script src="js/tabs.js"></script>
<script src="js/angebote.js"></script>
<script src="js/einkaufsliste.js"></script>
<script>
// ── Desktop "Mehr" Dropdown ──────────────────────────────────────
const MEHR_DD_TABS = ['upload','verlauf','mitarbeiter','fehlmaterial','checkliste','produkte','geschaefte'];

function toggleMehrDD(e) {
  e.stopPropagation();
  const menu = document.getElementById('mehr-dd-menu');
  const chevron = document.getElementById('mehr-dd-chevron');
  const open = menu.classList.toggle('open');
  if (chevron) chevron.style.transform = open ? 'rotate(180deg)' : '';
  if (open) {
    setTimeout(() => document.addEventListener('click', _closeMehrDDOutside), 0);
  }
}
function _closeMehrDDOutside(e) {
  if (!document.getElementById('mehr-dd-wrapper')?.contains(e.target)) {
    closeMehrDD();
    document.removeEventListener('click', _closeMehrDDOutside);
  }
}
function closeMehrDD() {
  document.getElementById('mehr-dd-menu')?.classList.remove('open');
  const chevron = document.getElementById('mehr-dd-chevron');
  if (chevron) chevron.style.transform = '';
}

// Mehr-Button aktiv wenn ein Dropdown-Tab aktiv ist
function _updateMehrDDActive() {
  const btn = document.getElementById('mehr-dd-btn');
  if (!btn) return;
  const anyActive = MEHR_DD_TABS.some(t =>
    document.querySelector(`[data-nav-tab="${t}"]`)?.classList.contains('tab-active')
  );
  btn.classList.toggle('dd-child-active', anyActive);
}

// Mobile Mehr-Button aktiv wenn Drawer-Tab aktiv
function _updateMobMehrActive() {
  const drawerTabs = ['angebote','suche','upload','verlauf','mitarbeiter','checkliste','business'];
  const btn = document.getElementById('mob-mehr-btn');
  if (!btn) return;
  const anyActive = drawerTabs.some(t =>
    document.querySelector(`[data-bottom-nav="${t}"]`)?.classList.contains('mob-active') ||
    document.querySelector(`[data-drawer-nav="${t}"]`)?.classList.contains('mob-active')
  );
  btn.classList.toggle('mob-active', anyActive);
}

// switchTab wrappen damit Mehr-Buttons aktualisiert werden
document.addEventListener('DOMContentLoaded', () => {
  const unlocked = bizIsAuth();
  const li1 = document.getElementById('biz-lock-icon');
  const li2 = document.getElementById('mob-biz-lock');
  if (li1) li1.textContent = unlocked ? 'lock_open' : 'lock';
  if (li2) li2.textContent = unlocked ? 'lock_open' : 'lock';

  fmUpdateBadge();
  clUpdateBadge();
  elUpdateBadge();
  renderKombisTab();

  // switchTab wrappen
  const _orig = window.switchTab;
  window.switchTab = function(tab) {
    closeMehrDD();
    _orig(tab);
    _updateMehrDDActive();
    _updateMobMehrActive();
  };
});
</script>
</body>
</html>
